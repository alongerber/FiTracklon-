// V3 — Journey (vertical milestones) — fixed to handle gain-over-start
// ════════════════════════════════════════════════════════════════════
function HomeV3({ onNavigate }) {
  const { state, stats } = useStore();
  const unit = state.settings.unit;
  const goal = state.goal.weight;
  const startWeight = stats.startWeight;

  if (stats.empty) {
    return (
      <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>
        <HomeHeader onNavigate={onNavigate} />
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
          <EmptyState icon="🗺️" title="התחל את המסע" message="הוסף שקילה ראשונה כדי לראות את המפה."
            action={<Button onClick={() => onNavigate('log')}>הוסף שקילה</Button>} />
        </div>
      </div>
    );
  }

  const curW = stats.current;
  // Fix: extend range to include all milestones including above-start excursions
  const topW = Math.max(startWeight, stats.peak.weight, curW) + 1;
  const botW = goal !== null ? Math.min(goal, stats.low.weight, curW) - 1 : Math.min(stats.low.weight, curW) - 1;
  const range = topW - botW;
  const posFor = (w) => ((topW - w) / range) * 100;

  const pct = goal !== null && startWeight !== goal
    ? Math.max(0, Math.min(1, (startWeight - curW) / (startWeight - goal)))
    : 0;

  const milestones = [
    { w: startWeight, label: 'נקודת זינוק', date: state.user.startDate, kind: 'start' },
    stats.peak.weight > startWeight + 0.2 && { w: stats.peak.weight, label: 'שיא · חריגה למעלה', date: stats.peak.date, kind: 'peak' },
    stats.low.weight < startWeight - 1 && { w: stats.low.weight, label: 'שפל · השיא הכי נמוך', date: stats.low.date, kind: 'low' },
    goal !== null && { w: goal, label: 'היעד', kind: 'goal' },
  ].filter(Boolean).sort((a, b) => b.w - a.w);

  return (
    <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>
      <div style={{ padding: '12px 18px 4px', display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1.5 }}>THE JOURNEY · המסע שלך</div>
          <div style={{ fontSize: 14, fontWeight: 700, marginTop: 2 }}>
            יום {stats.streak} · {fmt.kg(Math.abs(startWeight - curW), unit)} ק״ג {startWeight > curW ? 'מאחורה' : 'מעל ההתחלה'}
          </div>
        </div>
        <WorkoutStreakBadge onNavigate={onNavigate} />
        <AvatarDot letter={(state.user.name || 'U')[0]} size={32} />
      </div>

      <div style={{ padding: '6px 18px 10px' }}>
        <Card padding={12} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>CURRENT POSITION</div>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
              <span style={{ fontFamily: T.mono, fontSize: 40, fontWeight: 700, letterSpacing: -1.5 }}>{fmt.kg(curW, unit)}</span>
              <span style={{ fontSize: 13, color: T.inkSub }}>{fmt.unitLabel(unit)}</span>
              <DeltaBadge value={stats.dayDelta} unit="" size="sm" />
            </div>
          </div>
          {goal !== null && (
            <div style={{ textAlign: 'left' }}>
              <div style={{ fontFamily: T.mono, fontSize: 22, fontWeight: 700, color: T.lime }}>{Math.round(pct * 100)}%</div>
              <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono }}>של המסע</div>
            </div>
          )}
        </Card>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '4px 18px 20px', position: 'relative' }}>
        <div style={{ position: 'relative', minHeight: 480 }}>
          <div style={{
            position: 'absolute', top: 10, bottom: 10, right: 32, width: 3,
            background: `linear-gradient(180deg, ${T.rose} 0%, ${T.amber} 40%, ${T.lime} 100%)`,
            borderRadius: 3, opacity: 0.35,
          }} />

          {milestones.map((m, i) => {
            const top = posFor(m.w);
            const passed = curW <= m.w && m.kind !== 'start';
            const colorMap = { start: T.rose, peak: T.rose, low: T.lime, goal: T.amber };
            const color = colorMap[m.kind] || T.inkMute;
            return (
              <div key={i} style={{
                position: 'absolute', top: `${top}%`, right: 0, left: 0,
                display: 'flex', alignItems: 'center', gap: 10,
                transform: 'translateY(-50%)',
              }}>
                <div style={{ flex: 1, textAlign: 'left', paddingLeft: 4 }}>
                  <div style={{ fontSize: 11, color: T.inkSub }}>{m.label}</div>
                  {m.date && <div style={{ fontSize: 9, color: T.inkMute, fontFamily: T.mono, marginTop: 1 }}>{fmt.day(m.date)}</div>}
                </div>
                <div style={{ fontFamily: T.mono, fontSize: 13, fontWeight: 700, color, minWidth: 42, textAlign: 'center' }}>
                  {fmt.kg(m.w, unit)}
                </div>
                <div style={{
                  width: m.kind === 'goal' || m.kind === 'start' ? 22 : 14,
                  height: m.kind === 'goal' || m.kind === 'start' ? 22 : 14,
                  borderRadius: '50%',
                  background: passed || m.kind === 'start' ? color : T.bgElev,
                  border: `2px solid ${color}`,
                  marginRight: 26 - (m.kind === 'goal' || m.kind === 'start' ? 4 : 0),
                  boxShadow: passed ? `0 0 12px ${color}80` : 'none',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 10, fontWeight: 900, color: T.bg,
                }}>
                  {m.kind === 'goal' && '★'}
                </div>
              </div>
            );
          })}

          {/* You-are-here marker */}
          <div style={{
            position: 'absolute', top: `${posFor(curW)}%`, right: 8, left: 0,
            transform: 'translateY(-50%)', zIndex: 3,
            display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'flex-end',
          }}>
            <div style={{
              background: T.lime, color: T.bg, padding: '6px 10px', borderRadius: 8,
              fontSize: 11, fontWeight: 800, fontFamily: T.font, position: 'relative',
              boxShadow: `0 4px 20px ${T.lime}66`,
            }}>
              אתה כאן · {fmt.kg(curW, unit)}
              <div style={{
                position: 'absolute', right: -5, top: '50%', transform: 'translateY(-50%) rotate(45deg)',
                width: 10, height: 10, background: T.lime,
              }} />
            </div>
            <div style={{ width: 26, height: 26, borderRadius: 13, background: T.lime, border: `4px solid ${T.bg}`, boxShadow: `0 0 24px ${T.lime}`, marginRight: 18 }} />
          </div>
        </div>

        {stats.etaDays !== null && goal !== null && (
          <Card padding={14} style={{ marginTop: 16, background: `${T.lime}10`, border: `1px solid ${T.lime}40` }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ fontSize: 24 }}>🎯</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: T.inkSub }}>בקצב הנוכחי תגיע ליעד בעוד</div>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
                  <span style={{ fontFamily: T.mono, fontSize: 22, fontWeight: 700, color: T.lime }}>{stats.etaDays}</span>
                  <span style={{ fontSize: 13, color: T.ink }}>ימים</span>
                  {stats.paceKgPerWeek !== null && <span style={{ fontSize: 11, color: T.inkMute, marginRight: 8 }}>· קצב {fmt.signed(stats.paceKgPerWeek)}ק״ג/שב׳</span>}
                </div>
              </div>
            </div>
          </Card>
        )}
      </div>
    </div>
  );
}

// Nutrition mini-widget for home
// ════════════════════════════════════════════════════════════════════
function NutritionWidget({ onNavigate }) {
  const { state, stats } = useStore();
  const goals = state.nutrition.goals;
  const today = todayISO();
  const meals = state.nutrition.meals[today] || [];
  const totals = sumMealsForDay(meals);

  // If no nutrition set up, offer CTA
  if (goals.calories === null) {
    return (
      <Card padding={14} style={{ marginBottom: 14, background: `${T.lime}08`, border: `1px solid ${T.lime}30`, cursor: 'pointer' }}
        onClick={() => onNavigate('nutrition')}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ fontSize: 24 }}>🍎</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700 }}>הוסף מעקב תזונה</div>
            <div style={{ fontSize: 11, color: T.inkSub, marginTop: 2 }}>ניתוח חכם מטקסט או תמונה</div>
          </div>
          <span style={{ color: T.lime, fontSize: 18 }}>‹</span>
        </div>
      </Card>
    );
  }

  const calPct = Math.min(100, (totals.calories / goals.calories) * 100);
  const calColor = totals.calories > goals.calories * 1.05 ? T.rose : T.lime;
  const remaining = goals.calories - totals.calories;
  const proteinPct = goals.protein ? Math.min(100, (totals.protein / goals.protein) * 100) : 0;

  return (
    <Card padding={14} style={{ marginBottom: 14, cursor: 'pointer' }} onClick={() => onNavigate('nutrition')}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
        <div style={{ fontSize: 13, fontWeight: 700 }}>תזונה · היום</div>
        <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono }}>
          {totals.count} ארוחות
        </div>
      </div>

      <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
        <RingGauge pct={calPct} size={72} stroke={8} color={calColor} track={T.stroke}>
          <div style={{ fontFamily: T.mono, fontSize: 15, fontWeight: 700, color: T.ink, letterSpacing: -0.5 }}>
            {totals.calories}
          </div>
          <div style={{ fontSize: 8, color: T.inkMute, fontFamily: T.mono }}>/{goals.calories}</div>
        </RingGauge>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: T.mono, fontSize: 20, fontWeight: 700, color: T.ink, letterSpacing: -1 }}>
            {remaining >= 0 ? remaining : 0}
          </div>
          <div style={{ fontSize: 11, color: T.inkSub }}>
            {remaining > 0 ? 'קלוריות נותרו' : remaining < -50 ? `חריגה ${Math.abs(remaining)}` : 'סגרת את היום'}
          </div>
          {/* Protein bar */}
          <div style={{ marginTop: 8 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: T.inkMute, fontFamily: T.mono, marginBottom: 3 }}>
              <span>חלבון</span>
              <span>{totals.protein}/{goals.protein}ג</span>
            </div>
            <div style={{ height: 4, background: T.stroke, borderRadius: 2, overflow: 'hidden' }}>
              <div style={{ width: `${proteinPct}%`, height: '100%', background: T.lime, transition: 'width 300ms' }} />
            </div>
          </div>
        </div>
      </div>
    </Card>
  );
}


// ════════════════════════════════════════════════════════════════════
// 07-screen-log.jsx — Weight entry with actual save to state
// ════════════════════════════════════════════════════════════════════

function LogScreen({ onClose, onSaved }) {
  const { state, stats, dispatch } = useStore();
  const toast = useToast();
  const unit = state.settings.unit;
  const today = todayISO();
  const existing = state.entries[today];

  // If today has an entry, start with it; else use last entry as reference
  const initialWeight = existing
    ? fmt.kg(existing.weight, unit)
    : stats.current !== null && stats.current !== undefined
      ? fmt.kg(stats.current, unit)
      : '70.0';

  const [weight, setWeight] = React.useState(initialWeight);
  const [note, setNote] = React.useState(existing?.note || '');
  const [showNote, setShowNote] = React.useState(!!existing?.note);

  const handleKey = (k) => {
    if (k === '⌫') return setWeight(w => w.length > 1 ? w.slice(0, -1) : '0');
    if (k === '.' && weight.includes('.')) return;
    if (weight === '0' && k !== '.') return setWeight(k);
    if (weight.replace('.','').length >= 5) return;
    setWeight(w => w + k);
  };

  const wNum = parseFloat(weight);
  const valid = !isNaN(wNum) && wNum > 20 && wNum < 400;

  const deltaFromPrev = valid && stats.current !== null && !existing
    ? wNum - stats.current
    : valid && existing
      ? wNum - (stats.previous !== null ? stats.previous : stats.current)
      : null;

  const handleSave = () => {
    if (!valid) return;
    const weightKg = unit === 'lb' ? wNum / 2.20462 : wNum;
    const rounded = Math.round(weightKg * 10) / 10;

    // Extreme weight sanity check (always evaluated in kg, after unit conversion)
    if (rounded < 30) {
      toast(personaError(state, 'weight_too_low', 'המשקל נמוך מהטווח הסביר'), { type: 'error', duration: 4500 });
      return;
    }
    if (rounded > 300) {
      toast(personaError(state, 'weight_too_high', 'המשקל גבוה מהטווח הסביר'), { type: 'error', duration: 4500 });
      return;
    }

    dispatch({
      type: 'UPSERT_ENTRY',
      date: today,
      weight: rounded,
      time: nowHHMM(),
      note: note.trim(),
    });

    // Immediate toast for the save event
    if (existing) {
      toast('השקילה של היום עודכנה (רק אחת נשמרת ביום)', { type: 'success' });
    } else {
      toast(personaStr(state, 'first_weight', 'נשמר!'), { type: 'success' });
    }

    // ─── Milestone checks (only on new entries, not edits) ──────────
    if (!existing) {
      const goalKg = state.goal?.weight;
      const alreadyReached = state.settings.goalReachedAt;
      const startKg = state.user?.startWeight;

      // 1) GOAL REACHED — crossed the goal for the first time (lose direction only)
      if (goalKg !== null && goalKg !== undefined && !alreadyReached && startKg !== null) {
        const wantingToLose = startKg > goalKg;
        const reached = wantingToLose ? rounded <= goalKg : rounded >= goalKg;
        if (reached) {
          dispatch({ type: 'SET_SETTING', key: 'goalReachedAt', value: today });
          // Delayed toast so the first one doesn't get stomped
          setTimeout(() => {
            toast(personaStr(state, 'goal_reached', 'הגעת ליעד! 🎯'), { type: 'success', duration: 6000 });
          }, 1500);
        }
      }

      // 2) NEW LOW WEIGHT — rounded is lower than tracked lowest (only for loss journey)
      const prevLow = state.settings.lastLowWeight;
      const isLossJourney = startKg !== null && goalKg !== null && goalKg !== undefined && startKg > goalKg;
      if (isLossJourney) {
        if (prevLow === null || rounded < prevLow) {
          dispatch({ type: 'SET_SETTING', key: 'lastLowWeight', value: rounded });
          // Only celebrate if there was a previous low (not the very first entry)
          if (prevLow !== null && prevLow - rounded >= 0.1) {
            setTimeout(() => {
              toast(personaStr(state, 'new_low_weight', 'שיא חדש למטה!'), { type: 'success', duration: 5000 });
            }, 2800);
          }
        }
      }

      // 3) WEIGHT TREND — small up/down toast (significant delta only, >0.2 kg)
      const prevWeight = stats.current;
      if (prevWeight !== null && !existing) {
        const delta = rounded - prevWeight;
        if (delta <= -0.2) {
          setTimeout(() => {
            toast(personaStr(state, 'weight_down_small', 'ירידה קטנה במשקל'), { type: 'info' });
          }, 4000);
        } else if (delta >= 0.2) {
          setTimeout(() => {
            toast(personaStr(state, 'weight_up_small', 'עלייה קטנה במשקל'), { type: 'info' });
          }, 4000);
        }
      }

      // Bump persona interaction counter + check for sincerity moment
      dispatch({ type: 'INCREMENT_PERSONA_INTERACTIONS' });
      const newCount = (state.settings.personaInteractions || 0) + 1;

// ─── Swipeable entry row ────────────────────────────────────────────
function SwipeableEntry({ entry, delta, hasDelta, unit, isLast, onDelete, onClick }) {
  const [swipeX, setSwipeX] = React.useState(0);
  const [moved, setMoved] = React.useState(false);
  const startX = React.useRef(0);
  const currentX = React.useRef(0);

  const onTouchStart = (e) => {
    startX.current = e.touches[0].clientX;
    setMoved(false);
    currentX.current = 0;
  };
  const onTouchMove = (e) => {
    currentX.current = e.touches[0].clientX - startX.current;
    if (Math.abs(currentX.current) > 8) setMoved(true);
    // Only allow swipe left (negative direction in RTL means revealing left-side action)
    if (currentX.current > 0) {
      setSwipeX(Math.min(80, currentX.current));
    } else {
      setSwipeX(0);
    }
  };
  const onTouchEnd = () => {
    if (swipeX > 40) {
      setSwipeX(80);
    } else {
      setSwipeX(0);
    }
  };

  const handleClick = () => {
    if (moved || swipeX > 0) return;
    onClick?.();
  };

  return (
    <div style={{ position: 'relative', overflow: 'hidden', borderBottom: isLast ? 'none' : `1px solid ${T.stroke}` }}>
      {/* Delete action behind */}
      <div style={{
        position: 'absolute', top: 0, bottom: 0, left: 0, width: 80,
        background: T.rose, display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <button onClick={onDelete} style={{
          background: 'transparent', border: 'none', color: T.ink, cursor: 'pointer',
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, padding: 8,
        }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          </svg>
          <span style={{ fontSize: 10, fontWeight: 700 }}>מחק</span>
        </button>
      </div>

      {/* Entry */}
      <div
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        onClick={handleClick}
        style={{
          display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px',
          background: T.bgElev, transform: `translateX(${swipeX}px)`,
          transition: swipeX === 0 || swipeX === 80 ? 'transform 200ms' : 'none',
          cursor: onClick ? 'pointer' : 'default',
        }}
      >
        <div style={{ fontSize: 11, color: T.inkSub, fontFamily: T.mono, width: 70 }}>
          <div>{fmt.dayShort(entry.date)}</div>
          {entry.time && <div style={{ fontSize: 9, color: T.inkMute, marginTop: 2 }}>{entry.time}</div>}
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: T.mono, fontSize: 15, fontWeight: 600 }}>
            {fmt.kg(entry.weight, unit)}<span style={{ fontSize: 11, color: T.inkMute }}> {fmt.unitLabel(unit)}</span>
          </div>
          {entry.note && <div style={{ fontSize: 10, color: T.inkMute, marginTop: 2, maxWidth: 180, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{entry.note}</div>}
        </div>
        {hasDelta && <DeltaBadge value={delta} unit="" size="sm" />}
        <button onClick={() => setSwipeX(swipeX === 0 ? 80 : 0)} style={{
          background: 'transparent', border: 'none', color: T.inkMute, cursor: 'pointer', padding: 4,
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
            <circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/>
          </svg>
        </button>
      </div>
    </div>
  );
}

// ─── Day-of-week analysis card ──────────────────────────────────────
function DowCard({ dowStats, unit }) {
  const dowNames = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
  const avgs = dowStats.map(x => x.avg);
  const maxAvg = Math.max(...avgs);
  const minAvg = Math.min(...avgs);
  return (
    <Card padding={14} style={{ marginBottom: 12 }}>
      <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 4 }}>לפי יום בשבוע</div>
      <div style={{ fontSize: 10, color: T.inkMute, marginBottom: 12 }}>
        ממוצע משקל לפי יום. שימו לב: עם מגמת ירידה יציבה, הניתוח מתעוות.
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, height: 100 }}>
        {dowStats.map(d => {
          const h = 30 + ((d.avg - minAvg) / (maxAvg - minAvg || 1)) * 60;
          const isHeavy = d.avg > (minAvg + maxAvg)/2;
          return (
            <div key={d.dow} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
              <div style={{ fontSize: 9, fontFamily: T.mono, color: T.inkMute }}>{fmt.kg(d.avg, unit)}</div>
              <div style={{ width: '100%', height: `${h}%`, background: isHeavy ? T.rose : T.lime, opacity: 0.8, borderRadius: '4px 4px 0 0' }} />
              <div style={{ fontSize: 11, color: T.inkSub, fontFamily: T.font }}>{dowNames[d.dow]}</div>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

// Weekly insight card

function WeeklyInsightCard() {
  const { state, stats, dispatch } = useStore();
  const toast = useToast();
  const [loading, setLoading] = React.useState(false);
  const cached = state.insights.weekly;
  const hasKey = apiReady(state.apiConfig);

  const snapshot = React.useMemo(() => buildInsightSnapshot(state, stats, 7), [state, stats]);

// ═════════════════════════════════════════════════════════════════════
// Plateau card — shows only if plateau detected (14+ days, <0.3kg variance)
// ═════════════════════════════════════════════════════════════════════
function PlateauCard({ entries }) {
  const { state, stats, dispatch } = useStore();
  const toast = useToast();
  const [loading, setLoading] = React.useState(false);
  const cached = state.insights.plateau;

  // Detect plateau: look at last 14+ days, check if variance is low
  const plateau = React.useMemo(() => {
    if (!entries || entries.length < 4) return null;
    const latest = entries[entries.length - 1];
    const fromDate = addDaysISO(latest.date, -14);
    const recent = entries.filter(e => e.date >= fromDate);
    if (recent.length < 3) return null;
    const weights = recent.map(r => r.weight);
    const range = Math.max(...weights) - Math.min(...weights);
    const spanDays = daysBetweenISO(recent[0].date, recent[recent.length - 1].date);
    // Plateau if spanning 14+ days with range < 0.5kg
    if (spanDays >= 14 && range < 0.5) {
      return { days: spanDays, range: Math.round(range * 10) / 10, count: recent.length };
    }
    return null;
  }, [entries]);

  if (!plateau && !cached) return null;

  const analyze = async () => {
    if (!apiReady(state.apiConfig)) {
      toast('הגדר API בפרופיל', { type: 'error' });
      return;
    }
    setLoading(true);
    try {
      const snapshot = buildInsightSnapshot(state, stats, 21); // 3 weeks for plateau context
      snapshot.plateau_detected = plateau;
      const text = await generatePlateauAnalysis(snapshot, state.apiConfig, (usage) => {
        const cost = estimateCost(usage, state.apiConfig.model);
        dispatch({
          type: 'TRACK_USAGE',
          inputTokens: usage.input_tokens,
          outputTokens: usage.output_tokens,
          feature: 'plateau_analysis',
          costUSD: cost,
        });
      }, state);
      dispatch({
        type: 'SET_INSIGHT', kind: 'plateau',

// ─── Gap indicator under chart ──────────────────────────────────────
function GapIndicator({ entries }) {
  const gaps = findGaps(entries, 3);
  if (gaps.length === 0) return null;
  const total = gaps.reduce((s, g) => s + g.days, 0);
  return (
    <div style={{
      marginTop: 8, padding: '6px 10px', background: T.bgElev2, borderRadius: 8,
      fontSize: 10, color: T.inkMute, fontFamily: T.mono, textAlign: 'center',
    }}>
      {gaps.length} חורים במדידות · {total} ימים חסרים בסה״כ
    </div>
  );
}

// ─── Edit weight entry dialog — edit past weight without deleting ───
function EditWeightEntryDialog({ entry, onClose }) {
  const { state, dispatch } = useStore();
  const toast = useToast();
  const unit = state.settings.unit;
  const [weight, setWeight] = React.useState(fmt.kg(entry.weight, unit));
  const [time, setTime] = React.useState(entry.time || '08:00');
  const [note, setNote] = React.useState(entry.note || '');
  const [date, setDate] = React.useState(entry.date);

  const wNum = parseFloat(weight);
  const valid = !isNaN(wNum) && wNum > 20 && wNum < 400;

  const save = () => {
    if (!valid) return;
    const weightKg = unit === 'lb' ? wNum / 2.20462 : wNum;
    if (date === entry.date) {
      dispatch({
        type: 'UPDATE_WEIGHT_ENTRY',
        date: entry.date,
        updates: { weight: Math.round(weightKg * 10) / 10, time, note: note.trim() },
      });
    } else {
      // Date changed: delete old, upsert new
      dispatch({ type: 'DELETE_ENTRY', date: entry.date });
      dispatch({
        type: 'UPSERT_ENTRY',
        date,
        weight: Math.round(weightKg * 10) / 10,
        time,
        note: note.trim(),
      });
    }
    toast(personaStr(state, 'meal_edited', 'השקילה עודכנה'), { type: 'success' });
    onClose();
  };

  return (
    <div style={{
      position: 'fixed', inset: 0, background: T.bg, zIndex: 820,
      display: 'flex', flexDirection: 'column', direction: 'rtl',
    }}>
      <div style={{ padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 12, borderBottom: `1px solid ${T.stroke}` }}>
        <button onClick={onClose} style={{
          width: 36, height: 36, borderRadius: 18, background: T.bgElev, color: T.ink,
          border: 'none', cursor: 'pointer', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>×</button>
        <div style={{ flex: 1, textAlign: 'center', fontSize: 15, fontWeight: 700 }}>עריכת שקילה</div>
        <div style={{ width: 36 }} />
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: 24 }}>
        <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 6, fontFamily: T.mono, letterSpacing: 1 }}>משקל</div>
        <div style={{ display: 'flex', gap: 6, marginBottom: 16 }}>
          <input value={weight} onChange={e => setWeight(e.target.value.replace(/[^\d.]/g, ''))} inputMode="decimal" style={{
            flex: 1, padding: '14px 16px',
            background: T.bgElev, border: `1px solid ${valid ? T.stroke : T.rose}`, borderRadius: 12,
            color: T.ink, fontSize: 22, fontFamily: T.mono, fontWeight: 600, outline: 'none',
            direction: 'ltr', textAlign: 'center',
          }} />
          <div style={{
            padding: '14px 16px', background: T.bgElev2, borderRadius: 12,
            color: T.inkSub, fontSize: 14, fontFamily: T.mono, display: 'flex', alignItems: 'center',
          }}>{fmt.unitLabel(unit)}</div>
        </div>

        <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 6, fontFamily: T.mono, letterSpacing: 1 }}>תאריך</div>
        <input type="date" value={date} onChange={e => setDate(e.target.value)} max={todayISO()} style={{
          width: '100%', padding: '12px 14px', background: T.bgElev,
          border: `1px solid ${T.stroke}`, borderRadius: 10,
          color: T.ink, fontSize: 14, fontFamily: T.mono, outline: 'none', marginBottom: 16,
          direction: 'ltr', textAlign: 'left',

        <input type="time" value={time} onChange={e => setTime(e.target.value)} style={{

          border: `1px solid ${T.stroke}`, borderRadius: 10,

function GoalScreen({ onClose }) {
  const { state, stats, dispatch } = useStore();
  const toast = useToast();
  const unit = state.settings.unit;
  const current = stats.current;  // in kg

  // Convert between kg (storage) and display unit
  const toDisp = (kg) => unit === 'lb' ? Math.round(kg * 2.20462 * 10) / 10 : kg;
  const toKg = (disp) => unit === 'lb' ? disp / 2.20462 : disp;

  const defaultKg = state.goal.weight !== null
    ? state.goal.weight
    : (current !== null && current !== undefined ? Math.max(40, current - 5) : 70);

  const [goalDisplay, setGoalDisplay] = React.useState(toDisp(defaultKg));
  const [pace, setPace] = React.useState(state.goal.pace || 'balanced');

  const goalKg = toKg(goalDisplay);
  const diffKg = current !== null && current !== undefined ? current - goalKg : 0;
  const diffDisplay = Math.abs(toDisp(Math.abs(diffKg)));
  const weeks = weeksToGoal(current, goalKg, pace);

  const save = () => {
    dispatch({
      type: 'SET_GOAL',
      goal: { weight: Math.round(goalKg * 10) / 10, pace },
    });
    toast('היעד נשמר', { type: 'success' });
    onClose?.();
  };

  const minG = toDisp(Math.max(30, (current || 70) - 40));
  const maxG = toDisp(Math.min(300, (current || 70) + 40));

  return (
    <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>
      <div style={{ padding: '12px 18px 0', display: 'flex', alignItems: 'center', gap: 12 }}>
        <button onClick={onClose} style={{
          width: 36, height: 36, borderRadius: 18, background: T.bgElev, color: T.ink,
          border: 'none', cursor: 'pointer', fontSize: 20,
        }}>×</button>
        <div style={{ flex: 1, textAlign: 'center', fontSize: 14, fontWeight: 700 }}>
          {state.goal.weight !== null ? 'עדכון יעד' : 'הגדרת יעד'}
        </div>
        <div style={{ width: 36 }} />
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '20px 24px 20px' }}>
        {current !== null && current !== undefined && (
          <Card padding={16} style={{ marginBottom: 16, textAlign: 'center' }}>
            <div style={{ display: 'flex', justifyContent: 'space-around', alignItems: 'center' }}>
              <div>
                <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>נוכחי</div>
                <div style={{ fontFamily: T.mono, fontSize: 32, fontWeight: 700, color: T.ink, marginTop: 4 }}>{fmt.kg(current, unit)}</div>
              </div>
              <div style={{ fontSize: 22, color: T.inkMute }}>→</div>
              <div>
                <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>יעד</div>
                <div style={{ fontFamily: T.mono, fontSize: 32, fontWeight: 700, color: T.lime, marginTop: 4 }}>{goalDisplay.toFixed(1)}</div>
              </div>
            </div>
            <div style={{ marginTop: 12, fontSize: 12, color: T.inkSub }}>
              פער של <span style={{ color: T.ink, fontFamily: T.mono, fontWeight: 700 }}>{diffDisplay.toFixed(1)} {fmt.unitLabel(unit)}</span>
            </div>
          </Card>
        )}

        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 8, fontFamily: T.mono, letterSpacing: 1 }}>משקל יעד · {fmt.unitLabel(unit)}</div>
          <NumberStepper
            value={goalDisplay}
            onChange={setGoalDisplay}
            min={minG} max={maxG}
            step={unit === 'lb' ? 1 : 0.5}
            unit={fmt.unitLabel(unit)}
          />
        </div>

        <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 8, fontFamily: T.mono, letterSpacing: 1 }}>קצב</div>
        <Col gap={8} style={{ marginBottom: 24 }}>
          {Object.entries(PACE_CONFIG).map(([key, cfg]) => {
            const w = weeksToGoal(current, goalKg, key);
            const sel = pace === key;
            return (
              <button key={key} onClick={() => setPace(key)} style={{
                display: 'flex', alignItems: 'center', gap: 12, padding: 14,
                border: `1px solid ${sel ? cfg.color : T.stroke}`,
                background: sel ? `${cfg.color}10` : T.bgElev,
                borderRadius: T.radius, cursor: 'pointer', textAlign: 'right',
                direction: 'rtl', fontFamily: T.font, color: T.ink,
              }}>
                <div style={{
                  width: 20, height: 20, borderRadius: 10,
                  border: `2px solid ${sel ? cfg.color : T.stroke}`,

          <GoalCalibrationCard />

      </div>
    </div>
  );
}

// Goal calibration card — AI-driven recommendation based on actual pace
// ════════════════════════════════════════════════════════════════════
function GoalCalibrationCard() {
  const { state, stats, dispatch } = useStore();
  const toast = useToast();
  const [loading, setLoading] = React.useState(false);
  const cached = state.insights.calibration;
  const hasKey = apiReady(state.apiConfig);

  const isStale = cached && (Date.now() - new Date(cached.generatedAt).getTime()) > 7 * 24 * 3600 * 1000;

  const calibrate = async () => {
    if (!hasKey) {
      toast('הגדר API בפרופיל', { type: 'error' });
      return;
    }
    setLoading(true);
    try {
      const snapshot = buildInsightSnapshot(state, stats, 21); // 3 weeks for pace context
      const text = await generateGoalCalibration(snapshot, state.apiConfig, (usage) => {
        const cost = estimateCost(usage, state.apiConfig.model);
        dispatch({
          type: 'TRACK_USAGE',
          inputTokens: usage.input_tokens,
          outputTokens: usage.output_tokens,
          feature: 'goal_calibration',
          costUSD: cost,
        });
      }, state);
      dispatch({
        type: 'SET_INSIGHT', kind: 'calibration',
        payload: { text, generatedAt: new Date().toISOString() },
      });
    } catch (e) {
      toast(personaErrorFromException(state, e), { type: 'error' });
    } finally {
      setLoading(false);
    }
  };

  return (
    <Card padding={14} style={{
      marginBottom: 18, marginTop: 4,
      background: `linear-gradient(135deg, ${T.bgElev} 0%, ${T.bgElev2} 100%)`,
      border: `1px solid ${cached ? T.strokeHi : T.stroke}`,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
        <div style={{
          width: 28, height: 28, borderRadius: 14,
          background: `${T.lime}25`, display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 14,
        }}>✨</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>כיול יעד · AI</div>
          <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono }}>
            השוואה בין הקצב המתוכנן לקצב בפועל
          </div>
        </div>
        {cached && !loading && (
          <button onClick={calibrate} style={{
            background: 'transparent', border: `1px solid ${T.stroke}`, color: T.inkSub,
            padding: '5px 10px', borderRadius: 8, fontSize: 11, fontFamily: T.mono,
            cursor: 'pointer',
          }}>רענן</button>
        )}
      </div>

      {loading ? (
        <LoadingPersona message="מכייל את היעד שלך..." />
      ) : cached ? (
        <>
          <div style={{ fontSize: 13, lineHeight: 1.7, color: T.ink, whiteSpace: 'pre-wrap', marginTop: 4 }}>
            {cached.text}
          </div>
          <div style={{ fontSize: 9, color: T.inkMute, fontFamily: T.mono, marginTop: 10, textAlign: 'left', direction: 'ltr' }}>
            {fmt.relativeDay(cached.generatedAt.slice(0, 10))} · {isStale ? 'ישן' : 'עדכני'}
          </div>
        </>
      ) : (
        <>
          <div style={{ fontSize: 12, color: T.inkSub, lineHeight: 1.6, marginBottom: 12 }}>
            המנוע יבדוק את הקצב המתוכנן מול הקצב בפועל ב-3 השבועות האחרונים, ויציע התאמה למספר הקלוריות או ללוח הזמנים.
          </div>
          <button onClick={calibrate} disabled={!hasKey} style={{
            background: hasKey ? T.lime : T.bgElev2, color: hasKey ? T.bg : T.inkMute,
            border: 'none', padding: '10px 16px', borderRadius: 10,
            fontSize: 13, fontWeight: 700, fontFamily: T.font,
            cursor: hasKey ? 'pointer' : 'not-allowed', width: '100%',
          }}>
            {hasKey ? 'כייל בעזרת AI' : 'הגדר API בפרופיל'}
          </button>
        </>
      )}
    </Card>
  );
}

function ProfileScreen({ onNavigate }) {
  const { state, stats, dispatch } = useStore();
  const toast = useToast();
  const [confirmReset, setConfirmReset] = React.useState(false);
  const [showEdit, setShowEdit] = React.useState(false);
  const [showApiConfig, setShowApiConfig] = React.useState(false);
  const [showUsage, setShowUsage] = React.useState(false);
  const [showTips, setShowTips] = React.useState(false);
  const [showPersona, setShowPersona] = React.useState(false);
  const [showNotifications, setShowNotifications] = React.useState(false);
  const currentPersona = state.settings.persona || 'neutral';
  const personaLabel = PERSONAS[currentPersona]?.name || 'ישיר';

  const handleExport = () => {
    const data = {
      ...state,
      exportedAt: new Date().toISOString(),
      exportedBy: 'mishkach-pwa',
    };
    // Strip the API key on export for safety
    if (data.apiConfig) data.apiConfig = { ...data.apiConfig, key: '', sharedPassword: '' };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mishkach-backup-${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('הורדת גיבוי (ללא מפתח API)', { type: 'success' });
  };

  const handleImport = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json,.json';
    input.onchange = (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (!imported.entries && !imported.user) throw new Error('Invalid structure');
          // Preserve current API key on import
          imported.apiConfig = { ...imported.apiConfig, key: state.apiConfig.key, sharedPassword: state.apiConfig.sharedPassword };
          dispatch({ type: 'IMPORT_STATE', state: imported });
          toast('הנתונים יובאו בהצלחה', { type: 'success' });
        } catch (err) {
          toast('קובץ לא תקין', { type: 'error' });
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const handleReset = () => {
    dispatch({ type: 'RESET_ALL' });
    setConfirmReset(false);
    toast('כל הנתונים נמחקו', { type: 'info' });

  const entries = Object.keys(state.entries).length;

  const month = todayISO().slice(0, 7);

  const isShared = state.apiConfig.mode === 'shared';

    : isShared

  return (

      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '6px 18px 20px' }}>
        {/* User card */}
        <Card padding={16} style={{ marginBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>

              <div style={{ fontSize: 12, color: T.inkSub, fontFamily: T.mono, marginTop: 2 }}>
                {state.user.heightCm} ס״מ · {state.user.ageYears} שנים · {daysActive} ימים במעקב
              </div>
            </div>
            <button onClick={() => setShowEdit(true)} style={{
              background: T.bgElev2, border: 'none', color: T.ink, cursor: 'pointer',

function Section({ title, children }) {

}

function RowItem({ icon, label, value, right, onClick, danger = false }) {
  const iconColor = danger ? T.rose : T.lime;
  return (
    <div onClick={onClick} style={{
      display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px',

      <div style={{
        width: 32, height: 32, borderRadius: 10, flexShrink: 0,

      {right}

}

  'claude-opus-4-6':           { in: 5,  out: 25 },
  'claude-sonnet-4-6':         { in: 3,  out: 15 },
  'claude-haiku-4-5-20251001': { in: 1,  out: 5 },
};

// Model tiering: use the cheaper-but-excellent Sonnet for text parsing,
// keep Opus 4.7 for vision and reasoning-heavy insights.
const MODEL_BY_FEATURE = {
  nutrition_text:     'claude-sonnet-4-6',   // 40% cheaper, near-Opus quality on text
  nutrition_image:    'claude-opus-4-7',     // vision matters for product recognition

  plateau_analysis:   'claude-opus-4-7',
  goal_calibration:   'claude-opus-4-7',
};

const DEFAULT_MODEL = 'claude-opus-4-7';

// ─── Low-level API call with dual-mode support ──────────────────────
// config: { mode: 'direct'|'shared', key, sharedPassword }
async function callClaude({ config, model = DEFAULT_MODEL, system, messages, maxTokens = 1024, onUsage }) {
  const mode = config?.mode || 'direct';
  const isShared = mode === 'shared';

  // Validate credentials
  if (isShared) {
    if (!config?.sharedPassword) throw new Error('חסר קוד גישה. הגדר בפרופיל.');
  } else {
    if (!config?.key) throw new Error('חסר API key. הוסף אותו בפרופיל.');
  }

  const body = { model, max_tokens: maxTokens, messages };
  if (system) body.system = system;

  const url = isShared ? PROXY_URL : CLAUDE_API_URL;
  const headers = isShared ? {
    'content-type': 'application/json',
    'x-app-password': config.sharedPassword,
  } : {
    'x-api-key': config.key,
    'anthropic-version': CLAUDE_API_VERSION,
    'content-type': 'application/json',
    'anthropic-dangerous-direct-browser-access': 'true',
  };

  let resp;
  try {
    resp = await fetch(url, {
      method: 'POST',
      headers,
      body: JSON.stringify(body),
    });
  } catch (netErr) {
    throw new Error('כשל רשת. בדוק חיבור אינטרנט.');
  }

  const data = await resp.json().catch(() => ({}));

  if (!resp.ok) {
    const msg = data?.error?.message || `HTTP ${resp.status}`;
    const type = data?.error?.type || '';
    if (type === 'authentication_error') throw new Error(isShared ? 'קוד גישה שגוי.' : 'API key לא תקין.');
    if (type === 'rate_limit_error')     throw new Error('חריגת קצב. נסה שוב בעוד רגע.');
    if (type === 'overloaded_error')     throw new Error('השירות עמוס. נסה שוב.');
    if (type === 'cap_exceeded')         throw new Error(msg); // server-provided Hebrew msg
    if (type === 'server_error')         throw new Error(`תקלת שרת: ${msg}`);
    throw new Error(msg);
  }

  // Track usage
  if (onUsage && data.usage) {
    onUsage({
      input_tokens: data.usage.input_tokens || 0,
      output_tokens: data.usage.output_tokens || 0,
      model,
    });
  }

  const text = (data.content || [])
    .filter(b => b.type === 'text')
    .map(b => b.text)
    .join('\n');

  return {
    text,
    usage: data.usage,
    raw: data,
    // Proxy passes through weekly budget info when available
    weeklySpend: data._weekly_spend,
    weeklyCap: data._weekly_cap,
    weeklyWarning: data._warning,
  };
}

// ─── JSON extraction (handles wrapped / bare JSON) ──────────────────
function extractJSON(text) {
  if (!text) throw new Error('תשובה ריקה מהמנוע.');
  // Try direct parse first
  try { return JSON.parse(text); } catch (_) {}
  // Try to find JSON block in markdown fence
  const fence = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) {
    try { return JSON.parse(fence[1]); } catch (_) {}
  }
  // Try to find first { ... } balanced
  const start = text.indexOf('{');
  const end = text.lastIndexOf('}');
  if (start !== -1 && end > start) {
    try { return JSON.parse(text.slice(start, end + 1)); } catch (_) {}
  }
  throw new Error('הפלט שהתקבל לא תקין.');
}

// ─── Cost estimation ────────────────────────────────────────────────
function estimateCost(usage, model = DEFAULT_MODEL) {
  const p = PRICING[model] || PRICING[DEFAULT_MODEL];
  const inCost  = (usage.input_tokens  / 1_000_000) * p.in;
  const outCost = (usage.output_tokens / 1_000_000) * p.out;
  return inCost + outCost;
}

// ─── Image compression for API ──────────────────────────────────────
// Compress to max 1280px longest side, quality 0.82, return base64 JPEG
async function compressImageToBase64(file, maxDim = 1280, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        const base64 = dataUrl.split(',')[1];
        resolve({ base64, mediaType: 'image/jpeg', width: w, height: h, dataUrl });
      };
      img.onerror = () => reject(new Error('שגיאה בטעינת התמונה.'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('שגיאה בקריאת הקובץ.'));
    reader.readAsDataURL(file);
  });
}

// ─── Create a tiny thumbnail for storage (100x100 sq crop) ──────────
async function makeThumbnail(file, size = 96) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const minDim = Math.min(img.width, img.height);
        const sx = (img.width - minDim) / 2;
        const sy = (img.height - minDim) / 2;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, size, size);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.onerror = () => reject(new Error('thumbnail failed'));
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ─── High-level: parse meal from text (Sonnet 4.6 — 40% cheaper) ────
async function parseNutritionFromText(text, config, onUsage) {
  const p = PROMPTS.nutritionText;
  const { text: responseText } = await callClaude({
    config,
    model: MODEL_BY_FEATURE.nutrition_text,
    system: p.system,
    messages: [{ role: 'user', content: p.userPrefix + text }],
    maxTokens: p.maxTokens,
    onUsage,
  });
  const parsed = extractJSON(responseText);
  return normalizeNutrition(parsed);
}

// ─── High-level: parse meal from image (Opus 4.7 — vision quality) ──
async function parseNutritionFromImage(file, config, onUsage) {
  const { base64, mediaType } = await compressImageToBase64(file);
  const p = PROMPTS.nutritionImage;
  const { text: responseText } = await callClaude({
    config,
    model: MODEL_BY_FEATURE.nutrition_image,
    system: p.system,
    messages: [{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
        { type: 'text', text: p.userText },
      ],
    }],
    maxTokens: p.maxTokens,
    onUsage,
  });
  const parsed = extractJSON(responseText);
  const thumb = await makeThumbnail(file).catch(() => null);
  return { ...normalizeNutrition(parsed), thumbnail: thumb };
}

// ─── Normalize: ensure numbers, default missing ─────────────────────
function normalizeNutrition(p) {
  const num = (v, def = 0) => {
    const n = typeof v === 'number' ? v : parseFloat(v);
    return isNaN(n) ? def : Math.round(n);
  };
  return {
    calories: Math.max(0, num(p.calories)),
    protein:  Math.max(0, num(p.protein)),
    carbs:    Math.max(0, num(p.carbs)),
    fat:      Math.max(0, num(p.fat)),
    items:    Array.isArray(p.items) ? p.items : [],
    detected: p.detected || 'text',
    productName: p.productName || '',
    confidence: p.confidence || 'medium',
    notes: p.notes || '',
  };
}

      <RingGauge pct={calPct} size={130} stroke={12} color={calColor} track={T.stroke}>
        <div style={{ fontFamily: T.mono, fontSize: 28, fontWeight: 700, color: T.ink, letterSpacing: -1 }}>{totals.calories}</div>
        <div style={{ fontSize: 9, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>/ {goals.calories}</div>
      </RingGauge>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>קלוריות · CALORIES</div>
        <div style={{ fontFamily: T.mono, fontSize: 32, fontWeight: 700, letterSpacing: -1, color: T.ink, marginTop: 4 }}>
          {remaining >= 0 ? remaining : 0}
        </div>
        <div style={{ fontSize: 12, color: T.inkSub, marginTop: 2 }}>
          {remaining > 0 ? `נותרו היום` : remaining < -50 ? `חריגה של ${Math.abs(remaining)}` : `סגרת את היום`}
        </div>
        {totals.count > 0 && (
          <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, marginTop: 6 }}>
            {totals.count} ארוחות · ~{Math.round(totals.calories / totals.count)} לארוחה
          </div>
        )}
      </div>
    </Card>
  );
}

// ─── Macro card — big, readable ────────────────────────────────────
function MacroCard({ label, val, goal, color }) {
  const pct = goal ? Math.min(100, (val / goal) * 100) : 0;
  const pctRounded = Math.round(pct);
  const pctColor = pct >= 95 ? T.lime : pct >= 70 ? T.amber : T.inkSub;
  return (
    <Card padding={12} style={{ textAlign: 'center', background: T.bgElev }}>
      <div style={{ fontSize: 12, color: T.inkSub, fontWeight: 700 }}>{label}</div>
      <div style={{ marginTop: 8, display: 'flex', alignItems: 'baseline', justifyContent: 'center', gap: 3 }}>
        <span style={{ fontFamily: T.mono, fontSize: 26, fontWeight: 800, color: T.ink, letterSpacing: -1, lineHeight: 1 }}>{val}</span>
        <span style={{ fontSize: 14, color: T.inkSub, fontFamily: T.mono, fontWeight: 600 }}>ג</span>
      </div>
      <div style={{ fontSize: 11, color: T.inkMute, fontFamily: T.mono, marginTop: 4 }}>
        מתוך {goal}ג
      </div>
      <div style={{ height: 6, background: T.stroke, borderRadius: 3, overflow: 'hidden', marginTop: 8 }}>
        <div style={{ width: `${pct}%`, height: '100%', background: color, borderRadius: 3, transition: 'width 300ms' }} />
      </div>
      <div style={{ fontSize: 12, color: pctColor, fontFamily: T.mono, marginTop: 6, fontWeight: 700 }}>
        {pctRounded}%
      </div>
    </Card>
  );
}

// ─── Meal row (swipeable, clickable to edit) ──────────────────────
function MealRow({ meal, dateViewing, isLast, onDelete, onClick }) {
  const [swipeX, setSwipeX] = React.useState(0);
  const [moved, setMoved] = React.useState(false);
  const startX = React.useRef(0);
  const onTouchStart = (e) => { startX.current = e.touches[0].clientX; setMoved(false); };
  const onTouchMove = (e) => {
    const dx = e.touches[0].clientX - startX.current;
    if (Math.abs(dx) > 8) setMoved(true);
    if (dx > 0) setSwipeX(Math.min(80, dx));
    else setSwipeX(0);
  };
  const onTouchEnd = () => setSwipeX(swipeX > 40 ? 80 : 0);

  const handleClick = () => {
    if (moved || swipeX > 0) return; // ignore click after swipe
    onClick?.();
  };

  const sourceIcon = meal.source === 'photo_parse' ? '📷' : meal.source === 'label_parse' ? '🏷️' : meal.source === 'manual' ? '✏️' : meal.source === 'favorite' ? '⭐' : '💬';

  return (
    <div style={{ position: 'relative', overflow: 'hidden', borderBottom: isLast ? 'none' : `1px solid ${T.stroke}` }}>
      <div style={{
        position: 'absolute', top: 0, bottom: 0, left: 0, width: 80,
        background: T.rose, display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <button onClick={onDelete} style={{
          background: 'transparent', border: 'none', color: T.ink, cursor: 'pointer',
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, padding: 8,
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          <span style={{ fontSize: 10, fontWeight: 700 }}>מחק</span>
        </button>
      </div>
      <div onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} onClick={handleClick} style={{
        display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px',
        background: T.bgElev, transform: `translateX(${swipeX}px)`,
        transition: swipeX === 0 || swipeX === 80 ? 'transform 200ms' : 'none',
        cursor: 'pointer',
      }}>
        {meal.thumbnail ? (
          <img src={meal.thumbnail} alt="" style={{ width: 40, height: 40, borderRadius: 8, objectFit: 'cover', flexShrink: 0 }} />
        ) : (
          <div style={{ width: 40, height: 40, borderRadius: 8, background: T.bgElev2, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, flexShrink: 0 }}>
            {sourceIcon}
          </div>
        )}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: T.ink, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{meal.description}</div>
          <div style={{ fontSize: 11, color: T.inkSub, fontFamily: T.mono, marginTop: 3 }}>
            {meal.time} · <span style={{ color: T.lime }}>{meal.protein}ג</span> חלבון · <span style={{ color: T.amber }}>{meal.carbs}ג</span> פחמ׳ · <span style={{ color: T.rose }}>{meal.fat}ג</span> שומן
          </div>
        </div>
        <div style={{ textAlign: 'left', fontFamily: T.mono, fontSize: 18, fontWeight: 700, color: T.ink, minWidth: 40 }}>
          {meal.calories}

// ─── Favorites flow — reuse previously saved meals ──────────────────
function FavoritesFlow({ date, onClose }) {
  const { state, dispatch } = useStore();
  const toast = useToast();
  const [query, setQuery] = React.useState('');
  const [pending, setPending] = React.useState(null); // { fav, scale }

  const favs = sortedFavorites(state.nutrition.favorites, 50);
  const filtered = query
    ? favs.filter(f => f.description.toLowerCase().includes(query.toLowerCase()))
    : favs;

  const addFav = (fav, scale = 1) => {
    dispatch({
      type: 'ADD_MEAL', date,
      meal: {
        time: nowHHMM(),
        description: fav.description + (scale !== 1 ? ` (×${scale})` : ''),
        calories: Math.round(fav.calories * scale),
        protein: Math.round(fav.protein * scale),
        carbs: Math.round(fav.carbs * scale),
        fat: Math.round(fav.fat * scale),
        source: 'favorite',
        thumbnail: fav.thumbnail || null,
        items: [], confidence: 'high',
      },
    });
    toast(personaStr(state, 'favorite_added', 'נוסף מהמועדפים'), { type: 'success' });
    onClose();
  };

  if (favs.length === 0) {
    return (
      <div style={{ padding: 40, textAlign: 'center' }}>
        <div style={{ fontSize: 40, marginBottom: 10 }}>⭐</div>
        <div style={{ fontSize: 14, color: T.inkSub, lineHeight: 1.6 }}>
          עדיין אין מועדפים.<br />
          כל ארוחה שתוסיף תישמר אוטומטית כאן לשימוש חוזר.
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: '14px 18px 20px' }}>
      {favs.length > 5 && (
        <input
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder="חפש בארוחות שלך..."
          style={{
            width: '100%', padding: '10px 14px', background: T.bgElev,
            border: `1px solid ${T.stroke}`, borderRadius: 10,
            color: T.ink, fontSize: 13, fontFamily: T.font, outline: 'none',
            direction: 'rtl', textAlign: 'right', marginBottom: 12,
          }}
        />
      )}

      <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1, marginBottom: 8 }}>
        {filtered.length} ארוחות · לחץ להוספה · לחץ ארוך לשינוי כמות
      </div>

      {filtered.map(f => (
        <FavoriteRow key={f.key} fav={f}
          onClick={() => addFav(f, 1)}
          onLongPress={() => setPending({ fav: f, scale: 1 })}
          onRemove={() => {
            const favCopy = { ...state.nutrition.favorites[f.key] };
            const favKey = f.key;
            dispatch({ type: 'REMOVE_FAVORITE', favKey });
            toast(personaStr(state, 'favorite_removed', 'הוסר מהמועדפים'), {
              type: 'info',
              duration: 5000,
              actionLabel: 'בטל',
              onAction: () => {
                dispatch({ type: 'RESTORE_FAVORITE', favKey, fav: favCopy });
              },
            });
          }}
        />
      ))}

      {pending && <ScaleFavoriteDialog fav={pending.fav}
        onConfirm={(scale) => { addFav(pending.fav, scale); setPending(null); }}
        onCancel={() => setPending(null)}
      />}
    </div>
  );
}

function FavoriteRow({ fav, onClick, onLongPress, onRemove }) {
  const pressTimer = React.useRef(null);
  const longPressed = React.useRef(false);
  const handleDown = () => {
    longPressed.current = false;
    pressTimer.current = setTimeout(() => {
      longPressed.current = true;
      onLongPress?.();
    }, 500);
  };
  const handleUp = () => {
    if (pressTimer.current) clearTimeout(pressTimer.current);
    if (!longPressed.current) onClick?.();
  };
  const handleCancel = () => {
    if (pressTimer.current) clearTimeout(pressTimer.current);
  };

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px',
      background: T.bgElev, borderRadius: T.radius, marginBottom: 6, cursor: 'pointer',

// ─── Text parse flow ────────────────────────────────────────────────
function TextParseFlow({ onParsed }) {
  const { state, dispatch } = useStore();
  const toast = useToast();
  const [text, setText] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);

  const handleParse = async () => {
    if (!text.trim()) return;
    setLoading(true); setError(null);
    try {
      const result = await parseNutritionFromText(text.trim(), state.apiConfig, (usage) => {
        const cost = estimateCost(usage, state.apiConfig.model);
        dispatch({
          type: 'TRACK_USAGE',
          inputTokens: usage.input_tokens,
          outputTokens: usage.output_tokens,
          feature: 'nutrition_text',
          costUSD: cost,
        });
      });
      onParsed({ ...result, description: text.trim() });
    } catch (e) {
      setError(e.message);
      toast(personaErrorFromException(state, e), { type: 'error' });
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ padding: 24 }}>
      <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 8, fontFamily: T.mono, letterSpacing: 1 }}>תיאור הארוחה</div>
      <textarea
        value={text}
        onChange={e => setText(e.target.value)}
        placeholder="למשל: שניצל 200 גרם עם אורז ירקות וסלט ישראלי, בסוף מעדן פרו"
        autoFocus rows={4}
        style={{
          width: '100%', padding: '14px 16px', background: T.bgElev, border: `1px solid ${T.stroke}`,
          borderRadius: 12, color: T.ink, fontSize: 15, fontFamily: T.font, outline: 'none',
          direction: 'rtl', textAlign: 'right', resize: 'none',
        }}
      />
      <div style={{ fontSize: 11, color: T.inkMute, marginTop: 8, lineHeight: 1.5 }}>
        מנוע AI מעריך ומציע. תוכל לערוך בשלב הבא.
      </div>
      {error && <div style={{ marginTop: 12, padding: '10px 14px', background: `${T.rose}15`, border: `1px solid ${T.rose}44`, borderRadius: 10, fontSize: 12, color: T.rose }}>{error}</div>}
      <div style={{ marginTop: 20 }}>
        <Button onClick={handleParse} disabled={!text.trim() || loading}>
          {loading ? 'מנתח...' : 'נתח'}
        </Button>
      </div>
    </div>
  );
}

// ─── Photo parse flow ───────────────────────────────────────────────
function PhotoParseFlow({ onParsed }) {
  const { state, dispatch } = useStore();
  const toast = useToast();
  const [file, setFile] = React.useState(null);
  const [preview, setPreview] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);

  const handleFile = (f) => {
    if (!f) return;
    setFile(f);
    const reader = new FileReader();
    reader.onload = (e) => setPreview(e.target.result);
    reader.readAsDataURL(f);
  };

  const handleParse = async () => {
    if (!file) return;
    setLoading(true); setError(null);
    try {
      const result = await parseNutritionFromImage(file, state.apiConfig, (usage) => {
        const cost = estimateCost(usage, state.apiConfig.model);
        dispatch({
          type: 'TRACK_USAGE',
          inputTokens: usage.input_tokens,
          outputTokens: usage.output_tokens,
          feature: 'nutrition_image',
          costUSD: cost,
        });
      });
      const desc = result.productName || result.items?.map(i => `${i.name} ${i.amount}`).join(', ') || 'ארוחה';
      onParsed({ ...result, description: desc }, result.thumbnail);
    } catch (e) {
      setError(e.message);
      toast(personaErrorFromException(state, e), { type: 'error' });
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ padding: 24 }}>
      {!preview ? (
        <>
          <div style={{ fontSize: 12, color: T.inkSub, lineHeight: 1.5, marginBottom: 20 }}>
            צלם ארוחה, תווית תזונה (לוח תזונה), או מוצר ממותג (מעדני פרו, יוגורט וכו׳). המערכת תזהה ותציע ערכים.
          </div>
          <label style={{
            display: 'block', padding: '40px 20px', background: T.bgElev, border: `2px dashed ${T.stroke}`,
            borderRadius: T.radiusL, textAlign: 'center', cursor: 'pointer',
          }}>
            <div style={{ fontSize: 48, marginBottom: 10 }}>📷</div>
            <div style={{ fontSize: 15, fontWeight: 700, color: T.ink }}>בחר או צלם תמונה</div>
            <div style={{ fontSize: 11, color: T.inkSub, marginTop: 4 }}>JPG/PNG, עד ~3MB אחרי דחיסה</div>
            <input type="file" accept="image/*" capture="environment" style={{ display: 'none' }}
              onChange={e => handleFile(e.target.files?.[0])} />
          </label>
        </>
      ) : (
        <>
          <img src={preview} alt="preview" style={{
            width: '100%', maxHeight: 320, objectFit: 'contain',
            borderRadius: T.radius, background: T.bgElev, marginBottom: 16,
          }} />
          {error && <div style={{ marginBottom: 12, padding: '10px 14px', background: `${T.rose}15`, border: `1px solid ${T.rose}44`, borderRadius: 10, fontSize: 12, color: T.rose }}>{error}</div>}
          <div style={{ display: 'flex', gap: 10 }}>
            <Button variant="ghost" onClick={() => { setFile(null); setPreview(null); }}>החלף</Button>
            <Button onClick={handleParse} disabled={loading}>
              {loading ? 'מנתח...' : 'נתח את התמונה'}
            </Button>
          </div>
        </>
      )}
    </div>
  );
}

function ReviewAndSave({ result, thumbnail, source, date, onDone }) {
  const { state, dispatch } = useStore();
  const toast = useToast();
  const [desc, setDesc] = React.useState(result.description || '');
  const [cal, setCal] = React.useState(result.calories);
  const [p, setP] = React.useState(result.protein);
  const [c, setC] = React.useState(result.carbs);
  const [f, setF] = React.useState(result.fat);

  const save = () => {
    dispatch({
      type: 'ADD_MEAL',
      date,
      meal: {
        time: nowHHMM(),
        description: desc.trim() || 'ארוחה',
        calories: cal, protein: p, carbs: c, fat: f,
        source,
        thumbnail: thumbnail || null,
        aiNotes: result.notes || '',

// ─── MealSearchDialog: search across all meals ever recorded ──────
function MealSearchDialog({ onClose, onJumpToDate }) {
  const { state } = useStore();
  const [query, setQuery] = React.useState('');
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (inputRef.current) inputRef.current.focus();
  }, []);

  // Flatten all meals across all dates with their date attached
  const allMeals = React.useMemo(() => {
    const out = [];
    const meals = state.nutrition?.meals || {};
    Object.keys(meals).forEach(date => {
      (meals[date] || []).forEach(m => {
        out.push({ ...m, _date: date });
      });
    });
    // Sort by date desc, then time desc
    out.sort((a, b) => {
      if (a._date !== b._date) return b._date.localeCompare(a._date);
      return (b.time || '').localeCompare(a.time || '');
    });
    return out;
  }, [state.nutrition?.meals]);

  // Filter
  const filtered = query.trim()
    ? allMeals.filter(m => (m.description || '').toLowerCase().includes(query.toLowerCase()))
    : allMeals.slice(0, 50); // limit when no query

  return (
    <div style={{
      position: 'fixed', inset: 0, background: T.bg, zIndex: 825,
      display: 'flex', flexDirection: 'column', direction: 'rtl',
    }}>
      <div style={{ padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 12, borderBottom: `1px solid ${T.stroke}` }}>
        <button onClick={onClose} style={{
          width: 36, height: 36, borderRadius: 18, background: T.bgElev, color: T.ink,
          border: 'none', cursor: 'pointer', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>×</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>SEARCH · חיפוש</div>
          <div style={{ fontSize: 17, fontWeight: 700 }}>בכל הארוחות</div>
        </div>
      </div>

      <div style={{ padding: '14px 18px 8px' }}>
        <input
          ref={inputRef}
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder="חפש לפי תיאור, רכיב, או מילה..."
          style={{
            width: '100%', padding: '12px 16px', background: T.bgElev,
            border: `1px solid ${T.stroke}`, borderRadius: 10,
            color: T.ink, fontSize: 14, fontFamily: T.font, outline: 'none',
            direction: 'rtl', textAlign: 'right',
          }}
        />
      </div>

      <div style={{ padding: '4px 18px', fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>
        {query.trim() ? `${filtered.length} תוצאות` : `${filtered.length} ארוחות אחרונות`}
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '8px 18px 20px' }}>
        {filtered.length === 0 ? (
          <div style={{ padding: '40px 20px', textAlign: 'center', fontSize: 14, color: T.inkMute }}>
            {query.trim() ? 'אין ארוחות שמתאימות' : 'עדיין לא נרשמו ארוחות'}
          </div>
        ) : (
          filtered.map(m => (
            <Card key={`${m._date}-${m.id}`} padding={12} style={{ marginBottom: 8, cursor: 'pointer' }}
              onClick={() => onJumpToDate(m._date)}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 0.5 }}>
                  {fmt.day(m._date)} · {m.time}
                </div>
                <div style={{ fontSize: 10, color: T.amber, fontFamily: T.mono, letterSpacing: 0.5 }}>
                  {m.calories} ק״ק
                </div>
              </div>
              <div style={{ fontSize: 14, fontWeight: 600, color: T.ink, lineHeight: 1.4 }}>
                {m.description || 'ארוחה'}
              </div>
              <div style={{ fontSize: 11, color: T.inkSub, marginTop: 4, fontFamily: T.mono }}>
                ח׳ {m.protein}g · פ׳ {m.carbs}g · ש׳ {m.fat}g
              </div>
            </Card>
          ))
        )}
      </div>
    </div>

const CAT_LABELS = {
  scale:     'מאזניים',

// ─── Resolve tip content for current user's persona + gender ───────
function resolveTipVoice(tip, state) {
  const personaId = state?.settings?.persona || 'neutral';
  const gender = state?.user?.gender === 'female' ? 'female' : 'male';
  const name = (state?.user?.name || '').trim();

  const personaVoices = tip.voices?.[personaId] || tip.voices?.neutral || {};
  const genderVoice = personaVoices[gender] || personaVoices.male || {};

  // Runtime name substitution: replace "אלון" or "מירב" placeholder with actual user name
  let title = genderVoice.title || '';
  let body = genderVoice.body || '';
  if (name) {
    const placeholder = gender === 'female' ? 'מירב' : 'אלון';
    // Only replace if the name is different from placeholder
    if (name !== placeholder) {
      const re = new RegExp(placeholder, 'g');
      title = title.replace(re, name);
      body = body.replace(re, name);
    }
  }
  return { title, body };
}

// ─── Tips rotation: never repeat until all shown ───────────────────
function getNextTipFor(state) {
  const shown = state?.settings?.tipsShown || [];
  const available = CREATIVE_TIPS.filter(t => !shown.includes(t.id));
  if (available.length === 0) {
    const t = CREATIVE_TIPS[Math.floor(Math.random() * CREATIVE_TIPS.length)];
    return { tip: t, voice: resolveTipVoice(t, state), resetHistory: true };
  }
  // Deterministic by date — same tip per day
  const today = todayISO();
  const d = new Date(today + 'T00:00:00Z');
  const daysSinceEpoch = Math.floor(d.getTime() / (24 * 3600 * 1000));
  const t = available[daysSinceEpoch % available.length];
  return { tip: t, voice: resolveTipVoice(t, state), resetHistory: false };
}

// ─── Tip of day card ──────────────────────────────────────────────
function CreativeTipOfDay({ onExpand }) {
  const { state, dispatch } = useStore();
  const [expanded, setExpanded] = React.useState(false);

  const { tip, voice, resetHistory } = React.useMemo(
    () => getNextTipFor(state),
    [state.settings.persona, state.settings.tipsShown?.length, state.user?.gender, state.user?.name]
  );

  const handleExpand = () => {
    if (!expanded) {
      if (resetHistory) dispatch({ type: 'RESET_TIPS_SHOWN' });
      dispatch({ type: 'MARK_TIP_SHOWN', tipId: tip.id });
    }
    setExpanded(v => !v);
    if (onExpand) onExpand();
  };

  return (
    <Card padding={14} style={{
      marginBottom: 14, cursor: 'pointer',
      background: `linear-gradient(135deg, ${T.bgElev} 0%, ${T.bgElev2} 100%)`,
      border: `1px solid ${T.stroke}`,
    }} onClick={handleExpand}>
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
        <div style={{
          width: 32, height: 32, borderRadius: 10, flexShrink: 0,
          background: `${T.amber}22`, color: T.amber,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <TabIcon name="lightbulb" size={18} />
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 10, color: T.amber, fontFamily: T.mono, letterSpacing: 1, marginBottom: 4 }}>
            טיפ היום · {CAT_LABELS[tip.category] || tip.category}
          </div>
          <div style={{ fontSize: 14, fontWeight: 700, color: T.ink, lineHeight: 1.4, marginBottom: expanded ? 8 : 0 }}>
            {voice.title}
          </div>
          {expanded && (
            <div style={{ fontSize: 13, color: T.inkSub, lineHeight: 1.8, marginTop: 8 }}>
              {voice.body}
            </div>
          )}
          {!expanded && (
            <div style={{ fontSize: 11, color: T.inkMute, marginTop: 4 }}>לחץ להרחבה</div>
          )}
        </div>
      </div>
    </Card>
  );
}

// ════════════════════════════════════════════════════════════════════
// Uses Notification API + setTimeout for in-session reminder.
// For persistent reminders while app is closed, SW must be registered
// and scheduled via showNotification from service worker on schedule
// (we do best-effort local notification; proper push requires server).

function isNotificationSupported() {
  return typeof window !== 'undefined' && 'Notification' in window;
}

async function requestNotificationPermission() {
  if (!isNotificationSupported()) return 'unsupported';
  if (Notification.permission === 'granted') return 'granted';
  if (Notification.permission === 'denied') return 'denied';
  try {
    const result = await Notification.requestPermission();
    return result;
  } catch (_) { return 'denied'; }
}

// ─── Show immediate local notification ──────────────────────────────
function showLocalNotification(title, body, options = {}) {
  if (!isNotificationSupported() || Notification.permission !== 'granted') return;
  try {
    const n = new Notification(title, {
      body,
      icon: './icon-192.png',
      badge: './favicon.png',
      tag: 'fitracklon-reminder',
      renotify: true,
      ...options,
    });
    n.onclick = () => {
      window.focus();
      n.close();
    };
  } catch (e) {
    console.warn('[Mishkalut] notification failed', e);
  }
}

// ─── Schedule daily reminder — uses setTimeout while app is open,
//     persists intent so next open can compute if missed ───────────
function scheduleNextReminder(hhmm, personaId, alreadyWeighedToday) {
  if (!isNotificationSupported() || Notification.permission !== 'granted') return null;
  const [h, m] = (hhmm || '08:00').split(':').map(Number);
  const now = new Date();
  const target = new Date();
  target.setHours(h, m, 0, 0);
  if (target <= now) target.setDate(target.getDate() + 1);
  const delay = target - now;
  // Only schedule if within reasonable range (6 hours) to avoid orphan timers
  if (delay > 6 * 3600 * 1000) return null;
  const timeoutId = setTimeout(() => {
    const msg = getReminderMessage(personaId);
    showLocalNotification(msg.title, msg.body);
  }, delay);
  return timeoutId;
}

// ─── Hook: auto-schedule reminder on app load if enabled ────────────
function useNotificationScheduler() {
  const { state } = useStore();
  const n = state.settings.notifications;
  const personaId = state.settings.persona || 'neutral';
  const today = todayISO();
  // entries is an object keyed by date, not an array
  const weighedToday = !!(state.entries && state.entries[today]);

  React.useEffect(() => {
    if (!n || !n.enabled || !isNotificationSupported()) return;
    if (Notification.permission !== 'granted') return;
    if (weighedToday) return; // no reminder if already weighed
    const timeoutId = scheduleNextReminder(n.weighTime, personaId, weighedToday);
    return () => { if (timeoutId) clearTimeout(timeoutId); };
  }, [n?.enabled, n?.weighTime, personaId, weighedToday]);
}

// Get exercises filtered by muscle group
