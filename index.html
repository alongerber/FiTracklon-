/* ════════════════════════════════════════════════════════════════════
   FiTracklon PWA

// ════════════════════════════════════════════════════════════════════
// 01-theme.jsx — Design tokens + date/format helpers

const T = {
  bg:        '#0b0d0c',
  bgElev:    '#141816',
  bgElev2:   '#1c211e',
  stroke:    'rgba(255,255,255,0.10)',
  strokeHi:  'rgba(255,255,255,0.20)',
  ink:       '#f4f6f2',
  inkSub:    'rgba(244,246,242,0.82)',
  inkMute:   'rgba(244,246,242,0.60)',
  lime:      '#c6ff3d',
  limeDim:   'rgba(198,255,61,0.18)',
  amber:     '#ffb94a',
  rose:      '#ff5b7a',
  cyan:      '#5ce1ff',
  violet:    '#b38bff',
  font:      '"Heebo", "Rubik", -apple-system, system-ui, sans-serif',

// ─── Date utilities (local-time, YYYY-MM-DD string keys) ─────────────
function todayISO() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function nowHHMM() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function addDaysISO(iso, delta) {
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + delta);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function daysBetweenISO(a, b) {
  const [ay,am,ad] = a.split('-').map(Number);
  const [by,bm,bd] = b.split('-').map(Number);
  const da = new Date(ay, am-1, ad);
  const db = new Date(by, bm-1, bd);
  return Math.round((db - da) / 86400000);
}
function parseDOWFromISO(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(y, m-1, d).getDay();
}

// ─── Format helpers ──────────────────────────────────────────────────
const fmt = {
  kg: (n, unit = 'kg') => {
    if (n === null || n === undefined || isNaN(n)) return '—';
    return unit === 'lb' ? (n * 2.20462).toFixed(1) : n.toFixed(1);
  },
  unitLabel: (unit) => unit === 'lb' ? 'lb' : 'ק״ג',
  signed: (n) => {
    if (n === null || n === undefined || isNaN(n)) return '—';
    return (n > 0 ? '+' : '') + n.toFixed(1);
  },
  day: (iso) => {
    if (!iso) return '—';
    const [y,m,d] = iso.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    const days = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
    return `${days[dt.getDay()]} · ${dt.getDate()}.${dt.getMonth()+1}`;
  },
  dayShort: (iso) => {
    if (!iso) return '—';
    const [y,m,d] = iso.split('-').map(Number);
    return `${d}.${m}`;
  },
  relativeDay: (iso) => {
    const diff = daysBetweenISO(iso, todayISO());
    if (diff === 0) return 'היום';
    if (diff === 1) return 'אתמול';
    if (diff === -1) return 'מחר';
    if (diff < 7) return `לפני ${diff} ימים`;
    if (diff < 30) return `לפני ${Math.round(diff/7)} שבועות`;
    return `לפני ${Math.round(diff/30)} חודשים`;
  },
};

// ─── UUID ───────────────────────────────────────────────────────────
function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}


// ════════════════════════════════════════════════════════════════════
// 02-store.jsx — State, reducer, persistence, stats computation
// ════════════════════════════════════════════════════════════════════

const STORAGE_KEY = 'mishkach.v1.data';
const STATE_VERSION = 1;

const initialState = {
  version: STATE_VERSION,
  user: {
    name: '',
    heightCm: 175,
    ageYears: 35,
    gender: 'male',      // 'male' | 'female'
    startWeight: null,   // kg
    startDate: null,     // YYYY-MM-DD
  },
  goal: {
    weight: null,        // kg
    pace: 'balanced',    // 'slow' | 'balanced' | 'aggressive'
  },
  // entries: { 'YYYY-MM-DD': { weight: kg, time: 'HH:mm', note: string, createdAt: iso } }
  entries: {},
  // nutrition: goals + meals + favorites keyed by date
  nutrition: {
    goals: {
      calories: null,
      protein: null,
      carbs: null,
      fat: null,
      source: 'auto',
    },
    // meals: { 'YYYY-MM-DD': [ { id, time, description, calories, protein, carbs, fat, source, thumbnail?, aiNotes?, items?, createdAt } ] }
    meals: {},
    // favorites: { favoriteId: { description, calories, protein, carbs, fat, useCount, lastUsed, thumbnail? } }
    // Keyed by normalized description; auto-populated from saved meals
    favorites: {},
  },
  // workouts: keyed by date for fast lookup
  workouts: {
    // 'YYYY-MM-DD': [ { id, time, name, type, durationMin, notes, exercises: [{exerciseId, name, sets: [{reps, weight, restSec}], notes}], createdAt } ]
    sessions: {},
    // routines: saved templates the user can repeat
    routines: {}, // { routineId: { name, exercises: [{exerciseId, defaultSets, defaultReps}], lastUsed, useCount } }
  },
  // תובנות AI config — supports both BYO key (direct) and shared password (proxy)
  apiConfig: {
    mode: 'direct',        // 'direct' (BYO API key) | 'shared' (proxy + password)
    key: '',               // personal Anthropic API key
    sharedPassword: '',    // password for shared proxy
    model: 'claude-opus-4-7',
    enabled: true,
  },
  // Usage tracking
  usage: {
    allTime: { requests: 0, inputTokens: 0, outputTokens: 0, costUSD: 0 },
    byMonth: {},         // { 'YYYY-MM': { requests, inputTokens, outputTokens, costUSD } }
    byFeature: {},       // { 'nutrition_text': {count, cost}, ... }
  },
  // Cached insights (so user doesn't pay twice)
  insights: {
    weekly: null,        // { text, generatedAt, weekEnding }
    plateau: null,       // { text, generatedAt, periodDays }
    calibration: null,   // { text, generatedAt }
  },
  settings: {
    unit: 'kg',
    homeVariant: 'v1',
    firstLaunch: true,
    persona: null,        // polish_mom | salesman | cynic_coach | jealous_friend | neutral
    tipsShown: [],        // tip ids user has seen
    // Celebration milestones — store the date they fired so we don't repeat
    goalReachedAt: null,  // YYYY-MM-DD — when user first crossed goal
    lastLowWeight: null,  // kg — lowest weight recorded so far
    personaInteractions: 0, // counter for "moment of sincerity"
    notifications: {
      enabled: false,
      weighTime: '08:00',
      pushSubscription: null,
    },
  },
  meta: {
    createdAt: null,
    updatedAt: null,
  },
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return initialState;
    const parsed = JSON.parse(raw);
    // Basic migration: if version mismatch, try merging over initialState
    if (parsed.version !== STATE_VERSION) {
      return { ...initialState, ...parsed, version: STATE_VERSION };
    }
    // Deep merge for safety
    return {
      ...initialState,
      ...parsed,
      user: { ...initialState.user, ...(parsed.user || {}) },
      goal: { ...initialState.goal, ...(parsed.goal || {}) },
      settings: { ...initialState.settings, ...(parsed.settings || {}) },
      entries: parsed.entries || {},
      nutrition: {
        ...initialState.nutrition,
        ...(parsed.nutrition || {}),
        goals: { ...initialState.nutrition.goals, ...((parsed.nutrition || {}).goals || {}) },
        meals: (parsed.nutrition || {}).meals || {},
        favorites: (parsed.nutrition || {}).favorites || {},
      },
      workouts: {
        ...initialState.workouts,
        ...(parsed.workouts || {}),
        sessions: (parsed.workouts || {}).sessions || {},
        routines: (parsed.workouts || {}).routines || {},
      },
      apiConfig: { ...initialState.apiConfig, ...(parsed.apiConfig || {}) },
      usage: {
        ...initialState.usage,
        ...(parsed.usage || {}),
        allTime: { ...initialState.usage.allTime, ...((parsed.usage || {}).allTime || {}) },
        byMonth: (parsed.usage || {}).byMonth || {},
        byFeature: (parsed.usage || {}).byFeature || {},
      },
      insights: { ...initialState.insights, ...(parsed.insights || {}) },
      meta: { ...initialState.meta, ...(parsed.meta || {}) },
    };
  } catch (e) {
    console.warn('loadState failed, resetting:', e);
    return initialState;
  }
}

function saveState(state) {
  try {
    const toSave = { ...state, meta: { ...state.meta, updatedAt: new Date().toISOString() } };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  } catch (e) {
    console.warn('saveState failed:', e);
  }
}

function reducer(state, action) {
  switch (action.type) {
    case 'SET_USER':
      return { ...state, user: { ...state.user, ...action.user } };
    case 'SET_GOAL':
      return { ...state, goal: { ...state.goal, ...action.goal } };
    case 'UPSERT_ENTRY': {
      const { date, weight, time, note } = action;
      return {
        ...state,
        entries: {
          ...state.entries,
          [date]: {
            weight,
            time: time || nowHHMM(),
            note: note || '',
            createdAt: state.entries[date]?.createdAt || new Date().toISOString(),
            updatedAt: new Date().toISOString(),
          },
        },
      };
    }
    case 'DELETE_ENTRY': {
      const { [action.date]: _, ...rest } = state.entries;
      return { ...state, entries: rest };
    }

    // ─── Nutrition ──────────────────────────────────────────────
    case 'SET_NUTRITION_GOALS':
      return {
        ...state,
        nutrition: {
          ...state.nutrition,
          goals: { ...state.nutrition.goals, ...action.goals },
        },
      };
    case 'ADD_MEAL': {
      const { date, meal } = action;
      const existing = state.nutrition.meals[date] || [];
      const newMeal = { ...meal, id: meal.id || uid(), createdAt: new Date().toISOString() };

      // Track as favorite (normalized description key)
      const favKey = (meal.description || '').trim().toLowerCase();
      const favs = { ...state.nutrition.favorites };
      if (favKey) {
        const prev = favs[favKey];
        favs[favKey] = {
          description: meal.description.trim(),
          calories: meal.calories,
          protein: meal.protein,
          carbs: meal.carbs,
          fat: meal.fat,
          thumbnail: meal.thumbnail || prev?.thumbnail || null,
          useCount: (prev?.useCount || 0) + 1,
          lastUsed: new Date().toISOString(),
          firstUsed: prev?.firstUsed || new Date().toISOString(),
        };
      }

      return {
        ...state,
        nutrition: {
          ...state.nutrition,
          meals: {
            ...state.nutrition.meals,
            [date]: [...existing, newMeal],
          },
          favorites: favs,
        },
      };
    }
    case 'UPDATE_MEAL': {
      const { date, mealId, updates } = action;
      const existing = state.nutrition.meals[date] || [];
      return {
        ...state,
        nutrition: {
          ...state.nutrition,
          meals: {
            ...state.nutrition.meals,
            [date]: existing.map(m => m.id === mealId ? { ...m, ...updates, updatedAt: new Date().toISOString() } : m),
          },
        },
      };
    }
    case 'REMOVE_FAVORITE': {
      const favs = { ...state.nutrition.favorites };
      delete favs[action.favKey];
      return { ...state, nutrition: { ...state.nutrition, favorites: favs } };
    }
    case 'RESTORE_FAVORITE': {
      // For undo: re-insert a previously removed favorite
      return {
        ...state,
        nutrition: {
          ...state.nutrition,
          favorites: { ...state.nutrition.favorites, [action.favKey]: action.fav },
        },
      };
    }
    case 'DELETE_MEAL': {
      const { date, mealId } = action;
      const existing = state.nutrition.meals[date] || [];
      const filtered = existing.filter(m => m.id !== mealId);
      const newMeals = { ...state.nutrition.meals };
      if (filtered.length === 0) delete newMeals[date];
      else newMeals[date] = filtered;
      return { ...state, nutrition: { ...state.nutrition, meals: newMeals } };
    }

    // ─── API config ─────────────────────────────────────────────
    case 'SET_API_KEY':
      return { ...state, apiConfig: { ...state.apiConfig, key: action.key || '' } };
    case 'SET_API_MODE':
      return { ...state, apiConfig: { ...state.apiConfig, mode: action.mode === 'shared' ? 'shared' : 'direct' } };
    case 'SET_SHARED_PASSWORD':
      return { ...state, apiConfig: { ...state.apiConfig, sharedPassword: action.password || '' } };
    case 'SET_API_ENABLED':
      return { ...state, apiConfig: { ...state.apiConfig, enabled: !!action.enabled } };

    // ─── Usage tracking ─────────────────────────────────────────
    case 'TRACK_USAGE': {
      const { inputTokens, outputTokens, feature, costUSD } = action;
      const month = todayISO().slice(0, 7); // YYYY-MM
      const at = state.usage.allTime;
      const bm = state.usage.byMonth[month] || { requests: 0, inputTokens: 0, outputTokens: 0, costUSD: 0 };
      const bf = state.usage.byFeature[feature] || { count: 0, costUSD: 0 };
      return {
        ...state,
        usage: {
          allTime: {
            requests:     at.requests + 1,
            inputTokens:  at.inputTokens + inputTokens,
            outputTokens: at.outputTokens + outputTokens,
            costUSD:      at.costUSD + costUSD,
          },
          byMonth: {
            ...state.usage.byMonth,
            [month]: {
              requests:     bm.requests + 1,
              inputTokens:  bm.inputTokens + inputTokens,
              outputTokens: bm.outputTokens + outputTokens,
              costUSD:      bm.costUSD + costUSD,
            },
          },
          byFeature: {
            ...state.usage.byFeature,
            [feature]: { count: bf.count + 1, costUSD: bf.costUSD + costUSD },
          },
        },
      };
    }

    // ─── Insights ───────────────────────────────────────────────
    case 'SET_INSIGHT':
      return { ...state, insights: { ...state.insights, [action.kind]: action.payload } };
    case 'CLEAR_INSIGHT':
      return { ...state, insights: { ...state.insights, [action.kind]: null } };

    case 'SET_SETTING':
      return { ...state, settings: { ...state.settings, [action.key]: action.value } };
    case 'INCREMENT_PERSONA_INTERACTIONS':
      return {
        ...state,
        settings: {
          ...state.settings,
          personaInteractions: (state.settings.personaInteractions || 0) + 1,
        },
      };
    // ─── Undo support: stash a deleted thing temporarily ─────────────
    case 'STASH_DELETION':
      return {
        ...state,
        tempUndo: {
          kind: action.kind,             // 'weight' | 'meal' | 'favorite'
          payload: action.payload,
          deletedAt: Date.now(),
        },
      };
    case 'CLEAR_UNDO':
      return { ...state, tempUndo: null };
    case 'SET_PERSONA':
      return { ...state, settings: { ...state.settings, persona: action.persona } };
    case 'MARK_TIP_SHOWN': {
      const shown = state.settings.tipsShown || [];
      if (shown.includes(action.tipId)) return state;
      return { ...state, settings: { ...state.settings, tipsShown: [...shown, action.tipId] } };
    }
    case 'RESET_TIPS_SHOWN':
      return { ...state, settings: { ...state.settings, tipsShown: [] } };
    case 'SET_NOTIFICATIONS':
      return { ...state, settings: { ...state.settings, notifications: { ...state.settings.notifications, ...action.updates } } };
    case 'UPDATE_WEIGHT_ENTRY': {
      const { date, updates } = action;
      if (!state.entries[date]) return state;
      return {
        ...state,
        entries: {
          ...state.entries,
          [date]: { ...state.entries[date], ...updates, updatedAt: new Date().toISOString() },
        },
      };
    }
    case 'COMPLETE_ONBOARDING': {
      const today = todayISO();
      return {
        ...state,
        user: {
          ...state.user,
          name: action.name,
          heightCm: action.heightCm,
          ageYears: action.ageYears || state.user.ageYears,
          gender: action.gender || state.user.gender,
          startWeight: action.currentWeight,
          startDate: today,
        },
        goal: { ...state.goal, weight: action.goalWeight, pace: action.pace || 'balanced' },
        entries: {
          ...state.entries,
          [today]: {
            weight: action.currentWeight,
            time: nowHHMM(),
            note: '',
            createdAt: new Date().toISOString(),
          },
        },
        settings: { ...state.settings, firstLaunch: false, unit: action.unit || 'kg' },
        meta: { createdAt: state.meta.createdAt || new Date().toISOString(), updatedAt: new Date().toISOString() },
      };
    }
    case 'RESET_ALL':
      return initialState;
    case 'IMPORT_STATE':
      return { ...initialState, ...action.state, version: STATE_VERSION };

    // ─── Workout actions ────────────────────────────────────────────
    case 'ADD_WORKOUT': {
      const { date, workout } = action;
      const sessions = { ...state.workouts.sessions };
      const dayList = sessions[date] || [];
      const newWorkout = {
        ...workout,
        id: workout.id || uid(),
        createdAt: new Date().toISOString(),
      };
      sessions[date] = [...dayList, newWorkout];
      return { ...state, workouts: { ...state.workouts, sessions } };
    }
    case 'UPDATE_WORKOUT': {
      const { date, workoutId, updates } = action;
      const sessions = { ...state.workouts.sessions };
      const dayList = sessions[date] || [];
      sessions[date] = dayList.map(w =>
        w.id === workoutId
          ? { ...w, ...updates, updatedAt: new Date().toISOString() }
          : w
      );
      return { ...state, workouts: { ...state.workouts, sessions } };
    }
    case 'DELETE_WORKOUT': {
      const { date, workoutId } = action;
      const sessions = { ...state.workouts.sessions };
      const dayList = sessions[date] || [];
      const remaining = dayList.filter(w => w.id !== workoutId);
      if (remaining.length === 0) {
        delete sessions[date];
      } else {
        sessions[date] = remaining;
      }
      return { ...state, workouts: { ...state.workouts, sessions } };
    }
    case 'SAVE_ROUTINE': {
      const { routine } = action;
      const id = routine.id || uid();
      return {
        ...state,
        workouts: {
          ...state.workouts,
          routines: {
            ...state.workouts.routines,
            [id]: { ...routine, id, lastUsed: routine.lastUsed || null, useCount: routine.useCount || 0 },
          },
        },
      };
    }
    case 'TRACK_ROUTINE_USE': {
      const { routineId } = action;
      const r = state.workouts.routines[routineId];
      if (!r) return state;
      return {
        ...state,
        workouts: {
          ...state.workouts,
          routines: {
            ...state.workouts.routines,
            [routineId]: { ...r, useCount: (r.useCount || 0) + 1, lastUsed: new Date().toISOString() },
          },
        },
      };
    }
    case 'DELETE_ROUTINE': {
      const routines = { ...state.workouts.routines };
      delete routines[action.routineId];
      return { ...state, workouts: { ...state.workouts, routines } };
    }

    default:
      return state;
  }
}

// ─── Stats: derived data from state.entries ──────────────────────────
function computeStats(state) {
  const list = Object.entries(state.entries)
    .map(([date, e]) => ({ date, ...e, dayOfWeek: parseDOWFromISO(date) }))
    .sort((a, b) => a.date.localeCompare(b.date));

  const n = list.length;
  if (n === 0) {
    return { empty: true, list: [], n: 0 };
  }

  const latest = list[n - 1];
  const current = latest.weight;
  const prev = n > 1 ? list[n - 2] : null;
  const goal = state.goal.weight;
  const startWeight = state.user.startWeight ?? list[0].weight;

  // Find closest entry on or before target date (days back from latest)
  const findNearPast = (daysBack) => {
    const targetDate = addDaysISO(latest.date, -daysBack);
    for (let i = n - 1; i >= 0; i--) {
      if (list[i].date <= targetDate) return list[i];
    }
    return null;
  };

  const weekAgo = findNearPast(7);
  const monthAgo = findNearPast(30);

  const weights = list.map(e => e.weight);
  const peakIdx = weights.indexOf(Math.max(...weights));
  const lowIdx = weights.indexOf(Math.min(...weights));

  // Pace (kg/week): slope over the last 30 days of data available
  let paceKgPerWeek = null;
  if (monthAgo && monthAgo.date !== latest.date) {
    const span = list.filter(e => e.date >= monthAgo.date);
    if (span.length >= 2) {
      const days = daysBetweenISO(span[0].date, span[span.length-1].date);
      if (days > 0) {
        paceKgPerWeek = ((span[span.length-1].weight - span[0].weight) / days) * 7;
      }
    }
  } else if (list.length >= 2) {
    // fallback: use all data
    const days = daysBetweenISO(list[0].date, latest.date);
    if (days > 0) {
      paceKgPerWeek = ((latest.weight - list[0].weight) / days) * 7;
    }
  }

  const toGoal = goal !== null && goal !== undefined ? current - goal : null;

  // ETA computation with explicit reasons for failure
  let etaDays = null;
  let etaReason = null; // 'no_goal', 'no_pace', 'wrong_direction', 'reached', 'insufficient_data'

  if (toGoal === null) {
    etaReason = 'no_goal';
  } else if (Math.abs(toGoal) < 0.1) {
    etaReason = 'reached';
  } else if (paceKgPerWeek === null) {
    etaReason = list.length < 3 ? 'insufficient_data' : 'no_pace';
  } else if (paceKgPerWeek === 0) {
    etaReason = 'no_pace';
  } else if (Math.sign(paceKgPerWeek) !== -Math.sign(toGoal)) {
    // Going opposite direction (gaining when wanting to lose)
    etaReason = 'wrong_direction';
  } else {
    etaDays = Math.round(Math.abs(toGoal / paceKgPerWeek) * 7);
    // Cap at 5 years - longer makes no sense
    if (etaDays > 1825) {
      etaDays = null;
      etaReason = 'no_pace';
    }
  }

  const progressPct = (startWeight !== null && goal !== null && goal !== undefined && startWeight !== goal)
    ? Math.max(0, Math.min(100, 100 * (startWeight - current) / (startWeight - goal)))
    : null;

  // Streak: consecutive days with entries, ending today or yesterday
  let streak = 0;
  const daysSinceLatest = daysBetweenISO(latest.date, todayISO());
  if (daysSinceLatest <= 1) {
    let d = latest.date;
    while (state.entries[d]) {
      streak++;
      d = addDaysISO(d, -1);
    }
  }

  return {
    empty: false,
    list,
    n,
    current,
    previous: prev?.weight ?? null,
    dayDelta: prev ? current - prev.weight : null,
    deltaWeek: weekAgo && weekAgo.date !== latest.date ? current - weekAgo.weight : null,
    deltaMonth: monthAgo && monthAgo.date !== latest.date ? current - monthAgo.weight : null,
    peak: { weight: weights[peakIdx], date: list[peakIdx].date },
    low: { weight: weights[lowIdx], date: list[lowIdx].date },
    paceKgPerWeek,
    toGoal,
    etaDays,
    etaReason,
    progressPct,
    streak,
    latestDate: latest.date,
    latestTime: latest.time,
    startWeight,
    goal,
  };
}

// ─── BMI classification ─────────────────────────────────────────────
function bmiInfo(kg, heightCm) {
  if (!kg || !heightCm) return null;
  const bmi = kg / ((heightCm / 100) ** 2);
  let category, color;
  if (bmi < 18.5)      { category = 'תת־משקל';  color = T.cyan; }
  else if (bmi < 25)   { category = 'תקין';     color = T.lime; }
  else if (bmi < 30)   { category = 'עודף משקל'; color = T.amber; }
  else                 { category = 'השמנה';    color = T.rose; }
  return { bmi, category, color };
}

// ─── Collect recent meals for quick-add (no Claude call needed) ─────
// Returns most recent unique meals (by description) from the past N days
function collectRecentMeals(nutritionMeals, maxCount = 12, daysBack = 21) {
  const today = todayISO();
  const cutoff = addDaysISO(today, -daysBack);
  const all = [];
  for (const [date, meals] of Object.entries(nutritionMeals)) {
    if (date < cutoff) continue;
    for (const m of meals) {
      all.push({ ...m, _sourceDate: date });
    }
  }
  all.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  // Dedupe by description
  const seen = new Set();
  const out = [];
  for (const m of all) {
    const key = (m.description || '').trim().toLowerCase();
    if (!key || seen.has(key)) continue;
    seen.add(key);
    out.push(m);
    if (out.length >= maxCount) break;
  }
  return out;
}

// ─── Pace recommendations ───────────────────────────────────────────
const PACE_CONFIG = {
  slow:       { label: 'איטי · בריא',    kgPerWeek: 0.3, color: T.cyan },
  balanced:   { label: 'מאוזן · מומלץ',  kgPerWeek: 0.5, color: T.lime },
  aggressive: { label: 'אגרסיבי',        kgPerWeek: 0.8, color: T.amber },
};
function weeksToGoal(current, goal, pace) {
  if (current === null || goal === null) return null;
  const diff = Math.abs(current - goal);
  const kpw = PACE_CONFIG[pace]?.kgPerWeek || 0.5;
  return Math.ceil(diff / kpw);
}

// ─── Nutrition goal auto-calc (Mifflin-St Jeor + deficit) ────────────
// Returns { calories, protein, carbs, fat } in grams / kcal
function calculateNutritionGoals(user, goal, currentKg) {
  const weight = currentKg ?? user.startWeight ?? 75;
  const height = user.heightCm || 175;
  const age = user.ageYears || 35;
  const isMale = (user.gender || 'male') === 'male';

  // BMR: Mifflin-St Jeor
  const bmr = isMale
    ? 10 * weight + 6.25 * height - 5 * age + 5
    : 10 * weight + 6.25 * height - 5 * age - 161;

  // Activity: default "sedentary to light" = 1.4 (we don't track activity)
  const tdee = bmr * 1.4;

  // Deficit from target pace. 1kg fat ≈ 7700 kcal.
  const kpw = PACE_CONFIG[goal?.pace || 'balanced'].kgPerWeek;
  const dailyDeficit = (kpw * 7700) / 7;
  const calories = Math.round(tdee - dailyDeficit);

  // Protein: 1.6g / kg bodyweight (preserves muscle in deficit)
  const protein = Math.round(weight * 1.6);

  // Fat: 25% of calories
  const fat = Math.round(calories * 0.25 / 9);

  // Carbs: remainder
  const proteinKcal = protein * 4;
  const fatKcal = fat * 9;
  const carbsKcal = Math.max(0, calories - proteinKcal - fatKcal);
  const carbs = Math.round(carbsKcal / 4);

  return { calories, protein, carbs, fat, tdee: Math.round(tdee), bmr: Math.round(bmr) };
}

// ─── API readiness check — works for both direct and shared modes ───
function apiReady(apiConfig) {
  if (!apiConfig) return false;
  if (apiConfig.mode === 'shared') return !!apiConfig.sharedPassword;
  return !!apiConfig.key;
}

// ─── Sum nutrition for a day ─────────────────────────────────────────
function sumMealsForDay(meals) {
  if (!meals || !meals.length) return { calories: 0, protein: 0, carbs: 0, fat: 0, count: 0 };
  return meals.reduce((acc, m) => ({
    calories: acc.calories + (m.calories || 0),
    protein:  acc.protein  + (m.protein || 0),
    carbs:    acc.carbs    + (m.carbs || 0),
    fat:      acc.fat      + (m.fat || 0),
    count:    acc.count    + 1,
  }), { calories: 0, protein: 0, carbs: 0, fat: 0, count: 0 });
}

// ─── Nutrition streak: consecutive days with at least 1 meal logged ──
function nutritionStreak(mealsByDay) {
  const today = todayISO();
  let streak = 0;
  let cursor = today;
  while (true) {
    const meals = mealsByDay[cursor];
    if (!meals || meals.length === 0) {
      // Allow today to be empty without breaking streak
      if (cursor === today) { cursor = addDaysISO(cursor, -1); continue; }
      break;
    }
    streak++;
    cursor = addDaysISO(cursor, -1);
    if (streak > 365) break; // sanity
  }
  return streak;
}

// ─── Sorted favorites (most used first, recent wins ties) ───────────
function sortedFavorites(favoritesMap, limit = 20) {
  const arr = Object.entries(favoritesMap || {}).map(([key, f]) => ({ key, ...f }));
  arr.sort((a, b) => {
    if (b.useCount !== a.useCount) return b.useCount - a.useCount;
    return (b.lastUsed || '').localeCompare(a.lastUsed || '');
  });
  return arr.slice(0, limit);
}

// ─── Gap-aware weight stats helpers ──────────────────────────────────
// Check if there's a gap > `days` between entries ending at latestDate
function hasGap(entries, daysBack, tolerance = 2) {
  // entries sorted asc; return true if no entry within tolerance of (latest - daysBack)
  if (!entries.length) return true;
  const latest = entries[entries.length - 1].date;
  const target = addDaysISO(latest, -daysBack);
  // Is there an entry within [target - tolerance, target + tolerance]?
  const lo = addDaysISO(target, -tolerance);
  const hi = addDaysISO(target, tolerance);
  return !entries.some(e => e.date >= lo && e.date <= hi);
}

// Find gap segments in a sorted entries list. Returns array of { from, to, days }
function findGaps(entries, minGapDays = 3) {
  if (!entries || entries.length < 2) return [];
  const gaps = [];
  for (let i = 1; i < entries.length; i++) {
    const d = daysBetweenISO(entries[i-1].date, entries[i].date);
    if (d >= minGapDays) gaps.push({ from: entries[i-1].date, to: entries[i].date, days: d });
  }
  return gaps;
}

// ─── Snapshot builder for Claude insights ───────────────────────────
// Collects the last N days of weight + nutrition + goal, sanitized for Claude.
function buildInsightSnapshot(state, stats, daysBack = 7) {
  const today = todayISO();
  const from = addDaysISO(today, -(daysBack - 1));
  const unit = state.settings.unit;

  // Weight entries in range
  const weightEntries = Object.entries(state.entries)
    .filter(([date]) => date >= from && date <= today)
    .map(([date, e]) => ({ date, weight_kg: e.weight }))
    .sort((a, b) => a.date.localeCompare(b.date));

  // Nutrition totals per day in range
  const nutritionByDay = {};
  for (let i = 0; i < daysBack; i++) {
    const date = addDaysISO(today, -i);
    const meals = state.nutrition.meals[date] || [];
    if (meals.length === 0) continue;
    const sums = sumMealsForDay(meals);
    nutritionByDay[date] = {
      calories: sums.calories,
      protein_g: sums.protein,
      carbs_g: sums.carbs,
      fat_g: sums.fat,
      meals_logged: sums.count,
    };
  }

  return {
    today,
    period: { from, to: today, days: daysBack },
    goal: {
      target_weight_kg: state.goal.weight,
      pace: state.goal.pace,
      pace_kg_per_week: PACE_CONFIG[state.goal.pace]?.kgPerWeek,
    },
    user: {
      height_cm: state.user.heightCm,
      age: state.user.ageYears,
      gender: state.user.gender,
      start_weight_kg: state.user.startWeight,
      start_date: state.user.startDate,
    },
    current_weight_kg: stats.current,
    total_loss_kg: stats.empty ? 0 : Math.round((state.user.startWeight - stats.current) * 10) / 10,
    weight_entries: weightEntries,
    weight_entries_count: weightEntries.length,
    weight_gaps: findGaps(weightEntries, 3),
    nutrition_goals: {
      daily_calories: state.nutrition.goals.calories,
      daily_protein_g: state.nutrition.goals.protein,
      daily_carbs_g: state.nutrition.goals.carbs,
      daily_fat_g: state.nutrition.goals.fat,
    },
    nutrition_by_day: nutritionByDay,
    nutrition_days_logged: Object.keys(nutritionByDay).length,
  };
}

// ─── React Context ──────────────────────────────────────────────────
const StoreContext = React.createContext(null);

function StoreProvider({ children }) {
  const [state, dispatch] = React.useReducer(reducer, null, loadState);
  const stats = React.useMemo(() => computeStats(state), [state]);

  React.useEffect(() => { saveState(state); }, [state]);

  const value = React.useMemo(() => ({ state, dispatch, stats }), [state, stats]);
  return <StoreContext.Provider value={value}>{children}</StoreContext.Provider>;
}

function useStore() {
  const ctx = React.useContext(StoreContext);
  if (!ctx) throw new Error('useStore must be used within StoreProvider');
  return ctx;
}


// ════════════════════════════════════════════════════════════════════
// 03-charts.jsx — SVG charts, adapted to real (sparse) data
// ════════════════════════════════════════════════════════════════════

function toPoints(data, key, w, h, padT = 10, padB = 10, yMin, yMax) {
  if (!data.length) return [];
  const vals = data.map(d => d[key]);
  const lo = yMin ?? Math.min(...vals);
  const hi = yMax ?? Math.max(...vals);
  const rng = hi - lo || 1;
  return data.map((d, i) => {
    const x = (i / Math.max(1, data.length - 1)) * w;
    const y = padT + (1 - (d[key] - lo) / rng) * (h - padT - padB);
    return [x, y, d];
  });
}

function smoothPath(pts) {
  if (!pts.length) return '';
  if (pts.length === 1) return `M${pts[0][0]} ${pts[0][1]}`;
  let d = `M${pts[0][0]} ${pts[0][1]}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[i - 1] || pts[i];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[i + 2] || p2;
    const t = 0.18;
    const c1x = p1[0] + (p2[0] - p0[0]) * t;
    const c1y = p1[1] + (p2[1] - p0[1]) * t;
    const c2x = p2[0] - (p3[0] - p1[0]) * t;
    const c2y = p2[1] - (p3[1] - p1[1]) * t;
    d += ` C${c1x} ${c1y}, ${c2x} ${c2y}, ${p2[0]} ${p2[1]}`;
  }
  return d;
}

function WeightChart({
  data, goal, width = 360, height = 180,
  stroke = T.lime, fill = true, showGoal = true, showMarkers = true,
  showGrid = true, showDots = false, yPad = 1.0,
}) {
  const w = width, h = height;
  if (!data || data.length === 0) {
    return (
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} style={{ display: 'block' }}>
        <rect x="0" y="0" width={w} height={h} fill="none" stroke={T.stroke} strokeDasharray="4 4" />
        <text x={w/2} y={h/2} textAnchor="middle" fill={T.inkMute} style={{ fontFamily: T.font, fontSize: 13 }}>
          אין עדיין נתונים
        </text>
      </svg>
    );
  }

  const vals = data.map(d => d.weight);
  const lo = Math.min(...vals, goal ?? Infinity) - yPad;
  const hi = Math.max(...vals, goal ?? -Infinity) + yPad;
  const pts = toPoints(data, 'weight', w, h, 12, 16, lo, hi);
  const path = smoothPath(pts);
  const areaPath = path + ` L${w} ${h} L0 ${h} Z`;
  const gy = goal !== null && goal !== undefined
    ? 12 + (1 - (goal - lo) / (hi - lo)) * (h - 28) : null;

  const peakI = vals.indexOf(Math.max(...vals));
  const lowI  = vals.indexOf(Math.min(...vals));

  const gid = React.useId().replace(/:/g, "");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h}
      style={{ overflow: 'visible', display: 'block' }}>
      <defs>
        <linearGradient id={`fill-${gid}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={stroke} stopOpacity="0.35" />
          <stop offset="100%" stopColor={stroke} stopOpacity="0" />
        </linearGradient>
      </defs>

      {showGrid && (
        <g opacity="0.5">
          {[0.25, 0.5, 0.75].map((p, i) => (
            <line key={i} x1="0" x2={w} y1={12 + p * (h - 28)} y2={12 + p * (h - 28)}
              stroke={T.stroke} strokeDasharray="2 4" />
          ))}
        </g>
      )}

      {showGoal && gy !== null && (
        <g>
          <line x1="0" x2={w} y1={gy} y2={gy} stroke={T.amber} strokeDasharray="3 3" strokeWidth="1" opacity="0.7" />
          <text x={w - 4} y={gy - 4} textAnchor="end" fill={T.amber}
            style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: 0.5 }}>
            יעד {goal}
          </text>
        </g>
      )}

      {fill && pts.length > 1 && <path d={areaPath} fill={`url(#fill-${gid})`} />}
      {pts.length > 1 && <path d={path} fill="none" stroke={stroke} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />}

      {(showDots || pts.length === 1) && pts.map(([x,y], i) => (
        <circle key={i} cx={x} cy={y} r={pts.length === 1 ? 4 : 1.8} fill={stroke} opacity="0.7" />
      ))}

      {showMarkers && data.length > 2 && (
        <g>
          <circle cx={pts[peakI][0]} cy={pts[peakI][1]} r="4" fill={T.rose} />
          <circle cx={pts[peakI][0]} cy={pts[peakI][1]} r="8" fill="none" stroke={T.rose} strokeWidth="1" opacity="0.4" />
          <circle cx={pts[lowI][0]} cy={pts[lowI][1]} r="4" fill={T.lime} />
          <circle cx={pts[lowI][0]} cy={pts[lowI][1]} r="8" fill="none" stroke={T.lime} strokeWidth="1" opacity="0.4" />
        </g>
      )}

      {pts.length > 0 && (
        <>
          <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="5" fill={T.ink} />
          <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="5" fill="none" stroke={stroke} strokeWidth="2" />
        </>
      )}
    </svg>
  );
}

function Sparkline({ data, width = 80, height = 28, stroke = T.lime, fill = true }) {
  const w = width, h = height;
  if (!data || data.length === 0) {
    return <svg viewBox={`0 0 ${w} ${h}`} width={w} height={h}><line x1="0" y1={h/2} x2={w} y2={h/2} stroke={T.stroke} strokeDasharray="2 3"/></svg>;
  }
  const vals = data.map(d => d.weight);
  const lo = Math.min(...vals), hi = Math.max(...vals);
  const pts = toPoints(data, 'weight', w, h, 4, 4, lo, hi);
  const path = smoothPath(pts);
  const gid = React.useId().replace(/:/g, "");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width={width} height={height} style={{ display:'block' }}>
      <defs>
        <linearGradient id={`sp-${gid}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={stroke} stopOpacity="0.35" />
          <stop offset="100%" stopColor={stroke} stopOpacity="0" />
        </linearGradient>
      </defs>
      {fill && pts.length > 1 && <path d={path + ` L${w} ${h} L0 ${h} Z`} fill={`url(#sp-${gid})`} />}
      {pts.length > 1 && <path d={path} fill="none" stroke={stroke} strokeWidth="1.6" strokeLinecap="round" />}
      {pts.length === 1 && <circle cx={pts[0][0]} cy={pts[0][1]} r="2.5" fill={stroke} />}
    </svg>
  );
}

function BarHistogram({ data, width = 360, height = 120, color = T.lime }) {
  const w = width, h = height;
  if (!data || data.length === 0) return null;
  const vals = data.map(d => d.weight);
  const lo = Math.min(...vals) - 0.2, hi = Math.max(...vals) + 0.2;
  const barW = Math.max(1.5, (w / data.length) * 0.55);
  const gap  = (w / data.length) - barW;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} style={{ display:'block' }}>
      {data.map((d, i) => {
        const x = i * (barW + gap);
        const y = 4 + (1 - (d.weight - lo) / (hi - lo || 1)) * (h - 8);
        const barH = h - y - 2;
        const isLast = i === data.length - 1;
        return (
          <rect key={i} x={x} y={y} width={barW} height={barH} rx={Math.min(1.5, barW/2)}
            fill={isLast ? T.ink : color} opacity={isLast ? 1 : 0.7} />
        );
      })}
    </svg>
  );
}

function RingGauge({ pct = 50, size = 120, stroke = 10, color = T.lime, track = T.stroke, children }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - Math.max(0, Math.min(100, pct)) / 100);
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off}
          style={{ transition: 'stroke-dashoffset 600ms ease' }} />
      </svg>
      <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column' }}>
        {children}
      </div>
    </div>
  );
}

// ─── Workout volume bar chart (4-week buckets) ──────────────────────
// Expects buckets = [{ label, volume }, ...] oldest→newest.
// Highlights the LAST bucket (current week) with T.ink, like BarHistogram.
function WorkoutVolumeChart({ buckets, width = 340, height = 110, color = T.lime }) {
  const w = width, h = height;
  if (!buckets || buckets.length === 0) return null;

  const padT = 14, padB = 22; // padB leaves room for x-axis labels
  const chartH = h - padT - padB;
  const vols = buckets.map(b => b.volume);
  const hi = Math.max(...vols, 1);

  const slot = w / buckets.length;
  const barW = Math.max(8, slot * 0.55);

  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} style={{ display: 'block' }}>
      {/* Subtle baseline */}
      <line x1="0" x2={w} y1={h - padB + 1} y2={h - padB + 1} stroke={T.stroke} />

      {buckets.map((b, i) => {
        const isLast = i === buckets.length - 1;
        const x = i * slot + (slot - barW) / 2;
        const ratio = b.volume / hi;
        const barH = Math.max(2, ratio * chartH);
        const y = h - padB - barH;

        return (
          <g key={i}>
            <rect
              x={x} y={y} width={barW} height={barH}
              rx={Math.min(3, barW / 2)}
              fill={isLast ? T.ink : color}
              opacity={isLast ? 1 : 0.7}
            />
            {b.volume > 0 && (
              <text
                x={x + barW / 2} y={y - 4} textAnchor="middle"
                fill={isLast ? T.ink : T.inkSub}
                style={{ fontFamily: T.mono, fontSize: 10, fontWeight: 600 }}
              >
                {b.volume >= 1000 ? `${(b.volume / 1000).toFixed(1)}k` : b.volume}
              </text>
            )}
            <text
              x={x + barW / 2} y={h - 6} textAnchor="middle"
              fill={isLast ? T.ink : T.inkMute}
              style={{ fontFamily: T.font, fontSize: 10, fontWeight: isLast ? 700 : 500 }}
            >
              {b.label}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

// ─── Workout frequency stacked horizontal bar (by category) ─────────
// Expects items = [{ id, label, color, count }] only with count > 0.
function WorkoutFrequencyChart({ items, width = 340, barHeight = 18 }) {
  if (!items || items.length === 0) return null;
  const total = items.reduce((s, x) => s + x.count, 0);
  if (total === 0) return null;

  // Build segments with explicit x offsets in % so stroke between segments is clean
  let acc = 0;
  const segs = items.map(it => {
    const pct = (it.count / total) * 100;
    const seg = { ...it, x: acc, w: pct };
    acc += pct;
    return seg;
  });

  const w = width;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      {/* Stacked bar */}
      <svg viewBox={`0 0 ${w} ${barHeight}`} width="100%" height={barHeight} style={{ display: 'block' }}>
        <rect x="0" y="0" width={w} height={barHeight} rx={barHeight / 2} fill={T.bgElev2} />
        <clipPath id={`mk-freq-clip-${React.useId().replace(/:/g, '')}`}>
          <rect x="0" y="0" width={w} height={barHeight} rx={barHeight / 2} />
        </clipPath>
        {segs.map((s, i) => (
          <rect
            key={s.id}
            x={(s.x / 100) * w}
            y="0"
            width={Math.max(2, (s.w / 100) * w)}
            height={barHeight}
            fill={s.color}
            opacity="0.9"
          />
        ))}
      </svg>

      {/* Legend */}
      <div style={{
        display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '6px 14px',
      }}>
        {items.map(it => (
          <div key={it.id} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{
              width: 10, height: 10, borderRadius: 5, background: it.color, flexShrink: 0,
            }} />
            <span style={{ fontSize: 12, color: T.inkSub, flex: 1, minWidth: 0,
              overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
            }}>{it.label}</span>
            <span style={{ fontSize: 11, color: T.inkMute, fontFamily: T.mono }}>
              {it.count}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

function ArcGauge({ value = 0.5, min = -1, max = 1, size = 220, color = T.lime }) {
  const t = (value - min) / (max - min);
  const tc = Math.max(0, Math.min(1, t));
  const start = -Math.PI;
  const end = 0;
  const ang = start + tc * (end - start);
  const r = size/2 - 18;
  const cx = size/2, cy = size/2;
  const arc = (a0, a1) => {
    const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const large = Math.abs(a1 - a0) > Math.PI ? 1 : 0;
    const sweep = a1 > a0 ? 1 : 0;
    return `M${x0} ${y0} A${r} ${r} 0 ${large} ${sweep} ${x1} ${y1}`;
  };
  return (
    <svg viewBox={`0 0 ${size} ${size/2 + 20}`} width="100%" style={{ display: 'block' }}>
      <path d={arc(start, end)} fill="none" stroke={T.stroke} strokeWidth="14" strokeLinecap="round" />
      <path d={arc(start, ang)} fill="none" stroke={color} strokeWidth="14" strokeLinecap="round" />
      <line x1={cx} y1={cy - r - 10} x2={cx} y2={cy - r + 10} stroke={T.inkMute} strokeWidth="2" />
    </svg>
  );
}

function DeltaBadge({ value, unit = 'ק״ג', good = 'down', size = 'md' }) {
  if (value === null || value === undefined || isNaN(value)) {
    return <span style={{ color: T.inkMute, fontSize: size==='sm'?11:13, fontFamily: T.mono }}>—</span>;
  }
  const isDown = value < -0.05;
  const isUp = value > 0.05;
  const positive = (good === 'down' && isDown) || (good === 'up' && isUp);
  const negative = (good === 'down' && isUp) || (good === 'up' && isDown);
  const color = positive ? T.lime : negative ? T.rose : T.inkMute;
  const arrow = isDown ? '↓' : isUp ? '↑' : '→';
  const fs = size === 'sm' ? 11 : 13;
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap: 4,
      color, fontSize: fs, fontFamily: T.mono, fontWeight: 600,
    }}>
      <span>{arrow}</span>
      <span>{Math.abs(value).toFixed(1)}</span>

  );
}

// ════════════════════════════════════════════════════════════════════
// PWA Install Prompt — singleton capture + React hook
// ════════════════════════════════════════════════════════════════════

const _installState = {
  canInstall: false,
  isInstalled: false,
  isIOS: false,
  prompt: null,
};
const _installSubs = new Set();

if (typeof window !== 'undefined') {
  _installState.isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent || '') && !window.MSStream;
  _installState.isInstalled =
    (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
    !!window.navigator.standalone;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    _installState.prompt = e;
    _installState.canInstall = true;
    _installSubs.forEach(fn => fn({ ..._installState }));
  });

  window.addEventListener('appinstalled', () => {
    _installState.isInstalled = true;
    _installState.canInstall = false;
    _installState.prompt = null;
    _installSubs.forEach(fn => fn({ ..._installState }));
  });
}

function useInstallPrompt() {
  const [st, setSt] = React.useState({ ..._installState });
  React.useEffect(() => {
    const fn = (s) => setSt(s);
    _installSubs.add(fn);
    return () => _installSubs.delete(fn);
  }, []);

  const install = async () => {
    if (!st.prompt) return false;
    try {
      st.prompt.prompt();
      const res = await st.prompt.userChoice;
      if (res.outcome === 'accepted') {
        _installState.isInstalled = true;
        _installState.canInstall = false;
        _installState.prompt = null;
        _installSubs.forEach(fn => fn({ ..._installState }));
      }
      return res.outcome === 'accepted';
    } catch (_) { return false; }
  };

  return { ...st, install };
}

// ─── Install button — shows native prompt or iOS instructions ───────
function InstallButton({ variant = 'primary', label = 'התקן במסך הבית' }) {
  const { canInstall, isInstalled, isIOS, install } = useInstallPrompt();
  const [showIOS, setShowIOS] = React.useState(false);

  if (isInstalled) return null;

  // Show only if installable (Android/Chrome/Edge) OR iOS (show instructions)
  if (!canInstall && !isIOS) return null;

  const handleClick = async () => {
    if (isIOS) { setShowIOS(true); return; }
    await install();
  };

  const styles = variant === 'ghost' ? {
    background: 'transparent', color: T.lime,
    border: `1px solid ${T.lime}55`,
  } : {
    background: T.lime, color: T.bg, border: 'none',
    boxShadow: `0 4px 18px ${T.lime}33`,
  };

  return (
    <>
      <button onClick={handleClick} style={{
        ...styles,
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        padding: '13px 20px', borderRadius: T.radius, cursor: 'pointer',
        fontSize: 14, fontWeight: 700, fontFamily: T.font, width: '100%',
      }}>
        <TabIcon name="download" size={18} />
        {label}
      </button>
      {showIOS && <IOSInstallDialog onClose={() => setShowIOS(false)} />}
    </>
  );
}

// ─── Button (primary) ───────────────────────────────────────────────
function Button({ children, onClick, disabled, variant = 'primary', style, type = 'button' }) {
  const base = {
    width: '100%', padding: '14px 20px', border: 'none', cursor: disabled ? 'not-allowed' : 'pointer',
    borderRadius: 14, fontSize: 15, fontWeight: 800, fontFamily: T.font,
    transition: 'transform 80ms, opacity 120ms',
    opacity: disabled ? 0.5 : 1,
  };
  const styles = {
    primary:   { ...base, background: T.lime, color: T.bg, boxShadow: `0 6px 20px ${T.lime}40` },
    secondary: { ...base, background: T.bgElev2, color: T.ink, border: `1px solid ${T.stroke}` },
    ghost:     { ...base, background: 'transparent', color: T.ink, border: `1px solid ${T.stroke}` },
    danger:    { ...base, background: 'transparent', color: T.rose, border: `1px solid ${T.rose}44` },
  };
  return (
    <button type={type} onClick={onClick} disabled={disabled} style={{ ...styles[variant], ...style }}
      onMouseDown={e => !disabled && (e.currentTarget.style.transform = 'scale(0.98)')}
      onMouseUp={e => (e.currentTarget.style.transform = 'scale(1)')}
      onMouseLeave={e => (e.currentTarget.style.transform = 'scale(1)')}>
      {children}
    </button>
  );
}

// ─── Toast system ───────────────────────────────────────────────────
const ToastContext = React.createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = React.useState([]);
  const show = React.useCallback((message, opts = {}) => {
    const id = uid();
    const t = {
      id,
      message,
      type: opts.type || 'info',
      duration: opts.duration ?? 2500,
      actionLabel: opts.actionLabel || null,
      onAction: opts.onAction || null,
    };
    setToasts(arr => [...arr, t]);
    setTimeout(() => setToasts(arr => arr.filter(x => x.id !== id)), t.duration);
  }, []);
  const dismiss = React.useCallback((id) => {
    setToasts(arr => arr.filter(x => x.id !== id));
  }, []);
  return (
    <ToastContext.Provider value={show}>
      {children}
      <div style={{
        position: 'fixed', bottom: 100, left: 0, right: 0,
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8,
        zIndex: 1000, pointerEvents: 'none', padding: '0 20px',
      }}>
        {toasts.map(t => (
          <div key={t.id} style={{
            pointerEvents: 'auto',
            display: 'flex', alignItems: 'center', gap: 10,
            background: t.type === 'success' ? T.lime : t.type === 'error' ? T.rose : T.bgElev2,
            color: t.type === 'success' ? T.bg : T.ink,
            padding: '10px 18px', borderRadius: 12, fontSize: 13, fontWeight: 600,
            fontFamily: T.font, boxShadow: '0 10px 30px rgba(0,0,0,0.3)',
            maxWidth: 380, textAlign: 'center', direction: 'rtl',
            animation: 'mk-fadeup 180ms ease',
          }}>
            <div style={{ flex: 1 }}>{t.message}</div>
            {t.actionLabel && t.onAction && (
              <button onClick={() => { t.onAction(); dismiss(t.id); }} style={{
                background: 'transparent',
                border: `1.5px solid ${t.type === 'success' ? T.bg : T.ink}`,
                color: t.type === 'success' ? T.bg : T.ink,
                padding: '4px 12px', borderRadius: 8, fontSize: 12,
                fontWeight: 700, fontFamily: T.font, cursor: 'pointer',
                whiteSpace: 'nowrap',
              }}>{t.actionLabel}</button>
            )}
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

function useToast() {
  const ctx = React.useContext(ToastContext);
  return ctx || (() => {});
}

// ─── Confirmation dialog ────────────────────────────────────────────
function ConfirmDialog({ open, title, message, confirmLabel = 'אשר', cancelLabel = 'ביטול', onConfirm, onCancel, danger = false }) {
  if (!open) return null;
  return (
    <div onClick={onCancel} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.65)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 900, padding: 24, backdropFilter: 'blur(4px)',
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: T.bgElev, borderRadius: T.radiusL, border: `1px solid ${T.strokeHi}`,
        padding: 24, maxWidth: 340, width: '100%', direction: 'rtl',
      }}>
        <div style={{ fontSize: 17, fontWeight: 700, color: T.ink, marginBottom: 8 }}>{title}</div>
        {message && <div style={{ fontSize: 13, color: T.inkSub, marginBottom: 20, lineHeight: 1.5 }}>{message}</div>}
        <div style={{ display: 'flex', gap: 10 }}>

          <Button variant={danger ? 'danger' : 'primary'} onClick={onConfirm}>{confirmLabel}</Button>

      </div>
    </div>
  );
}

// ─── Loading skeleton — animated lines that mimic content ──────────
function SkeletonLines({ lines = 3, height = 12, gap = 8 }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap, padding: '4px 0' }}>
      <style>{`
        @keyframes mishkalut-skeleton-pulse {
          0%, 100% { opacity: 0.4; }
          50%      { opacity: 0.8; }
        }
      `}</style>
      {Array.from({ length: lines }).map((_, i) => (
        <div key={i} style={{
          height,
          width: i === lines - 1 ? '60%' : (i % 2 === 0 ? '95%' : '85%'),
          background: `linear-gradient(90deg, ${T.bgElev} 0%, ${T.bgElev2} 50%, ${T.bgElev} 100%)`,
          backgroundSize: '200% 100%',
          borderRadius: 6,
          animation: 'mishkalut-skeleton-pulse 1.4s ease-in-out infinite',
          animationDelay: `${i * 0.15}s`,
        }} />
      ))}
    </div>
  );
}

// ─── Get persona from state with fallback ──────────────────────────
function getPersona(state) {
  const id = state?.settings?.persona || 'neutral';
  return PERSONAS[id] || PERSONAS.neutral;
}

// NOTE: personaStr() is now defined in 18-strings.jsx with gender support.

// ─── Persona selector UI component ──────────────────────────────────
function PersonaSelector({ selected, onSelect, compact = false }) {
  const personas = ['polish_mom', 'salesman', 'cynic_coach', 'jealous_friend', 'neutral'];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {personas.map(id => {
        const p = PERSONAS[id];
        const isSelected = selected === id;
        return (
          <button key={id} onClick={() => onSelect(id)} style={{
            display: 'flex', alignItems: 'center', gap: 14,
            padding: compact ? '12px 14px' : '14px 16px',
            border: `1.5px solid ${isSelected ? T.lime : T.stroke}`,
            background: isSelected ? `${T.lime}12` : T.bgElev,
            borderRadius: T.radius, cursor: 'pointer',
            textAlign: 'right', direction: 'rtl', fontFamily: T.font, color: T.ink,
            width: '100%', transition: 'all 150ms',
          }}>
            <div style={{
              fontSize: compact ? 22 : 26,
              width: compact ? 36 : 42, height: compact ? 36 : 42,
              borderRadius: compact ? 12 : 14,
              background: isSelected ? `${T.lime}22` : T.bgElev2,
              display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
            }}>{p.emoji}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: compact ? 13 : 14, fontWeight: 700 }}>{p.name}</div>
              <div style={{ fontSize: compact ? 11 : 12, color: T.inkSub, marginTop: 2, lineHeight: 1.4 }}>{p.tagline}</div>
            </div>
            {isSelected && (
              <div style={{
                width: 22, height: 22, borderRadius: 11, background: T.lime,
                display: 'flex', alignItems: 'center', justifyContent: 'center', color: T.bg,
                fontSize: 13, fontWeight: 800, flexShrink: 0,
              }}>✓</div>
            )}
          </button>
        );
      })}
      {/* Disclaimer for all 5 personas — about stereotypes + gendered voice */}
      <div style={{
        marginTop: 12, padding: '10px 12px',
        fontSize: 11, color: T.inkMute, lineHeight: 1.5,
        background: T.bgElev, borderRadius: 10, direction: 'rtl',
        border: `1px dashed ${T.stroke}`,
      }}>
        מבוסס על סטריאוטיפ הומוריסטי. אם מרגיש לא נעים — תחליף מתי שתרצה.
      </div>
    </div>
  );
}

// ─── Sincerity moments: every N interactions, persona drops the mask once ─
// N = 20 (configurable). Returns null if it's not a sincerity moment.
const SINCERITY_EVERY = 20;

const SINCERITY_LINES = {
  polish_mom: {
    male: 'אלון... תקשיב רגע. אני באמת גאה בך. אבא היה גאה.',
    female: 'מירב... תקשיבי רגע. אני באמת גאה בך. אמא הייתה גאה.',
  },
  salesman: {
    male: 'אלון, די עם המכירות. באמת — אתה עושה עבודה טובה.',
    female: 'מירב, די עם המכירות. באמת — את עושה עבודה טובה.',
  },
  cynic_coach: {
    male: 'תשמע. ברצינות. אתה עושה את זה טוב. תמשיך.',
    female: 'תשמעי. ברצינות. את עושה את זה טוב. תמשיכי.',
  },
  jealous_friend: {
    male: 'אחי, תשמע. באמת. אני מעריך אותך. תמשיך, אל תאבד את זה.',
    female: 'אחותי, תשמעי. באמת. אני מעריכה אותך. תמשיכי, אל תאבדי את זה.',

  // neutral never gets sincerity — it's already sincere
};

function getSincerityLine(state) {
  const personaId = state?.settings?.persona || 'neutral';
  if (personaId === 'neutral') return null;

  const counter = state?.settings?.personaInteractions || 0;
  // Fire on interaction count 20, 40, 60, ...
  if (counter > 0 && counter % SINCERITY_EVERY === 0) {
    const gender = state?.user?.gender === 'female' ? 'female' : 'male';
    const name = (state?.user?.name || '').trim();
    const linesForPersona = SINCERITY_LINES[personaId];
    if (!linesForPersona) return null;
    let line = linesForPersona[gender] || linesForPersona.male;
    if (name) {
      const placeholder = gender === 'female' ? 'מירב' : 'אלון';
      if (name !== placeholder) {
        line = line.replace(new RegExp(placeholder, 'g'), name);
      }
    }
    return line;
  }
  return null;
}

function personaStr(state, key, fallback = '') {
  const personaId = state?.settings?.persona || 'neutral';
  const gender = state?.user?.gender === 'female' ? 'female' : 'male';
  const name = (state?.user?.name || '').trim();

  const entry = STRINGS[key];
  if (!entry) return fallback;

function personaError(state, key, fallback = 'אירעה תקלה. נסה שוב.') {
  const personaId = state?.settings?.persona || 'neutral';
  const gender = state?.user?.gender === 'female' ? 'female' : 'male';
  const name = (state?.user?.name || '').trim();

  const entry = ERROR_MESSAGES[key];
  if (!entry) return fallback;

  const personaEntry = entry[personaId] || entry.neutral;
  if (!personaEntry) return fallback;

  let text = personaEntry[gender] || personaEntry.male || fallback;

  if (name) {
    const placeholder = gender === 'female' ? 'מירב' : 'אלון';
    if (name !== placeholder) {
      text = text.replace(new RegExp(placeholder, 'g'), name);
    }
  }
  return text;
}

// ─── Classify a raw error and return persona-aware message ──────────
// Inspects e.message and routes to the right error key.
function personaErrorFromException(state, e, fallback) {
  const msg = (e?.message || String(e || '')).toLowerCase();

  // Network / offline
  if (msg.includes('failed to fetch') || msg.includes('networkerror') || msg.includes('network request failed')) {
    return personaError(state, 'network_offline', fallback || 'אין חיבור לאינטרנט');
  }
  // Timeout
  if (msg.includes('timeout') || msg.includes('aborted')) {
    return personaError(state, 'api_timeout', fallback || 'הבקשה לא הושלמה בזמן');
  }
  // Rate limit / cap
  if (msg.includes('rate limit') || msg.includes('429') || msg.includes('cap exceeded') || msg.includes('weekly cap') || msg.includes('quota')) {
    return personaError(state, 'weekly_cap_exceeded', fallback || 'חרגת מהמכסה השבועית');
  }
  // Auth failures (API key)
  if (msg.includes('invalid_api_key') || msg.includes('401') || msg.includes('unauthorized') || msg.includes('authentication')) {
    return personaError(state, 'invalid_api_key', fallback || 'מפתח API לא תקין');
  }
  // Server errors
  if (msg.includes('500') || msg.includes('502') || msg.includes('503') || msg.includes('504') || msg.includes('server')) {
    return personaError(state, 'server_error', fallback || 'שגיאת שרת');
  }
  // Photo / image issues
  if (msg.includes('image') || msg.includes('photo')) {
    return personaError(state, 'invalid_photo', fallback || 'בעיה בתמונה');
  }
  // Default — return original message (it's probably useful)
  return e?.message || fallback || 'אירעה תקלה';
}

// Build a system prompt for given persona + user
function buildAISystemPrompt(promptType, state) {
  const personaId = state?.settings?.persona || 'neutral';
  const gender = state?.user?.gender === 'female' ? 'female' : 'male';
  const name = (state?.user?.name || '').trim() || (gender === 'female' ? 'משתמשת' : 'משתמש');

  const promptSet = AI_PROMPTS[promptType];
  if (!promptSet) return '';

  const template = promptSet[personaId] || promptSet.neutral;
  if (!template) return '';

  const genderHe = gender === 'female' ? 'נקבה' : 'זכר';
  return template.replace(/\[NAME\]/g, name).replace(/\[GENDER\]/g, genderHe);
}

function OnboardingScreen() {
  const { dispatch } = useStore();
  const [step, setStep] = React.useState(0);
  const [persona, setPersona] = React.useState('neutral');
  const [name, setName] = React.useState('');
  const [heightCm, setHeightCm] = React.useState(170);
  const [ageYears, setAgeYears] = React.useState(35);
  const [gender, setGender] = React.useState('male');
  const [currentWeight, setCurrentWeight] = React.useState(80.0);
  const [goalWeight, setGoalWeight] = React.useState(75.0);
  const [pace, setPace] = React.useState('balanced');
  const [unit, setUnit] = React.useState('kg');
  // AI setup (last step)
  const [aiMode, setAiMode] = React.useState('shared');
  const [sharedPw, setSharedPw] = React.useState('');
  const [apiKey, setApiKey] = React.useState('');

  const next = () => setStep(s => s + 1);
  const prev = () => setStep(s => Math.max(0, s - 1));

  const complete = () => {
    const toKg = (v) => unit === 'lb' ? v / 2.20462 : v;
    dispatch({ type: 'SET_PERSONA', persona });
    dispatch({
      type: 'COMPLETE_ONBOARDING',
      name: name.trim() || 'משתמש',
      heightCm, ageYears, gender,
      currentWeight: Math.round(toKg(currentWeight) * 10) / 10,
      goalWeight: Math.round(toKg(goalWeight) * 10) / 10,
      pace, unit,
    });
    if (aiMode === 'shared' && sharedPw.trim()) {
      dispatch({ type: 'SET_API_MODE', mode: 'shared' });
      dispatch({ type: 'SET_SHARED_PASSWORD', password: sharedPw.trim() });
    } else if (aiMode === 'direct' && apiKey.trim()) {
      dispatch({ type: 'SET_API_MODE', mode: 'direct' });
      dispatch({ type: 'SET_API_KEY', key: apiKey.trim() });
    }
  };

  return (
    <div style={{
      background: T.bg, color: T.ink, fontFamily: T.font, direction: 'rtl',
      height: '100dvh', display: 'flex', flexDirection: 'column',

        {[0,1,2,3,4,5].map(i => (
          <div key={i} style={{
            flex: 1, height: 3, borderRadius: 2,
            background: i <= step ? T.lime : T.stroke,
            transition: 'background 200ms',
          }} />
        ))}
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '24px 24px' }}>
        {step === 0 && <WelcomeStep onNext={next} />}
        {step === 1 && <PersonaStep persona={persona} setPersona={setPersona} onNext={next} onPrev={prev} />}
        {step === 2 && <NameHeightStep
          name={name} setName={setName}
          heightCm={heightCm} setHeightCm={setHeightCm}
          ageYears={ageYears} setAgeYears={setAgeYears}
          gender={gender} setGender={setGender}
          onNext={next} onPrev={prev}
        />}
        {step === 3 && <WeightStep
          unit={unit} setUnit={setUnit}
          currentWeight={currentWeight} setCurrentWeight={setCurrentWeight}
          goalWeight={goalWeight} setGoalWeight={setGoalWeight}
          onNext={next} onPrev={prev}
        />}
        {step === 4 && <PaceStep
          pace={pace} setPace={setPace}
          currentWeight={currentWeight} goalWeight={goalWeight} unit={unit}
          onNext={next} onPrev={prev}
        />}
        {step === 5 && <AiSetupStep
          mode={aiMode} setMode={setAiMode}
          sharedPw={sharedPw} setSharedPw={setSharedPw}
          apiKey={apiKey} setApiKey={setApiKey}
          onComplete={complete} onPrev={prev}
        />}
      </div>
    </div>
  );
}

// ─── Number stepper (+/-) ───────────────────────────────────────────
function NumberStepper({ value, onChange, min, max, step = 1, unit = '', displayFn }) {
  const [editing, setEditing] = React.useState(false);
  const [editValue, setEditValue] = React.useState('');
  const timerRef = React.useRef(null);
  const rampRef = React.useRef({ intervalMs: 180, fastStep: 1 });

  const clamp = (v) => Math.max(min, Math.min(max, +v.toFixed(step < 1 ? 1 : 0)));

  const stopHold = () => {
    if (timerRef.current) {
      clearTimeout(timerRef.current);
      clearInterval(timerRef.current);
      timerRef.current = null;
    }
    rampRef.current = { intervalMs: 180, fastStep: 1 };
  };

  // On press-and-hold: start repeating, accelerating after first second
  const startHold = (direction) => {
    // First tick happens immediately via onClick
    let ticks = 0;
    const tick = () => {
      ticks++;
      // Accelerate: after 5 ticks bump step size, after 12 bump again
      const fastStep = ticks > 12 ? step * 10 : ticks > 5 ? step * 3 : step;
      onChange(clamp(value + direction * fastStep));
      // After accelerating, shorten interval
      if (ticks === 5 && rampRef.current.intervalMs > 80) {
        rampRef.current.intervalMs = 80;
        clearInterval(timerRef.current);
        timerRef.current = setInterval(tick, rampRef.current.intervalMs);
      }
      if (ticks === 12 && rampRef.current.intervalMs > 40) {
        rampRef.current.intervalMs = 40;
        clearInterval(timerRef.current);
        timerRef.current = setInterval(tick, rampRef.current.intervalMs);
      }
    };
    // Start after 350ms to not conflict with simple click
    timerRef.current = setTimeout(() => {
      timerRef.current = setInterval(tick, rampRef.current.intervalMs);
    }, 350);
  };

  // Need fresh `value` in the interval — use a ref
  const valueRef = React.useRef(value);
  React.useEffect(() => { valueRef.current = value; }, [value]);

  const startHoldRef = (direction) => {
    let ticks = 0;
    const tick = () => {
      ticks++;
      const fastStep = ticks > 12 ? step * 10 : ticks > 5 ? step * 3 : step;
      const next = Math.max(min, Math.min(max, +(valueRef.current + direction * fastStep).toFixed(step < 1 ? 1 : 0)));
      valueRef.current = next;
      onChange(next);
      if (ticks === 5 && timerRef.current) {
        clearInterval(timerRef.current);
        timerRef.current = setInterval(tick, 80);
      }
      if (ticks === 12 && timerRef.current) {
        clearInterval(timerRef.current);
        timerRef.current = setInterval(tick, 40);
      }
    };
    timerRef.current = setTimeout(() => {
      timerRef.current = setInterval(tick, 180);
    }, 350);
  };

  const dec = () => onChange(clamp(value - step));
  const inc = () => onChange(clamp(value + step));

  const commitEdit = () => {
    const parsed = parseFloat(editValue.replace(',', '.'));
    if (!isNaN(parsed)) onChange(clamp(parsed));
    setEditing(false);
    setEditValue('');
  };

  const display = displayFn ? displayFn(value) : value.toFixed(step < 1 ? 1 : 0);

  React.useEffect(() => () => stopHold(), []);

  return (
    <div style={{ display: 'flex', gap: 10, alignItems: 'stretch' }}>
      <button
        onClick={dec}
        onPointerDown={() => startHoldRef(-1)}
        onPointerUp={stopHold}
        onPointerLeave={stopHold}
        onPointerCancel={stopHold}
        style={btnPlusMinus}
      >−</button>
      {editing ? (
        <input
          autoFocus
          type="text"
          inputMode="decimal"
          value={editValue}
          onChange={e => setEditValue(e.target.value)}
          onBlur={commitEdit}
          onKeyDown={e => { if (e.key === 'Enter') commitEdit(); if (e.key === 'Escape') { setEditing(false); setEditValue(''); } }}
          style={{
            flex: 1, background: T.bgElev, border: `1px solid ${T.lime}`, borderRadius: 12,
            textAlign: 'center', fontFamily: T.mono, fontSize: 26, fontWeight: 700,
            color: T.ink, outline: 'none', padding: 0, letterSpacing: -1,
          }}
        />
      ) : (
        <div
          onClick={() => { setEditValue(String(display)); setEditing(true); }}
          style={{
            flex: 1, background: T.bgElev, border: `1px solid ${T.stroke}`, borderRadius: 12,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
            cursor: 'text', userSelect: 'none',
          }}>
          <span style={{ fontFamily: T.mono, fontSize: 28, fontWeight: 700, letterSpacing: -1, color: T.ink }}>{display}</span>
          <span style={{ fontSize: 12, color: T.inkMute }}>{unit}</span>
        </div>
      )}
      <button
        onClick={inc}
        onPointerDown={() => startHoldRef(+1)}
        onPointerUp={stopHold}
        onPointerLeave={stopHold}
        onPointerCancel={stopHold}
        style={btnPlusMinus}
      >+</button>
    </div>
  );
}

// V2 — Velocity (speedometer)
// ════════════════════════════════════════════════════════════════════
function HomeV2({ onNavigate }) {
  const { state, stats } = useStore();
  const unit = state.settings.unit;
  const goal = state.goal.weight;

  if (stats.empty) {
    return (
      <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>
        <HomeHeader onNavigate={onNavigate} />
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
          <EmptyState icon="⚖️" title="בוא נתחיל" message="הוסף שקילה ראשונה כדי לראות מד מהירות."
            action={<Button onClick={() => onNavigate('log')}>הוסף שקילה</Button>} />
        </div>
      </div>
    );
  }

  const pace = stats.paceKgPerWeek;
  const maxPace = 1.2;
  const velocityNormalized = pace !== null
    ? Math.max(-1, Math.min(1, -pace / maxPace))
    : 0;

  return (
    <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>
      <div style={{ padding: '12px 18px 6px', display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{ flex: 1, fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>MISHKACH · VELOCITY</div>
        <WorkoutStreakBadge onNavigate={onNavigate} />
        <StreakBadge days={stats.streak} />
        <AvatarDot letter={(state.user.name || 'U')[0]} size={28} />
      </div>

      {/* Streak milestone message — shows the last milestone passed, not just exact match */}
      {(() => {
        const milestones = [2, 3, 5, 7, 10, 14, 30];
        // Find the highest milestone that is <= current streak
        const passed = milestones.filter(m => stats.streak >= m);
        if (passed.length === 0) return null;
        const milestone = passed[passed.length - 1];
        // Only show for 7 days after passing the milestone, to avoid forever-stale
        const daysSinceMilestone = stats.streak - milestone;
        if (daysSinceMilestone > 7) return null;
        const msg = personaStr(state, `streak_${milestone}`, '');
        if (!msg) return null;
        return (
          <div style={{
            margin: '4px 18px 8px', padding: '8px 12px',
            background: `${T.amber}15`, border: `1px solid ${T.amber}44`,
            borderRadius: 10, fontSize: 12, color: T.amber, lineHeight: 1.5, direction: 'rtl',
          }}>{msg}</div>
        );
      })()}

      {/* Missed day banner — last weigh was yesterday or earlier (1-6 days ago) */}
      {(() => {
        if (!stats.latestDate) return null;
        const today = todayISO();
        if (stats.latestDate === today) return null; // already weighed today
        const daysAgo = daysBetweenISO(stats.latestDate, today);
        if (daysAgo < 1 || daysAgo > 6) return null; // only show 1-6 days
        let key;
        if (daysAgo === 1) key = 'missed_day_1';
        else if (daysAgo <= 3) key = 'missed_day_3';
        else key = 'missed_day_7';
        const msg = personaStr(state, key, '');
        if (!msg) return null;
        return (
          <div style={{
            margin: '4px 18px 8px', padding: '8px 12px',
            background: `${T.rose}10`, border: `1px solid ${T.rose}33`,
            borderRadius: 10, fontSize: 12, color: T.rose, lineHeight: 1.5, direction: 'rtl',
          }}>{msg}</div>
        );
      })()}

      <div style={{ flex: 1, overflowY: 'auto', padding: '0 18px 20px' }}>
        {/* Velocity gauge hero */}
        <div style={{ position: 'relative', marginTop: 4, marginBottom: 10 }}>
          <ArcGauge value={velocityNormalized} color={velocityNormalized > 0 ? T.lime : velocityNormalized < 0 ? T.rose : T.inkMute} size={320} />
          <div style={{ position: 'absolute', bottom: 16, left: 18, fontSize: 10, color: T.inkMute, fontFamily: T.mono }}>+1.2</div>

            <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, marginTop: 4 }}>

            </div>

              </div>

            <div style={{ textAlign: 'left' }}>
              <Sparkline data={stats.list.slice(-14)} width={110} height={40} stroke={T.lime} />
              <div style={{ fontSize: 9, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1, marginTop: 2 }}>14 DAYS</div>
            </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10, marginTop: 14, paddingTop: 14, borderTop: `1px solid ${T.stroke}` }}>

        {/* Peak/Low */}
        {stats.n >= 3 && (
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>
            <Card padding={12}>
              <div style={{ fontSize: 10, color: T.rose, fontFamily: T.mono, letterSpacing: 1 }}>PEAK · שיא ▲</div>
