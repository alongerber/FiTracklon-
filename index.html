  <script type="text/babel" data-presets="env,react" data-type="module">
/* ════════════════════════════════════════════════════════════════════
   משקך · Mishkach PWA
   Single-file Hebrew weight tracker. Offline-first, no backend.
   All data in localStorage. No telemetry.
   ════════════════════════════════════════════════════════════════════ */

// ════════════════════════════════════════════════════════════════════
// 01-theme.jsx — Design tokens + date/format helpers
// ════════════════════════════════════════════════════════════════════

const T = {
  bg:        '#0b0d0c',
  bgElev:    '#141816',
  bgElev2:   '#1c211e',
  stroke:    'rgba(255,255,255,0.08)',
  strokeHi:  'rgba(255,255,255,0.14)',
  ink:       '#f4f6f2',
  inkSub:    'rgba(244,246,242,0.62)',
  inkMute:   'rgba(244,246,242,0.38)',
  lime:      '#c6ff3d',
  limeDim:   'rgba(198,255,61,0.18)',
  amber:     '#ffb94a',
  rose:      '#ff5b7a',
  cyan:      '#5ce1ff',
  violet:    '#b38bff',
  font:      '"Heebo", "Rubik", -apple-system, system-ui, sans-serif',
  mono:      '"JetBrains Mono", "SF Mono", ui-monospace, monospace',
  radius:    12,
  radiusL:   18,
  radiusXL:  28,
};

// ─── Date utilities (local-time, YYYY-MM-DD string keys) ─────────────
function todayISO() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function nowHHMM() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function addDaysISO(iso, delta) {
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + delta);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function daysBetweenISO(a, b) {
  const [ay,am,ad] = a.split('-').map(Number);
  const [by,bm,bd] = b.split('-').map(Number);
  const da = new Date(ay, am-1, ad);
  const db = new Date(by, bm-1, bd);
  return Math.round((db - da) / 86400000);
}
function parseDOWFromISO(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(y, m-1, d).getDay();
}

// ─── Format helpers ──────────────────────────────────────────────────
const fmt = {
  kg: (n, unit = 'kg') => {
    if (n === null || n === undefined || isNaN(n)) return '—';
    return unit === 'lb' ? (n * 2.20462).toFixed(1) : n.toFixed(1);
  },
  unitLabel: (unit) => unit === 'lb' ? 'lb' : 'ק״ג',
  signed: (n) => {
    if (n === null || n === undefined || isNaN(n)) return '—';
    return (n > 0 ? '+' : '') + n.toFixed(1);
  },
  day: (iso) => {
    if (!iso) return '—';
    const [y,m,d] = iso.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    const days = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
    return `${days[dt.getDay()]} · ${dt.getDate()}.${dt.getMonth()+1}`;
  },
  dayShort: (iso) => {
    if (!iso) return '—';
    const [y,m,d] = iso.split('-').map(Number);
    return `${d}.${m}`;
  },
  relativeDay: (iso) => {
    const diff = daysBetweenISO(iso, todayISO());
    if (diff === 0) return 'היום';
    if (diff === 1) return 'אתמול';
    if (diff === -1) return 'מחר';
    if (diff < 7) return `לפני ${diff} ימים`;
    if (diff < 30) return `לפני ${Math.round(diff/7)} שבועות`;
    return `לפני ${Math.round(diff/30)} חודשים`;
  },
};

// ─── UUID ───────────────────────────────────────────────────────────
function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}


// ════════════════════════════════════════════════════════════════════
// 02-store.jsx — State, reducer, persistence, stats computation
// ════════════════════════════════════════════════════════════════════

const STORAGE_KEY = 'mishkach.v1.data';
const STATE_VERSION = 1;

const initialState = {
  version: STATE_VERSION,
  user: {
    name: '',
    heightCm: 175,
    ageYears: 35,
    gender: 'male',      // 'male' | 'female'
    startWeight: null,   // kg
    startDate: null,     // YYYY-MM-DD
  },
  goal: {
    weight: null,        // kg
    pace: 'balanced',    // 'slow' | 'balanced' | 'aggressive'
  },
  // entries: { 'YYYY-MM-DD': { weight: kg, time: 'HH:mm', note: string, createdAt: iso } }
  entries: {},
  // nutrition: goals + meals keyed by date
  nutrition: {
    goals: {
      calories: null,    // daily target
      protein: null,     // grams
      carbs: null,
      fat: null,
      source: 'auto',    // 'auto' | 'manual' — if auto, recalc when weight/goal change
    },
    // meals: { 'YYYY-MM-DD': [ { id, time, description, calories, protein, carbs, fat, source, thumbnail?, aiNotes?, items?, createdAt } ] }
    meals: {},
  },
  // Claude API config
  apiConfig: {
    key: '',             // user's anthropic API key
    model: 'claude-opus-4-7',
    enabled: true,
  },
  // Usage tracking
  usage: {
    allTime: { requests: 0, inputTokens: 0, outputTokens: 0, costUSD: 0 },
    byMonth: {},         // { 'YYYY-MM': { requests, inputTokens, outputTokens, costUSD } }
    byFeature: {},       // { 'nutrition_text': {count, cost}, ... }
  },
  // Cached insights (so user doesn't pay twice)
  insights: {
    weekly: null,        // { text, generatedAt, weekEnding }
    plateau: null,       // { text, generatedAt, periodDays }
    calibration: null,   // { text, generatedAt }
  },
  settings: {
    unit: 'kg',
    homeVariant: 'v1',
    firstLaunch: true,
  },
  meta: {
    createdAt: null,
    updatedAt: null,
  },
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return initialState;
    const parsed = JSON.parse(raw);
    // Basic migration: if version mismatch, try merging over initialState
    if (parsed.version !== STATE_VERSION) {
      return { ...initialState, ...parsed, version: STATE_VERSION };
    }
    // Deep merge for safety
    return {
      ...initialState,
      ...parsed,
      user: { ...initialState.user, ...(parsed.user || {}) },
      goal: { ...initialState.goal, ...(parsed.goal || {}) },
      settings: { ...initialState.settings, ...(parsed.settings || {}) },
      entries: parsed.entries || {},
      nutrition: {
        ...initialState.nutrition,
        ...(parsed.nutrition || {}),
        goals: { ...initialState.nutrition.goals, ...((parsed.nutrition || {}).goals || {}) },
        meals: (parsed.nutrition || {}).meals || {},
      },
      apiConfig: { ...initialState.apiConfig, ...(parsed.apiConfig || {}) },
      usage: {
        ...initialState.usage,
        ...(parsed.usage || {}),
        allTime: { ...initialState.usage.allTime, ...((parsed.usage || {}).allTime || {}) },
        byMonth: (parsed.usage || {}).byMonth || {},
        byFeature: (parsed.usage || {}).byFeature || {},
      },
      insights: { ...initialState.insights, ...(parsed.insights || {}) },
      meta: { ...initialState.meta, ...(parsed.meta || {}) },
    };
  } catch (e) {
    console.warn('loadState failed, resetting:', e);
    return initialState;
  }
}

function saveState(state) {
  try {
    const toSave = { ...state, meta: { ...state.meta, updatedAt: new Date().toISOString() } };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  } catch (e) {
    console.warn('saveState failed:', e);
  }
}

function reducer(state, action) {
  switch (action.type) {
    case 'SET_USER':
      return { ...state, user: { ...state.user, ...action.user } };
    case 'SET_GOAL':
      return { ...state, goal: { ...state.goal, ...action.goal } };
    case 'UPSERT_ENTRY': {
      const { date, weight, time, note } = action;
      return {
        ...state,
        entries: {
          ...state.entries,
          [date]: {
            weight,
            time: time || nowHHMM(),
            note: note || '',
            createdAt: state.entries[date]?.createdAt || new Date().toISOString(),
            updatedAt: new Date().toISOString(),
          },
        },
      };
    }
    case 'DELETE_ENTRY': {
      const { [action.date]: _, ...rest } = state.entries;
      return { ...state, entries: rest };
    }

    // ─── Nutrition ──────────────────────────────────────────────
    case 'SET_NUTRITION_GOALS':
      return {
        ...state,
        nutrition: {
          ...state.nutrition,
          goals: { ...state.nutrition.goals, ...action.goals },
        },
      };
    case 'ADD_MEAL': {
      const { date, meal } = action;
      const existing = state.nutrition.meals[date] || [];
      return {
        ...state,
        nutrition: {
          ...state.nutrition,
          meals: {
            ...state.nutrition.meals,
            [date]: [...existing, { ...meal, id: meal.id || uid(), createdAt: new Date().toISOString() }],
          },
        },
      };
    }
    case 'UPDATE_MEAL': {
      const { date, mealId, updates } = action;
      const existing = state.nutrition.meals[date] || [];
      return {
        ...state,
        nutrition: {
          ...state.nutrition,
          meals: {
            ...state.nutrition.meals,
            [date]: existing.map(m => m.id === mealId ? { ...m, ...updates } : m),
          },
        },
      };
    }
    case 'DELETE_MEAL': {
      const { date, mealId } = action;
      const existing = state.nutrition.meals[date] || [];
      const filtered = existing.filter(m => m.id !== mealId);
      const newMeals = { ...state.nutrition.meals };
      if (filtered.length === 0) delete newMeals[date];
      else newMeals[date] = filtered;
      return { ...state, nutrition: { ...state.nutrition, meals: newMeals } };
    }

    // ─── API config ─────────────────────────────────────────────
    case 'SET_API_KEY':
      return { ...state, apiConfig: { ...state.apiConfig, key: action.key || '' } };
    case 'SET_API_ENABLED':
      return { ...state, apiConfig: { ...state.apiConfig, enabled: !!action.enabled } };

    // ─── Usage tracking ─────────────────────────────────────────
    case 'TRACK_USAGE': {
      const { inputTokens, outputTokens, feature, costUSD } = action;
      const month = todayISO().slice(0, 7); // YYYY-MM
      const at = state.usage.allTime;
      const bm = state.usage.byMonth[month] || { requests: 0, inputTokens: 0, outputTokens: 0, costUSD: 0 };
      const bf = state.usage.byFeature[feature] || { count: 0, costUSD: 0 };
      return {
        ...state,
        usage: {
          allTime: {
            requests:     at.requests + 1,
            inputTokens:  at.inputTokens + inputTokens,
            outputTokens: at.outputTokens + outputTokens,
            costUSD:      at.costUSD + costUSD,
          },
          byMonth: {
            ...state.usage.byMonth,
            [month]: {
              requests:     bm.requests + 1,
              inputTokens:  bm.inputTokens + inputTokens,
              outputTokens: bm.outputTokens + outputTokens,
              costUSD:      bm.costUSD + costUSD,
            },
          },
          byFeature: {
            ...state.usage.byFeature,
            [feature]: { count: bf.count + 1, costUSD: bf.costUSD + costUSD },
          },
        },
      };
    }

    // ─── Insights ───────────────────────────────────────────────
    case 'SET_INSIGHT':
      return { ...state, insights: { ...state.insights, [action.kind]: action.payload } };
    case 'CLEAR_INSIGHT':
      return { ...state, insights: { ...state.insights, [action.kind]: null } };

    case 'SET_SETTING':
      return { ...state, settings: { ...state.settings, [action.key]: action.value } };
    case 'COMPLETE_ONBOARDING': {
      const today = todayISO();
      return {
        ...state,
        user: {
          ...state.user,
          name: action.name,
          heightCm: action.heightCm,
          ageYears: action.ageYears || state.user.ageYears,
          gender: action.gender || state.user.gender,
          startWeight: action.currentWeight,
          startDate: today,
        },
        goal: { ...state.goal, weight: action.goalWeight, pace: action.pace || 'balanced' },
        entries: {
          ...state.entries,
          [today]: {
            weight: action.currentWeight,
            time: nowHHMM(),
            note: '',
            createdAt: new Date().toISOString(),
          },
        },
        settings: { ...state.settings, firstLaunch: false, unit: action.unit || 'kg' },
        meta: { createdAt: state.meta.createdAt || new Date().toISOString(), updatedAt: new Date().toISOString() },
      };
    }
    case 'RESET_ALL':
      return initialState;
    case 'IMPORT_STATE':
      return { ...initialState, ...action.state, version: STATE_VERSION };
    default:
      return state;
  }
}

// ─── Stats: derived data from state.entries ──────────────────────────
function computeStats(state) {
  const list = Object.entries(state.entries)
    .map(([date, e]) => ({ date, ...e, dayOfWeek: parseDOWFromISO(date) }))
    .sort((a, b) => a.date.localeCompare(b.date));

  const n = list.length;
  if (n === 0) {
    return { empty: true, list: [], n: 0 };
  }

  const latest = list[n - 1];
  const current = latest.weight;
  const prev = n > 1 ? list[n - 2] : null;
  const goal = state.goal.weight;
  const startWeight = state.user.startWeight ?? list[0].weight;

  // Find closest entry on or before target date (days back from latest)
  const findNearPast = (daysBack) => {
    const targetDate = addDaysISO(latest.date, -daysBack);
    for (let i = n - 1; i >= 0; i--) {
      if (list[i].date <= targetDate) return list[i];
    }
    return null;
  };

  const weekAgo = findNearPast(7);
  const monthAgo = findNearPast(30);

  const weights = list.map(e => e.weight);
  const peakIdx = weights.indexOf(Math.max(...weights));
  const lowIdx = weights.indexOf(Math.min(...weights));

  // Pace (kg/week): slope over the last 30 days of data available
  let paceKgPerWeek = null;
  if (monthAgo && monthAgo.date !== latest.date) {
    const span = list.filter(e => e.date >= monthAgo.date);
    if (span.length >= 2) {
      const days = daysBetweenISO(span[0].date, span[span.length-1].date);
      if (days > 0) {
        paceKgPerWeek = ((span[span.length-1].weight - span[0].weight) / days) * 7;
      }
    }
  } else if (list.length >= 2) {
    // fallback: use all data
    const days = daysBetweenISO(list[0].date, latest.date);
    if (days > 0) {
      paceKgPerWeek = ((latest.weight - list[0].weight) / days) * 7;
    }
  }

  const toGoal = goal !== null && goal !== undefined ? current - goal : null;
  const etaDays = (paceKgPerWeek !== null && toGoal !== null && paceKgPerWeek !== 0 && Math.sign(paceKgPerWeek) === -Math.sign(toGoal))
    ? Math.round(Math.abs(toGoal / paceKgPerWeek) * 7)
    : null;

  const progressPct = (startWeight !== null && goal !== null && goal !== undefined && startWeight !== goal)
    ? Math.max(0, Math.min(100, 100 * (startWeight - current) / (startWeight - goal)))
    : null;

  // Streak: consecutive days with entries, ending today or yesterday
  let streak = 0;
  const daysSinceLatest = daysBetweenISO(latest.date, todayISO());
  if (daysSinceLatest <= 1) {
    let d = latest.date;
    while (state.entries[d]) {
      streak++;
      d = addDaysISO(d, -1);
    }
  }

  return {
    empty: false,
    list,
    n,
    current,
    previous: prev?.weight ?? null,
    dayDelta: prev ? current - prev.weight : null,
    deltaWeek: weekAgo && weekAgo.date !== latest.date ? current - weekAgo.weight : null,
    deltaMonth: monthAgo && monthAgo.date !== latest.date ? current - monthAgo.weight : null,
    peak: { weight: weights[peakIdx], date: list[peakIdx].date },
    low: { weight: weights[lowIdx], date: list[lowIdx].date },
    paceKgPerWeek,
    toGoal,
    etaDays,
    progressPct,
    streak,
    latestDate: latest.date,
    latestTime: latest.time,
    startWeight,
    goal,
  };
}

// ─── BMI classification ─────────────────────────────────────────────
function bmiInfo(kg, heightCm) {
  if (!kg || !heightCm) return null;
  const bmi = kg / ((heightCm / 100) ** 2);
  let category, color;
  if (bmi < 18.5)      { category = 'תת־משקל';  color = T.cyan; }
  else if (bmi < 25)   { category = 'תקין';     color = T.lime; }
  else if (bmi < 30)   { category = 'עודף משקל'; color = T.amber; }
  else                 { category = 'השמנה';    color = T.rose; }
  return { bmi, category, color };
}

// ─── Pace recommendations ───────────────────────────────────────────
const PACE_CONFIG = {
  slow:       { label: 'איטי · בריא',    kgPerWeek: 0.3, color: T.cyan },
  balanced:   { label: 'מאוזן · מומלץ',  kgPerWeek: 0.5, color: T.lime },
  aggressive: { label: 'אגרסיבי',        kgPerWeek: 0.8, color: T.amber },
};
function weeksToGoal(current, goal, pace) {
  if (current === null || goal === null) return null;
  const diff = Math.abs(current - goal);
  const kpw = PACE_CONFIG[pace]?.kgPerWeek || 0.5;
  return Math.ceil(diff / kpw);
}

// ─── Nutrition goal auto-calc (Mifflin-St Jeor + deficit) ────────────
// Returns { calories, protein, carbs, fat } in grams / kcal
function calculateNutritionGoals(user, goal, currentKg) {
  const weight = currentKg ?? user.startWeight ?? 75;
  const height = user.heightCm || 175;
  const age = user.ageYears || 35;
  const isMale = (user.gender || 'male') === 'male';

  // BMR: Mifflin-St Jeor
  const bmr = isMale
    ? 10 * weight + 6.25 * height - 5 * age + 5
    : 10 * weight + 6.25 * height - 5 * age - 161;

  // Activity: default "sedentary to light" = 1.4 (we don't track activity)
  const tdee = bmr * 1.4;

  // Deficit from target pace. 1kg fat ≈ 7700 kcal.
  const kpw = PACE_CONFIG[goal?.pace || 'balanced'].kgPerWeek;
  const dailyDeficit = (kpw * 7700) / 7;
  const calories = Math.round(tdee - dailyDeficit);

  // Protein: 1.6g / kg bodyweight (preserves muscle in deficit)
  const protein = Math.round(weight * 1.6);

  // Fat: 25% of calories
  const fat = Math.round(calories * 0.25 / 9);

  // Carbs: remainder
  const proteinKcal = protein * 4;
  const fatKcal = fat * 9;
  const carbsKcal = Math.max(0, calories - proteinKcal - fatKcal);
  const carbs = Math.round(carbsKcal / 4);

  return { calories, protein, carbs, fat, tdee: Math.round(tdee), bmr: Math.round(bmr) };
}

// ─── Sum nutrition for a day ─────────────────────────────────────────
function sumMealsForDay(meals) {
  if (!meals || !meals.length) return { calories: 0, protein: 0, carbs: 0, fat: 0, count: 0 };
  return meals.reduce((acc, m) => ({
    calories: acc.calories + (m.calories || 0),
    protein:  acc.protein  + (m.protein || 0),
    carbs:    acc.carbs    + (m.carbs || 0),
    fat:      acc.fat      + (m.fat || 0),
    count:    acc.count    + 1,
  }), { calories: 0, protein: 0, carbs: 0, fat: 0, count: 0 });
}

// ─── Gap-aware weight stats helpers ──────────────────────────────────
// Check if there's a gap > `days` between entries ending at latestDate
function hasGap(entries, daysBack, tolerance = 2) {
  // entries sorted asc; return true if no entry within tolerance of (latest - daysBack)
  if (!entries.length) return true;
  const latest = entries[entries.length - 1].date;
  const target = addDaysISO(latest, -daysBack);
  // Is there an entry within [target - tolerance, target + tolerance]?
  const lo = addDaysISO(target, -tolerance);
  const hi = addDaysISO(target, tolerance);
  return !entries.some(e => e.date >= lo && e.date <= hi);
}

// Find gap segments in a sorted entries list. Returns array of { from, to, days }
function findGaps(entries, minGapDays = 3) {
  if (!entries || entries.length < 2) return [];
  const gaps = [];
  for (let i = 1; i < entries.length; i++) {
    const d = daysBetweenISO(entries[i-1].date, entries[i].date);
    if (d >= minGapDays) gaps.push({ from: entries[i-1].date, to: entries[i].date, days: d });
  }
  return gaps;
}

// ─── Snapshot builder for Claude insights ───────────────────────────
// Collects the last N days of weight + nutrition + goal, sanitized for Claude.
function buildInsightSnapshot(state, stats, daysBack = 7) {
  const today = todayISO();
  const from = addDaysISO(today, -(daysBack - 1));
  const unit = state.settings.unit;

  // Weight entries in range
  const weightEntries = Object.entries(state.entries)
    .filter(([date]) => date >= from && date <= today)
    .map(([date, e]) => ({ date, weight_kg: e.weight }))
    .sort((a, b) => a.date.localeCompare(b.date));

  // Nutrition totals per day in range
  const nutritionByDay = {};
  for (let i = 0; i < daysBack; i++) {
    const date = addDaysISO(today, -i);
    const meals = state.nutrition.meals[date] || [];
    if (meals.length === 0) continue;
    const sums = sumMealsForDay(meals);
    nutritionByDay[date] = {
      calories: sums.calories,
      protein_g: sums.protein,
      carbs_g: sums.carbs,
      fat_g: sums.fat,
      meals_logged: sums.count,
    };
  }

  return {
    today,
    period: { from, to: today, days: daysBack },
    goal: {
      target_weight_kg: state.goal.weight,
      pace: state.goal.pace,
      pace_kg_per_week: PACE_CONFIG[state.goal.pace]?.kgPerWeek,
    },
    user: {
      height_cm: state.user.heightCm,
      age: state.user.ageYears,
      gender: state.user.gender,
      start_weight_kg: state.user.startWeight,
      start_date: state.user.startDate,
    },
    current_weight_kg: stats.current,
    total_loss_kg: stats.empty ? 0 : Math.round((state.user.startWeight - stats.current) * 10) / 10,
    weight_entries: weightEntries,
    weight_entries_count: weightEntries.length,
    weight_gaps: findGaps(weightEntries, 3),
    nutrition_goals: {
      daily_calories: state.nutrition.goals.calories,
      daily_protein_g: state.nutrition.goals.protein,
      daily_carbs_g: state.nutrition.goals.carbs,
      daily_fat_g: state.nutrition.goals.fat,
    },
    nutrition_by_day: nutritionByDay,
    nutrition_days_logged: Object.keys(nutritionByDay).length,
  };
}

// ─── React Context ──────────────────────────────────────────────────
const StoreContext = React.createContext(null);

function StoreProvider({ children }) {
  const [state, dispatch] = React.useReducer(reducer, null, loadState);
  const stats = React.useMemo(() => computeStats(state), [state]);

  React.useEffect(() => { saveState(state); }, [state]);

  const value = React.useMemo(() => ({ state, dispatch, stats }), [state, stats]);
  return <StoreContext.Provider value={value}>{children}</StoreContext.Provider>;
}

function useStore() {
  const ctx = React.useContext(StoreContext);
  if (!ctx) throw new Error('useStore must be used within StoreProvider');
  return ctx;
}

// 03-charts.jsx — SVG charts, adapted to real (sparse) data
// ════════════════════════════════════════════════════════════════════

function toPoints(data, key, w, h, padT = 10, padB = 10, yMin, yMax) {
  if (!data.length) return [];
  const vals = data.map(d => d[key]);
  const lo = yMin ?? Math.min(...vals);
  const hi = yMax ?? Math.max(...vals);
  const rng = hi - lo || 1;
  return data.map((d, i) => {
    const x = (i / Math.max(1, data.length - 1)) * w;
    const y = padT + (1 - (d[key] - lo) / rng) * (h - padT - padB);
    return [x, y, d];
  });
}

function smoothPath(pts) {
  if (!pts.length) return '';
  if (pts.length === 1) return `M${pts[0][0]} ${pts[0][1]}`;
  let d = `M${pts[0][0]} ${pts[0][1]}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[i - 1] || pts[i];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[i + 2] || p2;
    const t = 0.18;
    const c1x = p1[0] + (p2[0] - p0[0]) * t;
    const c1y = p1[1] + (p2[1] - p0[1]) * t;
    const c2x = p2[0] - (p3[0] - p1[0]) * t;
    const c2y = p2[1] - (p3[1] - p1[1]) * t;
    d += ` C${c1x} ${c1y}, ${c2x} ${c2y}, ${p2[0]} ${p2[1]}`;
  }
  return d;
}

function WeightChart({
  data, goal, width = 360, height = 180,
  stroke = T.lime, fill = true, showGoal = true, showMarkers = true,
  showGrid = true, showDots = false, yPad = 1.0,
}) {
  const w = width, h = height;
  if (!data || data.length === 0) {
    return (
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} style={{ display: 'block' }}>
        <rect x="0" y="0" width={w} height={h} fill="none" stroke={T.stroke} strokeDasharray="4 4" />
        <text x={w/2} y={h/2} textAnchor="middle" fill={T.inkMute} style={{ fontFamily: T.font, fontSize: 13 }}>
          אין עדיין נתונים
        </text>
      </svg>
    );
  }

  const vals = data.map(d => d.weight);
  const lo = Math.min(...vals, goal ?? Infinity) - yPad;
  const hi = Math.max(...vals, goal ?? -Infinity) + yPad;
  const pts = toPoints(data, 'weight', w, h, 12, 16, lo, hi);
  const path = smoothPath(pts);
  const areaPath = path + ` L${w} ${h} L0 ${h} Z`;
  const gy = goal !== null && goal !== undefined
    ? 12 + (1 - (goal - lo) / (hi - lo)) * (h - 28) : null;

  const peakI = vals.indexOf(Math.max(...vals));
  const lowI  = vals.indexOf(Math.min(...vals));

  const gid = React.useId().replace(/:/g, "");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h}
      style={{ overflow: 'visible', display: 'block' }}>
      <defs>
        <linearGradient id={`fill-${gid}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={stroke} stopOpacity="0.35" />
          <stop offset="100%" stopColor={stroke} stopOpacity="0" />
        </linearGradient>
      </defs>

      {showGrid && (
        <g opacity="0.5">
          {[0.25, 0.5, 0.75].map((p, i) => (
            <line key={i} x1="0" x2={w} y1={12 + p * (h - 28)} y2={12 + p * (h - 28)}
              stroke={T.stroke} strokeDasharray="2 4" />
          ))}
        </g>
      )}

      {showGoal && gy !== null && (
        <g>
          <line x1="0" x2={w} y1={gy} y2={gy} stroke={T.amber} strokeDasharray="3 3" strokeWidth="1" opacity="0.7" />
          <text x={w - 4} y={gy - 4} textAnchor="end" fill={T.amber}
            style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: 0.5 }}>
            יעד {goal}
          </text>
        </g>
      )}

      {fill && pts.length > 1 && <path d={areaPath} fill={`url(#fill-${gid})`} />}
      {pts.length > 1 && <path d={path} fill="none" stroke={stroke} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />}

      {(showDots || pts.length === 1) && pts.map(([x,y], i) => (
        <circle key={i} cx={x} cy={y} r={pts.length === 1 ? 4 : 1.8} fill={stroke} opacity="0.7" />
      ))}

      {showMarkers && data.length > 2 && (
        <g>
          <circle cx={pts[peakI][0]} cy={pts[peakI][1]} r="4" fill={T.rose} />
          <circle cx={pts[peakI][0]} cy={pts[peakI][1]} r="8" fill="none" stroke={T.rose} strokeWidth="1" opacity="0.4" />
          <circle cx={pts[lowI][0]} cy={pts[lowI][1]} r="4" fill={T.lime} />
          <circle cx={pts[lowI][0]} cy={pts[lowI][1]} r="8" fill="none" stroke={T.lime} strokeWidth="1" opacity="0.4" />
        </g>
      )}

      {pts.length > 0 && (
        <>
          <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="5" fill={T.ink} />
          <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="5" fill="none" stroke={stroke} strokeWidth="2" />
        </>
      )}
    </svg>
  );
}

function Sparkline({ data, width = 80, height = 28, stroke = T.lime, fill = true }) {
  const w = width, h = height;
  if (!data || data.length === 0) {
    return <svg viewBox={`0 0 ${w} ${h}`} width={w} height={h}><line x1="0" y1={h/2} x2={w} y2={h/2} stroke={T.stroke} strokeDasharray="2 3"/></svg>;
  }
  const vals = data.map(d => d.weight);
  const lo = Math.min(...vals), hi = Math.max(...vals);
  const pts = toPoints(data, 'weight', w, h, 4, 4, lo, hi);
  const path = smoothPath(pts);
  const gid = React.useId().replace(/:/g, "");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width={width} height={height} style={{ display:'block' }}>
      <defs>
        <linearGradient id={`sp-${gid}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={stroke} stopOpacity="0.35" />
          <stop offset="100%" stopColor={stroke} stopOpacity="0" />
        </linearGradient>
      </defs>
      {fill && pts.length > 1 && <path d={path + ` L${w} ${h} L0 ${h} Z`} fill={`url(#sp-${gid})`} />}
      {pts.length > 1 && <path d={path} fill="none" stroke={stroke} strokeWidth="1.6" strokeLinecap="round" />}
      {pts.length === 1 && <circle cx={pts[0][0]} cy={pts[0][1]} r="2.5" fill={stroke} />}
    </svg>
  );
}

function BarHistogram({ data, width = 360, height = 120, color = T.lime }) {
  const w = width, h = height;
  if (!data || data.length === 0) return null;
  const vals = data.map(d => d.weight);
  const lo = Math.min(...vals) - 0.2, hi = Math.max(...vals) + 0.2;
  const barW = Math.max(1.5, (w / data.length) * 0.55);
  const gap  = (w / data.length) - barW;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} style={{ display:'block' }}>
      {data.map((d, i) => {
        const x = i * (barW + gap);
        const y = 4 + (1 - (d.weight - lo) / (hi - lo || 1)) * (h - 8);
        const barH = h - y - 2;
        const isLast = i === data.length - 1;
        return (
          <rect key={i} x={x} y={y} width={barW} height={barH} rx={Math.min(1.5, barW/2)}
            fill={isLast ? T.ink : color} opacity={isLast ? 1 : 0.7} />
        );
      })}
    </svg>
  );
}

function RingGauge({ pct = 50, size = 120, stroke = 10, color = T.lime, track = T.stroke, children }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - Math.max(0, Math.min(100, pct)) / 100);
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off}
          style={{ transition: 'stroke-dashoffset 600ms ease' }} />
      </svg>
      <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column' }}>
        {children}
      </div>
    </div>
  );
}

function ArcGauge({ value = 0.5, min = -1, max = 1, size = 220, color = T.lime }) {
  const t = (value - min) / (max - min);
  const tc = Math.max(0, Math.min(1, t));
  const start = -Math.PI;
  const end = 0;
  const ang = start + tc * (end - start);
  const r = size/2 - 18;
  const cx = size/2, cy = size/2;
  const arc = (a0, a1) => {
    const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const large = Math.abs(a1 - a0) > Math.PI ? 1 : 0;
    const sweep = a1 > a0 ? 1 : 0;
    return `M${x0} ${y0} A${r} ${r} 0 ${large} ${sweep} ${x1} ${y1}`;
  };
  return (
    <svg viewBox={`0 0 ${size} ${size/2 + 20}`} width="100%" style={{ display: 'block' }}>
      <path d={arc(start, end)} fill="none" stroke={T.stroke} strokeWidth="14" strokeLinecap="round" />
      <path d={arc(start, ang)} fill="none" stroke={color} strokeWidth="14" strokeLinecap="round" />
      <line x1={cx} y1={cy - r - 10} x2={cx} y2={cy - r + 10} stroke={T.inkMute} strokeWidth="2" />
    </svg>
  );
}

function DeltaBadge({ value, unit = 'ק״ג', good = 'down', size = 'md' }) {

  const isDown = value < -0.05;

  const positive = (good === 'down' && isDown) || (good === 'up' && isUp);
  const negative = (good === 'down' && isUp) || (good === 'up' && isDown);
  const color = positive ? T.lime : negative ? T.rose : T.inkMute;
  const arrow = isDown ? '↓' : isUp ? '↑' : '→';
  const fs = size === 'sm' ? 11 : 13;
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap: 4,

function Div({ style }) {
  return <div style={{ height: 1, background: T.stroke, ...style }} />;
}

// ─── Button (primary) ───────────────────────────────────────────────
function Button({ children, onClick, disabled, variant = 'primary', style, type = 'button' }) {
  const base = {
    width: '100%', padding: '14px 20px', border: 'none', cursor: disabled ? 'not-allowed' : 'pointer',
    borderRadius: 14, fontSize: 15, fontWeight: 800, fontFamily: T.font,
    transition: 'transform 80ms, opacity 120ms',
    opacity: disabled ? 0.5 : 1,
  };
  const styles = {
    primary:   { ...base, background: T.lime, color: T.bg, boxShadow: `0 6px 20px ${T.lime}40` },
    secondary: { ...base, background: T.bgElev2, color: T.ink, border: `1px solid ${T.stroke}` },
    ghost:     { ...base, background: 'transparent', color: T.ink, border: `1px solid ${T.stroke}` },
    danger:    { ...base, background: 'transparent', color: T.rose, border: `1px solid ${T.rose}44` },
  };
  return (
    <button type={type} onClick={onClick} disabled={disabled} style={{ ...styles[variant], ...style }}
      onMouseDown={e => !disabled && (e.currentTarget.style.transform = 'scale(0.98)')}
      onMouseUp={e => (e.currentTarget.style.transform = 'scale(1)')}
      onMouseLeave={e => (e.currentTarget.style.transform = 'scale(1)')}>
      {children}
    </button>
  );
}

// ─── Toast system ───────────────────────────────────────────────────
const ToastContext = React.createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = React.useState([]);
  const show = React.useCallback((message, opts = {}) => {
    const id = uid();
    const t = { id, message, type: opts.type || 'info', duration: opts.duration ?? 2500 };
    setToasts(arr => [...arr, t]);
    setTimeout(() => setToasts(arr => arr.filter(x => x.id !== id)), t.duration);
  }, []);
  return (
    <ToastContext.Provider value={show}>
      {children}
      <div style={{
        position: 'fixed', bottom: 100, left: 0, right: 0,
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8,
        zIndex: 1000, pointerEvents: 'none', padding: '0 20px',
      }}>
        {toasts.map(t => (
          <div key={t.id} style={{
            pointerEvents: 'auto',
            background: t.type === 'success' ? T.lime : t.type === 'error' ? T.rose : T.bgElev2,
            color: t.type === 'success' ? T.bg : T.ink,
            padding: '10px 18px', borderRadius: 12, fontSize: 13, fontWeight: 600,
            fontFamily: T.font, boxShadow: '0 10px 30px rgba(0,0,0,0.3)',
            maxWidth: 320, textAlign: 'center', direction: 'rtl',
            animation: 'mk-fadeup 180ms ease',
          }}>
            {t.message}
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

function useToast() {
  const ctx = React.useContext(ToastContext);
  return ctx || (() => {});
}

// ─── Confirmation dialog ────────────────────────────────────────────
function ConfirmDialog({ open, title, message, confirmLabel = 'אשר', cancelLabel = 'ביטול', onConfirm, onCancel, danger = false }) {
  if (!open) return null;
  return (
    <div onClick={onCancel} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.65)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',

      <div onClick={e => e.stopPropagation()} style={{

        padding: 24, maxWidth: 340, width: '100%', direction: 'rtl',

        {message && <div style={{ fontSize: 13, color: T.inkSub, marginBottom: 20, lineHeight: 1.5 }}>{message}</div>}
        <div style={{ display: 'flex', gap: 10 }}>

          <Button variant={danger ? 'danger' : 'primary'} onClick={onConfirm}>{confirmLabel}</Button>

function EmptyState({ icon = '📊', title, message, action }) {

function OnboardingScreen() {
  const { dispatch } = useStore();
  const [step, setStep] = React.useState(0);
  const [name, setName] = React.useState('');
  const [heightCm, setHeightCm] = React.useState(170);
  const [ageYears, setAgeYears] = React.useState(35);
  const [gender, setGender] = React.useState('male');
  const [currentWeight, setCurrentWeight] = React.useState(80.0);
  const [goalWeight, setGoalWeight] = React.useState(75.0);
  const [pace, setPace] = React.useState('balanced');
  const [unit, setUnit] = React.useState('kg');

  const next = () => setStep(s => s + 1);
  const prev = () => setStep(s => Math.max(0, s - 1));

  const complete = () => {
    // Convert to kg for storage (internal format always kg)
    const toKg = (v) => unit === 'lb' ? v / 2.20462 : v;
    dispatch({
      type: 'COMPLETE_ONBOARDING',
      name: name.trim() || 'משתמש',
      heightCm,
      ageYears,
      gender,
      currentWeight: Math.round(toKg(currentWeight) * 10) / 10,
      goalWeight: Math.round(toKg(goalWeight) * 10) / 10,
      pace,
      unit,
    });
  };

  return (
    <div style={{
      background: T.bg, color: T.ink, fontFamily: T.font, direction: 'rtl',
      height: '100dvh', display: 'flex', flexDirection: 'column',
    }}>
      {/* Progress indicator */}
      <div style={{ padding: '20px 24px 0', display: 'flex', gap: 6 }}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{
            flex: 1, height: 3, borderRadius: 2,
            background: i <= step ? T.lime : T.stroke,
            transition: 'background 200ms',
          }} />
        ))}
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '32px 24px' }}>
        {step === 0 && <WelcomeStep onNext={next} />}
        {step === 1 && <NameHeightStep
          name={name} setName={setName}
          heightCm={heightCm} setHeightCm={setHeightCm}
          ageYears={ageYears} setAgeYears={setAgeYears}
          gender={gender} setGender={setGender}
          onNext={next} onPrev={prev}
        />}
        {step === 2 && <WeightStep
          unit={unit} setUnit={setUnit}
          currentWeight={currentWeight} setCurrentWeight={setCurrentWeight}
          goalWeight={goalWeight} setGoalWeight={setGoalWeight}
          onNext={next} onPrev={prev}
        />}
        {step === 3 && <PaceStep
          pace={pace} setPace={setPace}
          currentWeight={currentWeight} goalWeight={goalWeight} unit={unit}
          onComplete={complete} onPrev={prev}
        />}
      </div>
    </div>
  );
}

function WelcomeStep({ onNext }) {

        </svg>

        <div style={{ fontSize: 28, fontWeight: 800, letterSpacing: -0.5 }}>ברוך הבא למשקך</div>

          מעקב משקל יומי פשוט, גרפים יפים, וכל הנתונים נשמרים אצלך בלבד על המכשיר.
        </div>

function NameHeightStep({ name, setName, heightCm, setHeightCm, ageYears, setAgeYears, gender, setGender, onNext, onPrev }) {

function WeightStep({ unit, setUnit, currentWeight, setCurrentWeight, goalWeight, setGoalWeight, onNext, onPrev }) {
  const canProceed = goalWeight < currentWeight && goalWeight > (unit === 'lb' ? 66 : 30) && currentWeight < (unit === 'lb' ? 660 : 300);

  const handleUnitChange = (newUnit) => {
    if (newUnit === unit) return;
    const factor = newUnit === 'lb' ? 2.20462 : 1 / 2.20462;
    setCurrentWeight(v => Math.round(v * factor * 10) / 10);
    setGoalWeight(v => Math.round(v * factor * 10) / 10);
    setUnit(newUnit);
  };

  return (
    <div style={{ paddingTop: 20 }}>
      <div style={{ fontSize: 11, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>2/3</div>
      <div style={{ fontSize: 24, fontWeight: 800, marginTop: 6 }}>המשקל שלך</div>
      <div style={{ fontSize: 13, color: T.inkSub, marginTop: 6 }}>הזן את המשקל הנוכחי ואת היעד</div>

      <div style={{ marginTop: 20, display: 'flex', background: T.bgElev2, borderRadius: 10, padding: 3 }}>
        {['kg','lb'].map(u => (
          <button key={u} onClick={() => handleUnitChange(u)} style={{
            flex: 1, padding: 8, border: 'none', cursor: 'pointer',
            background: unit === u ? T.lime : 'transparent',
            color: unit === u ? T.bg : T.inkSub, borderRadius: 8,
            fontFamily: T.mono, fontSize: 12, fontWeight: 700,
          }}>{u === 'kg' ? 'ק״ג' : 'פאונד'}</button>
        ))}
      </div>

      <div style={{ marginTop: 20 }}>
        <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 6, fontFamily: T.mono, letterSpacing: 1 }}>משקל נוכחי</div>
        <NumberStepper value={currentWeight} onChange={setCurrentWeight} min={unit === 'lb' ? 66 : 30} max={unit === 'lb' ? 660 : 300} step={unit === 'lb' ? 0.2 : 0.1} unit={fmt.unitLabel(unit)} />
      </div>

      <div style={{ marginTop: 20 }}>
        <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 6, fontFamily: T.mono, letterSpacing: 1 }}>משקל יעד</div>
        <NumberStepper value={goalWeight} onChange={setGoalWeight} min={unit === 'lb' ? 66 : 30} max={unit === 'lb' ? 660 : 300} step={unit === 'lb' ? 0.2 : 0.1} unit={fmt.unitLabel(unit)} />
      </div>

      {!canProceed && (
        <div style={{ marginTop: 14, padding: '10px 14px', background: `${T.rose}15`, border: `1px solid ${T.rose}44`, borderRadius: 10, fontSize: 12, color: T.rose }}>
          המשקל היעד חייב להיות נמוך מהנוכחי. אם המטרה היא לעלות במשקל, הפוך את המספרים.
        </div>
      )}

      <div style={{ marginTop: 28, display: 'flex', gap: 10 }}>
        <Button variant="ghost" onClick={onPrev}>חזור</Button>
        <Button onClick={onNext} disabled={!canProceed}>הבא</Button>
      </div>
    </div>
  );
}

function PaceStep({ pace, setPace, currentWeight, goalWeight, unit, onComplete, onPrev }) {
  const toKg = (v) => unit === 'lb' ? v / 2.20462 : v;
  const diffDisplay = Math.abs(currentWeight - goalWeight);
  const diffKg = Math.abs(toKg(currentWeight) - toKg(goalWeight));
  return (
    <div style={{ paddingTop: 20 }}>
      <div style={{ fontSize: 11, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>3/3</div>
      <div style={{ fontSize: 24, fontWeight: 800, marginTop: 6 }}>באיזה קצב?</div>
      <div style={{ fontSize: 13, color: T.inkSub, marginTop: 6 }}>פער של {diffDisplay.toFixed(1)} {fmt.unitLabel(unit)} · בחר קצב ריאלי</div>

      <Col gap={10} style={{ marginTop: 24 }}>
        {Object.entries(PACE_CONFIG).map(([key, cfg]) => {
          const weeks = Math.ceil(diffKg / cfg.kgPerWeek);
          const sel = pace === key;
          return (
            <button key={key} onClick={() => setPace(key)} style={{
              display: 'flex', alignItems: 'center', gap: 12, padding: 16,
              border: `1px solid ${sel ? cfg.color : T.stroke}`,
              background: sel ? `${cfg.color}10` : T.bgElev,
              borderRadius: T.radius, cursor: 'pointer', textAlign: 'right',
              direction: 'rtl', fontFamily: T.font, color: T.ink,
            }}>
              <div style={{
                width: 22, height: 22, borderRadius: 11,
                border: `2px solid ${sel ? cfg.color : T.stroke}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                {sel && <div style={{ width: 10, height: 10, borderRadius: 5, background: cfg.color }} />}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 700 }}>{cfg.label}</div>
                <div style={{ fontSize: 11, color: T.inkSub, fontFamily: T.mono, marginTop: 2 }}>{cfg.kgPerWeek} ק״ג/שבוע</div>
              </div>
              <div style={{ fontFamily: T.mono, fontSize: 14, color: cfg.color, fontWeight: 700 }}>{weeks} שב׳</div>
            </button>
          );
        })}
      </Col>

      <div style={{ marginTop: 14, fontSize: 11, color: T.inkMute, lineHeight: 1.6 }}>
        קצב מאוזן (0.5 ק״ג/שבוע) הוא המומלץ הקליני לירידה בת־קיימא. קצב אגרסיבי יותר דורש הקפדה גבוהה ומתאים לטווח קצר.
      </div>

      <div style={{ marginTop: 28, display: 'flex', gap: 10 }}>
        <Button variant="ghost" onClick={onPrev}>חזור</Button>
        <Button onClick={onComplete}>סיים והתחל</Button>
      </div>
    </div>
  );
}

// ─── Number stepper (+/-) ───────────────────────────────────────────
function NumberStepper({ value, onChange, min, max, step = 1, unit = '', displayFn }) {
  const dec = () => onChange(Math.max(min, +(value - step).toFixed(1)));
  const inc = () => onChange(Math.min(max, +(value + step).toFixed(1)));
  const display = displayFn ? displayFn(value) : value.toFixed(step < 1 ? 1 : 0);
  return (
    <div style={{ display: 'flex', gap: 10, alignItems: 'stretch' }}>
      <button onClick={dec} style={btnPlusMinus}>−</button>
      <div style={{
        flex: 1, background: T.bgElev, border: `1px solid ${T.stroke}`, borderRadius: 12,
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
      }}>
        <span style={{ fontFamily: T.mono, fontSize: 28, fontWeight: 700, letterSpacing: -1, color: T.ink }}>{display}</span>
        <span style={{ fontSize: 12, color: T.inkMute }}>{unit}</span>
      </div>
      <button onClick={inc} style={btnPlusMinus}>+</button>
    </div>
  );
}
const btnPlusMinus = {
  width: 56, background: T.bgElev, border: `1px solid ${T.stroke}`,
  borderRadius: 12, color: T.ink, fontSize: 24, fontFamily: T.mono, fontWeight: 700,
  cursor: 'pointer',
};

// V1 — Dashboard (default, most informative)
// ════════════════════════════════════════════════════════════════════
function HomeV1({ onNavigate }) {
  const { state, stats } = useStore();
  const unit = state.settings.unit;
  const goal = state.goal.weight;

  // No entries edge case
  if (stats.empty) {
    return (
      <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>
        <HomeHeader onNavigate={onNavigate} />

          <EmptyState
            icon="⚖️"
            title="בוא נתחיל"
            message="הוסף את השקילה הראשונה שלך כדי לראות מגמות וסטטיסטיקות."
            action={<Button onClick={() => onNavigate('log')}>הוסף שקילה</Button>}
          />
        </div>
      </div>
    );
  }

  const progress = stats.progressPct;
  const toGoalAbs = goal !== null && goal !== undefined ? Math.abs(stats.toGoal) : null;
  const chartData = stats.list.slice(-30);

  return (
    <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>
      <HomeHeader onNavigate={onNavigate} />

      <div style={{ flex: 1, overflowY: 'auto', padding: '8px 18px 20px' }}>
        {/* Hero */}
        <Card padding={18} style={{ background: `linear-gradient(145deg, ${T.bgElev} 0%, ${T.bgElev2} 100%)`, border: `1px solid ${T.strokeHi}`, marginBottom: 14 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
            <div>
              <div style={{ fontSize: 11, color: T.inkMute, letterSpacing: 0.4 }}>משקל נוכחי · {fmt.relativeDay(stats.latestDate)}</div>
              <div style={{ fontSize: 11, color: T.inkSub, marginTop: 2 }}>{fmt.day(stats.latestDate)} · {stats.latestTime}</div>
            </div>
            {stats.deltaWeek !== null && (
              <Pill color={stats.deltaWeek < 0 ? T.lime : T.rose} size="sm">
                {stats.deltaWeek < 0 ? 'ירידה' : 'עלייה'} {fmt.signed(stats.deltaWeek)} ק״ג/שבוע
              </Pill>
            )}
          </div>

          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginTop: 4 }}>
            <span style={{ fontFamily: T.mono, fontSize: 72, fontWeight: 600, color: T.ink, letterSpacing: -3, lineHeight: 1 }}>
              {fmt.kg(stats.current, unit)}
            </span>
            <span style={{ fontSize: 20, color: T.inkSub, fontWeight: 600 }}>{fmt.unitLabel(unit)}</span>
            <div style={{ flex: 1 }} />
            <DeltaBadge value={stats.dayDelta} unit={fmt.unitLabel(unit)} size="md" />
          </div>

          {/* Progress bar */}
          {progress !== null && (
            <div style={{ marginTop: 16 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: T.inkSub, marginBottom: 6 }}>
                <span>התחלה · {fmt.kg(stats.startWeight, unit)}</span>
                <span style={{ color: T.lime, fontFamily: T.mono, fontWeight: 700 }}>{progress.toFixed(0)}%</span>
                <span>יעד · {fmt.kg(goal, unit)}</span>
              </div>
              <div style={{ height: 6, background: T.stroke, borderRadius: 3, overflow: 'hidden', position: 'relative' }}>
                <div style={{ position: 'absolute', top: 0, right: 0, height: '100%', width: `${progress}%`, background: `linear-gradient(90deg, ${T.amber}, ${T.lime})`, borderRadius: 3 }} />
              </div>
              {stats.etaDays !== null ? (
                <div style={{ fontSize: 12, color: T.inkSub, marginTop: 10, textAlign: 'center' }}>
                  עוד <span style={{ color: T.ink, fontFamily: T.mono, fontWeight: 700 }}>{fmt.kg(toGoalAbs, unit)}</span> ליעד · בקצב הנוכחי, <span style={{ color: T.lime, fontWeight: 700 }}>{stats.etaDays} ימים</span>
                </div>
              ) : (
                <div style={{ fontSize: 11, color: T.inkMute, marginTop: 10, textAlign: 'center' }}>
                  {toGoalAbs !== null ? `עוד ${fmt.kg(toGoalAbs, unit)} ק״ג ליעד` : 'הגדר יעד כדי לראות התקדמות'} · עדיין אין מספיק נתונים לחיזוי זמן
                </div>
              )}
            </div>
          )}
        </Card>

        {/* Chart card */}
        <Card padding={12} style={{ marginBottom: 14 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
            <div style={{ fontSize: 13, fontWeight: 700 }}>מגמה · {chartData.length} מדידות אחרונות</div>
            <button onClick={() => onNavigate('history')} style={{
              background: 'transparent', border: 'none', color: T.lime,
              fontSize: 11, fontWeight: 700, cursor: 'pointer', fontFamily: T.font,
            }}>הכל ›</button>
          </div>
          <WeightChart data={chartData} goal={goal} width={320} height={160} />
        </Card>

        {/* Nutrition mini widget */}
        <NutritionWidget onNavigate={onNavigate} />

        {/* Stats grid */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10, marginBottom: 14 }}>
          <StatChip label="שבוע אחרון" value={stats.deltaWeek !== null ? fmt.signed(stats.deltaWeek) : '—'} unit={stats.deltaWeek !== null ? fmt.unitLabel(unit) : ''} color={stats.deltaWeek < 0 ? T.lime : T.rose} />
          <StatChip label="חודש אחרון" value={stats.deltaMonth !== null ? fmt.signed(stats.deltaMonth) : '—'} unit={stats.deltaMonth !== null ? fmt.unitLabel(unit) : ''} color={stats.deltaMonth < 0 ? T.lime : T.rose} />
          <StatChip label="שיא" value={fmt.kg(stats.peak.weight, unit)} unit={fmt.unitLabel(unit)} sub={fmt.day(stats.peak.date)} color={T.rose} />
          <StatChip label="שפל" value={fmt.kg(stats.low.weight, unit)} unit={fmt.unitLabel(unit)} sub={fmt.day(stats.low.date)} color={T.lime} />
        </div>

        {/* Goal CTA if no goal */}
        {goal === null && (
          <Card padding={14} style={{ background: `${T.amber}10`, border: `1px solid ${T.amber}44`, cursor: 'pointer' }} onClick={() => onNavigate('goal')}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ fontSize: 22 }}>🎯</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 700 }}>הגדר יעד</div>
                <div style={{ fontSize: 11, color: T.inkSub, marginTop: 2 }}>כדי לראות התקדמות ו-ETA</div>
              </div>
              <span style={{ color: T.amber, fontSize: 18 }}>‹</span>
            </div>
          </Card>
        )}
      </div>
    </div>
  );
}

// V2 — Velocity (speedometer)
// ════════════════════════════════════════════════════════════════════
function HomeV2({ onNavigate }) {
  const { state, stats } = useStore();
  const unit = state.settings.unit;
  const goal = state.goal.weight;

  if (stats.empty) {
    return (
      <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>
        <HomeHeader onNavigate={onNavigate} />
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>

        </div>
      </div>

  const pace = stats.paceKgPerWeek;

  return (
    <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>
      <div style={{ padding: '12px 18px 6px', display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ flex: 1, fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>MISHKACH · VELOCITY</div>
        <StreakBadge days={stats.streak} />
        <AvatarDot letter={(state.user.name || 'U')[0]} size={28} />
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '0 18px 20px' }}>
        {/* Velocity gauge hero */}
        <div style={{ position: 'relative', marginTop: 4, marginBottom: 10 }}>
          <ArcGauge value={velocityNormalized} color={velocityNormalized > 0 ? T.lime : velocityNormalized < 0 ? T.rose : T.inkMute} size={320} />
          <div style={{ position: 'absolute', bottom: 16, left: 18, fontSize: 10, color: T.inkMute, fontFamily: T.mono }}>+1.2</div>
          <div style={{ position: 'absolute', bottom: 16, right: 18, fontSize: 10, color: T.inkMute, fontFamily: T.mono }}>-1.2</div>
          <div style={{ position: 'absolute', top: 10, left: '50%', transform: 'translateX(-50%)', fontSize: 10, color: T.inkMute, fontFamily: T.mono }}>0</div>
          <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'flex-end', paddingBottom: 10 }}>
            <div style={{ fontSize: 10, color: T.inkSub, letterSpacing: 2, fontFamily: T.mono }}>VELOCITY · קצב שבועי</div>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, marginTop: 4 }}>
              {pace !== null ? (
                <>
                  <span style={{ fontFamily: T.mono, fontSize: 48, fontWeight: 700, color: pace < 0 ? T.lime : pace > 0 ? T.rose : T.inkMute, letterSpacing: -2, lineHeight: 1 }}>
                    {fmt.signed(pace)}
                  </span>
                  <span style={{ fontSize: 14, color: T.inkSub, fontWeight: 600 }}>{unit === 'lb' ? 'lb/w' : 'ק״ג/שב׳'}</span>
                </>
              ) : (
                <span style={{ fontFamily: T.mono, fontSize: 30, color: T.inkMute, fontWeight: 600 }}>אין נתונים</span>
              )}
            </div>
            <div style={{ fontSize: 11, color: T.inkMute, marginTop: 4, fontFamily: T.mono }}>
              {pace === null ? 'צריך לפחות 2 שקילות במרחק של ימים' : pace < -0.05 ? 'יורד' : pace > 0.05 ? 'עולה' : 'יציב'}
            </div>
          </div>
        </div>

        {/* Current weight strip */}
        <Card padding={14} style={{ marginBottom: 12, background: T.bgElev2 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div>
              <div style={{ fontSize: 10, color: T.inkMute, letterSpacing: 1, fontFamily: T.mono }}>NOW</div>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, marginTop: 2 }}>
                <span style={{ fontFamily: T.mono, fontSize: 40, fontWeight: 600, letterSpacing: -1.5 }}>{fmt.kg(stats.current, unit)}</span>
                <span style={{ fontSize: 14, color: T.inkSub }}>{fmt.unitLabel(unit)}</span>
              </div>
            </div>
            <div style={{ textAlign: 'left' }}>
              <Sparkline data={stats.list.slice(-14)} width={110} height={40} stroke={T.lime} />
              <div style={{ fontSize: 9, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1, marginTop: 2 }}>14 DAYS</div>
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10, marginTop: 14, paddingTop: 14, borderTop: `1px solid ${T.stroke}` }}>
            {[
              { label: 'Δ DAY',   val: stats.dayDelta },
              { label: 'Δ WEEK',  val: stats.deltaWeek },
              { label: 'Δ MONTH', val: stats.deltaMonth },
            ].map(m => (
              <div key={m.label}>
                <div style={{ fontSize: 9, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>{m.label}</div>
                <div style={{ marginTop: 2 }}><DeltaBadge value={m.val} unit={fmt.unitLabel(unit)} size="sm" /></div>
              </div>
            ))}
          </div>
        </Card>

        {/* ETA */}
        {stats.etaDays !== null && goal !== null && (
          <Card padding={0} style={{ marginBottom: 12, overflow: 'hidden' }}>
            <div style={{ padding: '14px 16px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 2 }}>ETA · ESTIMATED ARRIVAL</div>
              <Pill color={T.lime} size="sm">מסלול פעיל</Pill>
            </div>
            <div style={{ padding: '10px 16px 14px' }}>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
                <span style={{ fontFamily: T.mono, fontSize: 44, fontWeight: 700, color: T.lime, letterSpacing: -2, lineHeight: 1 }}>{stats.etaDays}</span>
                <span style={{ fontSize: 14, color: T.inkSub }}>ימים</span>
              </div>
              <div style={{ fontSize: 11, color: T.inkMute, marginTop: 2, fontFamily: T.mono }}>~{Math.round(stats.etaDays/7)} שבועות · להגעה ליעד {fmt.kg(goal, unit)}</div>
            </div>
            <div style={{ position: 'relative', height: 44, margin: '0 16px 14px', background: T.bgElev2, borderRadius: 8, overflow: 'hidden' }}>
              <div style={{ position: 'absolute', inset: 0, display: 'flex' }}>
                <div style={{ flex: stats.progressPct || 0, background: `linear-gradient(90deg, ${T.amber}55, ${T.lime}55)`, borderLeft: `2px solid ${T.lime}` }} />
                <div style={{ flex: 100 - (stats.progressPct || 0) }} />
              </div>
              <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 10px', fontSize: 10, fontFamily: T.mono, color: T.inkSub }}>
                <span>{fmt.kg(stats.startWeight, unit)}</span>
                <span style={{ color: T.ink, fontWeight: 700 }}>→ {fmt.kg(stats.current, unit)} ←</span>
                <span>{fmt.kg(goal, unit)}</span>
              </div>
            </div>
          </Card>
        )}

        {/* Peak/Low */}
        {stats.n >= 3 && (
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>
            <Card padding={12}>
              <div style={{ fontSize: 10, color: T.rose, fontFamily: T.mono, letterSpacing: 1 }}>PEAK · שיא ▲</div>
              <div style={{ fontFamily: T.mono, fontSize: 24, fontWeight: 700, letterSpacing: -1, marginTop: 6 }}>{fmt.kg(stats.peak.weight, unit)}</div>
              <div style={{ fontSize: 10, color: T.inkMute, marginTop: 2 }}>{fmt.day(stats.peak.date)}</div>
            </Card>
            <Card padding={12}>
              <div style={{ fontSize: 10, color: T.lime, fontFamily: T.mono, letterSpacing: 1 }}>LOW · שפל ▼</div>
              <div style={{ fontFamily: T.mono, fontSize: 24, fontWeight: 700, letterSpacing: -1, marginTop: 6 }}>{fmt.kg(stats.low.weight, unit)}</div>
              <div style={{ fontSize: 10, color: T.inkMute, marginTop: 2 }}>{fmt.day(stats.low.date)}</div>
            </Card>
          </div>
        )}
      </div>
    </div>
  );
}

// V3 — Journey (vertical milestones) — fixed to handle gain-over-start
// ════════════════════════════════════════════════════════════════════
function HomeV3({ onNavigate }) {
  const { state, stats } = useStore();
  const unit = state.settings.unit;
  const goal = state.goal.weight;
  const startWeight = stats.startWeight;

  if (stats.empty) {
    return (
      <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>
        <HomeHeader onNavigate={onNavigate} />
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
          <EmptyState icon="🗺️" title="התחל את המסע" message="הוסף שקילה ראשונה כדי לראות את המפה."
            action={<Button onClick={() => onNavigate('log')}>הוסף שקילה</Button>} />
        </div>
      </div>
    );
  }

  const curW = stats.current;
  // Fix: extend range to include all milestones including above-start excursions
  const topW = Math.max(startWeight, stats.peak.weight, curW) + 1;
  const botW = goal !== null ? Math.min(goal, stats.low.weight, curW) - 1 : Math.min(stats.low.weight, curW) - 1;
  const range = topW - botW;
  const posFor = (w) => ((topW - w) / range) * 100;

  const pct = goal !== null && startWeight !== goal
    ? Math.max(0, Math.min(1, (startWeight - curW) / (startWeight - goal)))
    : 0;

  const milestones = [
    { w: startWeight, label: 'נקודת זינוק', date: state.user.startDate, kind: 'start' },
    stats.peak.weight > startWeight + 0.2 && { w: stats.peak.weight, label: 'שיא · חריגה למעלה', date: stats.peak.date, kind: 'peak' },
    stats.low.weight < startWeight - 1 && { w: stats.low.weight, label: 'שפל · השיא הכי נמוך', date: stats.low.date, kind: 'low' },
    goal !== null && { w: goal, label: 'היעד', kind: 'goal' },
  ].filter(Boolean).sort((a, b) => b.w - a.w);

  return (
    <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>
      <div style={{ padding: '12px 18px 4px', display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1.5 }}>THE JOURNEY · המסע שלך</div>
          <div style={{ fontSize: 14, fontWeight: 700, marginTop: 2 }}>
            יום {stats.streak} · {fmt.kg(Math.abs(startWeight - curW), unit)} ק״ג {startWeight > curW ? 'מאחורה' : 'מעל ההתחלה'}
          </div>
        </div>
        <AvatarDot letter={(state.user.name || 'U')[0]} size={32} />
      </div>

      <div style={{ padding: '6px 18px 10px' }}>
        <Card padding={12} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>CURRENT POSITION</div>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
              <span style={{ fontFamily: T.mono, fontSize: 40, fontWeight: 700, letterSpacing: -1.5 }}>{fmt.kg(curW, unit)}</span>
              <span style={{ fontSize: 13, color: T.inkSub }}>{fmt.unitLabel(unit)}</span>
              <DeltaBadge value={stats.dayDelta} unit="" size="sm" />
            </div>
          </div>
          {goal !== null && (
            <div style={{ textAlign: 'left' }}>
              <div style={{ fontFamily: T.mono, fontSize: 22, fontWeight: 700, color: T.lime }}>{Math.round(pct * 100)}%</div>
              <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono }}>של המסע</div>
            </div>
          )}
        </Card>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '4px 18px 20px', position: 'relative' }}>
        <div style={{ position: 'relative', minHeight: 480 }}>
          <div style={{
            position: 'absolute', top: 10, bottom: 10, right: 32, width: 3,
            background: `linear-gradient(180deg, ${T.rose} 0%, ${T.amber} 40%, ${T.lime} 100%)`,
            borderRadius: 3, opacity: 0.35,
          }} />

          {milestones.map((m, i) => {
            const top = posFor(m.w);
            const passed = curW <= m.w && m.kind !== 'start';
            const colorMap = { start: T.rose, peak: T.rose, low: T.lime, goal: T.amber };
            const color = colorMap[m.kind] || T.inkMute;
            return (
              <div key={i} style={{
                position: 'absolute', top: `${top}%`, right: 0, left: 0,
                display: 'flex', alignItems: 'center', gap: 10,
                transform: 'translateY(-50%)',
              }}>
                <div style={{ flex: 1, textAlign: 'left', paddingLeft: 4 }}>
                  <div style={{ fontSize: 11, color: T.inkSub }}>{m.label}</div>
                  {m.date && <div style={{ fontSize: 9, color: T.inkMute, fontFamily: T.mono, marginTop: 1 }}>{fmt.day(m.date)}</div>}
                </div>
                <div style={{ fontFamily: T.mono, fontSize: 13, fontWeight: 700, color, minWidth: 42, textAlign: 'center' }}>
                  {fmt.kg(m.w, unit)}
                </div>
                <div style={{
                  width: m.kind === 'goal' || m.kind === 'start' ? 22 : 14,
                  height: m.kind === 'goal' || m.kind === 'start' ? 22 : 14,
                  borderRadius: '50%',
                  background: passed || m.kind === 'start' ? color : T.bgElev,
                  border: `2px solid ${color}`,
                  marginRight: 26 - (m.kind === 'goal' || m.kind === 'start' ? 4 : 0),
                  boxShadow: passed ? `0 0 12px ${color}80` : 'none',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 10, fontWeight: 900, color: T.bg,
                }}>
                  {m.kind === 'goal' && '★'}
                </div>
              </div>
            );
          })}

          {/* You-are-here marker */}
          <div style={{
            position: 'absolute', top: `${posFor(curW)}%`, right: 8, left: 0,
            transform: 'translateY(-50%)', zIndex: 3,
            display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'flex-end',
          }}>
            <div style={{
              background: T.lime, color: T.bg, padding: '6px 10px', borderRadius: 8,
              fontSize: 11, fontWeight: 800, fontFamily: T.font, position: 'relative',
              boxShadow: `0 4px 20px ${T.lime}66`,
            }}>
              אתה כאן · {fmt.kg(curW, unit)}
              <div style={{
                position: 'absolute', right: -5, top: '50%', transform: 'translateY(-50%) rotate(45deg)',
                width: 10, height: 10, background: T.lime,
              }} />
            </div>
            <div style={{ width: 26, height: 26, borderRadius: 13, background: T.lime, border: `4px solid ${T.bg}`, boxShadow: `0 0 24px ${T.lime}`, marginRight: 18 }} />
          </div>
        </div>

        {stats.etaDays !== null && goal !== null && (
          <Card padding={14} style={{ marginTop: 16, background: `${T.lime}10`, border: `1px solid ${T.lime}40` }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ fontSize: 24 }}>🎯</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: T.inkSub }}>בקצב הנוכחי תגיע ליעד בעוד</div>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
                  <span style={{ fontFamily: T.mono, fontSize: 22, fontWeight: 700, color: T.lime }}>{stats.etaDays}</span>
                  <span style={{ fontSize: 13, color: T.ink }}>ימים</span>
                  {stats.paceKgPerWeek !== null && <span style={{ fontSize: 11, color: T.inkMute, marginRight: 8 }}>· קצב {fmt.signed(stats.paceKgPerWeek)}ק״ג/שב׳</span>}
                </div>
              </div>
            </div>
          </Card>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════
// Nutrition mini-widget for home
// ════════════════════════════════════════════════════════════════════
function NutritionWidget({ onNavigate }) {
  const { state, stats } = useStore();
  const goals = state.nutrition.goals;
  const today = todayISO();
  const meals = state.nutrition.meals[today] || [];
  const totals = sumMealsForDay(meals);

  // If no nutrition set up, offer CTA
  if (goals.calories === null) {
    return (
      <Card padding={14} style={{ marginBottom: 14, background: `${T.lime}08`, border: `1px solid ${T.lime}30`, cursor: 'pointer' }}
        onClick={() => onNavigate('nutrition')}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ fontSize: 24 }}>🍎</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700 }}>הוסף מעקב תזונה</div>
            <div style={{ fontSize: 11, color: T.inkSub, marginTop: 2 }}>Claude מזהה ארוחה מטקסט או תמונה</div>
          </div>
          <span style={{ color: T.lime, fontSize: 18 }}>‹</span>
        </div>
      </Card>
    );
  }

  const calPct = Math.min(100, (totals.calories / goals.calories) * 100);
  const calColor = totals.calories > goals.calories * 1.05 ? T.rose : T.lime;
  const remaining = goals.calories - totals.calories;
  const proteinPct = goals.protein ? Math.min(100, (totals.protein / goals.protein) * 100) : 0;

  return (
    <Card padding={14} style={{ marginBottom: 14, cursor: 'pointer' }} onClick={() => onNavigate('nutrition')}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
        <div style={{ fontSize: 13, fontWeight: 700 }}>תזונה · היום</div>
        <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono }}>
          {totals.count} ארוחות
        </div>
      </div>

      <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
        <RingGauge pct={calPct} size={72} stroke={8} color={calColor} track={T.stroke}>
          <div style={{ fontFamily: T.mono, fontSize: 15, fontWeight: 700, color: T.ink, letterSpacing: -0.5 }}>
            {totals.calories}
          </div>
          <div style={{ fontSize: 8, color: T.inkMute, fontFamily: T.mono }}>/{goals.calories}</div>
        </RingGauge>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: T.mono, fontSize: 20, fontWeight: 700, color: T.ink, letterSpacing: -1 }}>
            {remaining >= 0 ? remaining : 0}
          </div>
          <div style={{ fontSize: 11, color: T.inkSub }}>
            {remaining > 0 ? 'קלוריות נותרו' : remaining < -50 ? `חריגה ${Math.abs(remaining)}` : 'סגרת את היום'}
          </div>
          {/* Protein bar */}
          <div style={{ marginTop: 8 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: T.inkMute, fontFamily: T.mono, marginBottom: 3 }}>
              <span>חלבון</span>
              <span>{totals.protein}/{goals.protein}ג</span>
            </div>
            <div style={{ height: 4, background: T.stroke, borderRadius: 2, overflow: 'hidden' }}>
              <div style={{ width: `${proteinPct}%`, height: '100%', background: T.lime, transition: 'width 300ms' }} />
            </div>
          </div>
        </div>
      </div>
    </Card>
  );
}

// 07-screen-log.jsx — Weight entry with actual save to state
// ════════════════════════════════════════════════════════════════════

function LogScreen({ onClose, onSaved }) {
  const { state, stats, dispatch } = useStore();
  const toast = useToast();
  const unit = state.settings.unit;
  const today = todayISO();
  const existing = state.entries[today];

  // If today has an entry, start with it; else use last entry as reference
  const initialWeight = existing
    ? fmt.kg(existing.weight, unit)
    : stats.current !== null && stats.current !== undefined
      ? fmt.kg(stats.current, unit)
      : '70.0';

  const [weight, setWeight] = React.useState(initialWeight);
  const [note, setNote] = React.useState(existing?.note || '');
  const [showNote, setShowNote] = React.useState(!!existing?.note);

  const handleKey = (k) => {
    if (k === '⌫') return setWeight(w => w.length > 1 ? w.slice(0, -1) : '0');
    if (k === '.' && weight.includes('.')) return;
    if (weight === '0' && k !== '.') return setWeight(k);
    if (weight.replace('.','').length >= 5) return;
    setWeight(w => w + k);
  };

  const wNum = parseFloat(weight);
  const valid = !isNaN(wNum) && wNum > 20 && wNum < 400;

  const deltaFromPrev = valid && stats.current !== null && !existing
    ? wNum - stats.current
    : valid && existing
      ? wNum - (stats.previous !== null ? stats.previous : stats.current)
      : null;

  const handleSave = () => {
    if (!valid) return;
    const weightKg = unit === 'lb' ? wNum / 2.20462 : wNum;
    dispatch({
      type: 'UPSERT_ENTRY',
      date: today,
      weight: Math.round(weightKg * 10) / 10,
      time: nowHHMM(),
      note: note.trim(),
    });
    toast(existing ? 'השקילה עודכנה' : 'נשמר!', { type: 'success' });
    onSaved?.();
  };

  return (
    <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>
      <div style={{ padding: '12px 18px 0', display: 'flex', alignItems: 'center', gap: 12 }}>
        <button onClick={onClose} style={{
          width: 36, height: 36, borderRadius: 18, background: T.bgElev, color: T.ink,
          border: 'none', cursor: 'pointer', fontSize: 20, display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>×</button>
        <div style={{ flex: 1, textAlign: 'center', fontSize: 14, fontWeight: 700 }}>
          {existing ? 'עדכון שקילה של היום' : 'הזנת משקל'}
        </div>
        <div style={{ width: 36 }} />
      </div>

      <div style={{ padding: '16px 24px 0', textAlign: 'center' }}>
        <div style={{ fontSize: 11, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>
          {fmt.day(today)} · {nowHHMM()}
        </div>
        {existing && (
          <div style={{ marginTop: 6, fontSize: 10, color: T.amber, fontFamily: T.mono }}>
            יש שקילה קיימת · שמירה תדרוס
          </div>
        )}
      </div>

      {/* Big number display */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 24px', minHeight: 0 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 10 }}>
          <span style={{ fontFamily: T.mono, fontSize: 84, fontWeight: 600, color: valid ? T.lime : T.rose, letterSpacing: -4, lineHeight: 1 }}>
            {weight}
          </span>
          <span style={{ fontSize: 22, color: T.inkSub }}>{fmt.unitLabel(unit)}</span>
        </div>
        {deltaFromPrev !== null && (
          <div style={{ marginTop: 12, fontSize: 12, color: T.inkSub, fontFamily: T.mono, display: 'flex', alignItems: 'center', gap: 6 }}>
            <span>{existing ? 'מול אתמול:' : 'מול האחרון:'}</span>
            <DeltaBadge value={deltaFromPrev} unit={fmt.unitLabel(unit)} size="sm" />
          </div>
        )}

        {showNote ? (
          <input
            value={note} onChange={e => setNote(e.target.value)} autoFocus
            placeholder="הערה (לא חובה)"
            style={{
              marginTop: 16, width: '100%', maxWidth: 280, padding: '8px 12px',
              background: T.bgElev, border: `1px solid ${T.stroke}`, borderRadius: 10,
              color: T.ink, fontSize: 13, fontFamily: T.font, outline: 'none',
              direction: 'rtl', textAlign: 'right',
            }}
          />
        ) : (
          <button onClick={() => setShowNote(true)} style={{
            marginTop: 16, background: 'transparent', border: 'none', color: T.inkSub,
            fontSize: 12, cursor: 'pointer', fontFamily: T.font,
          }}>+ הוסף הערה</button>
        )}
      </div>

      {/* Numeric pad */}
      <div style={{ padding: '0 16px 16px', flexShrink: 0 }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6 }}>
          {['1','2','3','4','5','6','7','8','9','.','0','⌫'].map(k => (
            <button key={k} onClick={() => handleKey(k)} style={{
              height: 52, border: 'none', cursor: 'pointer',
              background: T.bgElev, color: T.ink, borderRadius: 12,
              fontFamily: T.mono, fontSize: 22, fontWeight: 600,
            }}
              onTouchStart={e => e.currentTarget.style.background = T.bgElev2}
              onTouchEnd={e => e.currentTarget.style.background = T.bgElev}
            >{k}</button>
          ))}
        </div>
        <div style={{ marginTop: 10 }}>
          <Button onClick={handleSave} disabled={!valid}>
            {existing ? 'עדכן' : 'שמור'} · {weight} {fmt.unitLabel(unit)}
          </Button>
        </div>
      </div>
    </div>
  );
}

function HistoryScreen({ onNavigate }) {

          <div style={{ fontSize: 18, fontWeight: 700 }}>כל המספרים שלך</div>
        </div>

      </div>

  const recent = [...list].reverse();

  // DOW analysis — only show if we have ≥14 entries spread across different weeks
  const dowStats = list.length >= 14

        return { dow: d, avg: vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null, count: vals.length };
      }).filter(x => x.avg !== null)

    dispatch({ type: 'DELETE_ENTRY', date });

    toast('השקילה נמחקה', { type: 'info' });

    <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>

        <div style={{ fontSize: 11, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>HISTORY · היסטוריה</div>
        <div style={{ fontSize: 18, fontWeight: 700 }}>כל המספרים שלך</div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '6px 18px 20px' }}>
        {/* Main chart */}

              {fmt.kg(stats.low.weight, unit)}–{fmt.kg(stats.peak.weight, unit)}

          </div>
          <WeightChart data={list} goal={state.goal.weight} width={340} height={150} />
          <GapIndicator entries={list} />
        </Card>

        {/* Weekly insight — Claude-powered */}

        {/* Stats grid */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>

            unit={fmt.unitLabel(unit)}
            sub={`מ-${fmt.kg(stats.startWeight, unit)}`}

          />
          {bmi && (
            <StatChip label="BMI נוכחי" value={bmi.bmi.toFixed(1)} sub={bmi.category} color={bmi.color} />
          )}
          {stats.deltaWeek !== null && (
            <StatChip
              label="שבוע אחרון"
              value={fmt.signed(stats.deltaWeek)}
              unit={fmt.unitLabel(unit)}
              color={stats.deltaWeek < 0 ? T.lime : T.rose}

            label="רצף · ימים"

        {/* Bar histogram */}
        {list.length >= 3 && (
          <Card padding={12} style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 8 }}>מדידות · היסטוגרמה</div>
            <BarHistogram data={list} width={340} height={100} color={T.lime} />

        {/* DOW analysis */}
        {dowStats.length >= 5 && <DowCard dowStats={dowStats} unit={unit} />}

        {/* Entries list */}
        <div style={{ fontSize: 11, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1, marginBottom: 8 }}>

        </div>
        <Card padding={0}>
          {recent.map((d, i) => {
            const prev = recent[i + 1];
            const delta = prev ? d.weight - prev.weight : 0;
            const gapDays = prev ? daysBetweenISO(prev.date, d.date) : 0;
            return (
              <React.Fragment key={d.date}>
                <SwipeableEntry
                  entry={d} delta={delta} hasDelta={!!prev} unit={unit}
                  isLast={i === recent.length - 1 && gapDays < 3}

                />

                  <div style={{
                    padding: '8px 14px', background: T.bg, fontSize: 10,
