// ─── Swipeable entry row ────────────────────────────────────────────
function SwipeableEntry({ entry, delta, hasDelta, unit, isLast, onDelete }) {
  const [swipeX, setSwipeX] = React.useState(0);
  const startX = React.useRef(0);
  const currentX = React.useRef(0);

  const onTouchStart = (e) => {
    startX.current = e.touches[0].clientX;
    currentX.current = 0;
  };
  const onTouchMove = (e) => {
    currentX.current = e.touches[0].clientX - startX.current;
    // Only allow swipe left (negative direction in RTL means revealing left-side action)
    if (currentX.current > 0) {
      setSwipeX(Math.min(80, currentX.current));
    } else {
      setSwipeX(0);
    }
  };
  const onTouchEnd = () => {
    if (swipeX > 40) {
      setSwipeX(80);
    } else {
      setSwipeX(0);
    }
  };

  return (
    <div style={{ position: 'relative', overflow: 'hidden', borderBottom: isLast ? 'none' : `1px solid ${T.stroke}` }}>
      {/* Delete action behind */}
      <div style={{
        position: 'absolute', top: 0, bottom: 0, left: 0, width: 80,
        background: T.rose, display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <button onClick={onDelete} style={{
          background: 'transparent', border: 'none', color: T.ink, cursor: 'pointer',
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, padding: 8,
        }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          </svg>
          <span style={{ fontSize: 10, fontWeight: 700 }}>מחק</span>
        </button>
      </div>

      {/* Entry */}
      <div
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        style={{
          display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px',
          background: T.bgElev, transform: `translateX(${swipeX}px)`,
          transition: swipeX === 0 || swipeX === 80 ? 'transform 200ms' : 'none',
        }}
      >
        <div style={{ fontSize: 11, color: T.inkSub, fontFamily: T.mono, width: 70 }}>
          <div>{fmt.dayShort(entry.date)}</div>
          {entry.time && <div style={{ fontSize: 9, color: T.inkMute, marginTop: 2 }}>{entry.time}</div>}
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: T.mono, fontSize: 15, fontWeight: 600 }}>
            {fmt.kg(entry.weight, unit)}<span style={{ fontSize: 11, color: T.inkMute }}> {fmt.unitLabel(unit)}</span>
          </div>
          {entry.note && <div style={{ fontSize: 10, color: T.inkMute, marginTop: 2, maxWidth: 180, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{entry.note}</div>}
        </div>
        {hasDelta && <DeltaBadge value={delta} unit="" size="sm" />}
        <button onClick={() => setSwipeX(swipeX === 0 ? 80 : 0)} style={{
          background: 'transparent', border: 'none', color: T.inkMute, cursor: 'pointer', padding: 4,
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
            <circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/>
          </svg>
        </button>
      </div>
    </div>
  );
}

// ─── Day-of-week analysis card ──────────────────────────────────────
function DowCard({ dowStats, unit }) {
  const dowNames = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
  const avgs = dowStats.map(x => x.avg);
  const maxAvg = Math.max(...avgs);
  const minAvg = Math.min(...avgs);
  return (
    <Card padding={14} style={{ marginBottom: 12 }}>
      <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 4 }}>לפי יום בשבוע</div>
      <div style={{ fontSize: 10, color: T.inkMute, marginBottom: 12 }}>
        ממוצע משקל לפי יום. שימו לב: עם מגמת ירידה יציבה, הניתוח מתעוות.
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, height: 100 }}>
        {dowStats.map(d => {
          const h = 30 + ((d.avg - minAvg) / (maxAvg - minAvg || 1)) * 60;
          const isHeavy = d.avg > (minAvg + maxAvg)/2;
          return (
            <div key={d.dow} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
              <div style={{ fontSize: 9, fontFamily: T.mono, color: T.inkMute }}>{fmt.kg(d.avg, unit)}</div>
              <div style={{ width: '100%', height: `${h}%`, background: isHeavy ? T.rose : T.lime, opacity: 0.8, borderRadius: '4px 4px 0 0' }} />
              <div style={{ fontSize: 11, color: T.inkSub, fontFamily: T.font }}>{dowNames[d.dow]}</div>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

// Weekly insight card
// ═════════════════════════════════════════════════════════════════════
function WeeklyInsightCard() {
  const { state, stats, dispatch } = useStore();
  const toast = useToast();
  const [loading, setLoading] = React.useState(false);
  const cached = state.insights.weekly;
  const hasKey = apiReady(state.apiConfig);

  // Check staleness: if more than 24h old, show "refresh" hint
  const isStale = cached && (Date.now() - new Date(cached.generatedAt).getTime()) > 24 * 3600 * 1000;

  const snapshot = React.useMemo(() => buildInsightSnapshot(state, stats, 7), [state, stats]);
  const tooSparse = snapshot.weight_entries_count < 3 && snapshot.nutrition_days_logged < 3;

  const generate = async () => {
    if (!hasKey) {
      toast('הגדר API בפרופיל', { type: 'error' });
      return;
    }
    setLoading(true);
    try {
      const text = await generateWeeklyInsight(snapshot, state.apiConfig, (usage) => {
        const cost = estimateCost(usage, state.apiConfig.model);
        dispatch({
          type: 'TRACK_USAGE',
          inputTokens: usage.input_tokens,
          outputTokens: usage.output_tokens,
          feature: 'weekly_insight',
          costUSD: cost,
        });
      });
      dispatch({
        type: 'SET_INSIGHT', kind: 'weekly',
        payload: { text, generatedAt: new Date().toISOString(), weekEnding: todayISO() },
      });

      toast(e.message, { type: 'error' });
    } finally {
      setLoading(false);
    }
  };

  return (
    <Card padding={14} style={{
      marginBottom: 12,
      background: `linear-gradient(135deg, ${T.bgElev} 0%, ${T.bgElev2} 100%)`,
      border: `1px solid ${cached ? T.strokeHi : T.stroke}`,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
        <div style={{
          width: 28, height: 28, borderRadius: 14,
          background: `${T.lime}25`, display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 14,
        }}>✨</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>תובנה שבועית</div>
          <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono }}>
            ניתוח חכם · 7 ימים אחרונים
          </div>
        </div>
        {cached && !loading && (
          <button onClick={generate} style={{
            background: 'transparent', border: `1px solid ${T.stroke}`, color: T.inkSub,
            padding: '5px 10px', borderRadius: 8, fontSize: 11, fontFamily: T.mono,
            cursor: 'pointer',
          }}>רענן</button>
        )}
      </div>

      {loading ? (
        <div style={{ padding: '16px 4px', fontSize: 12, color: T.inkSub }}>
          מנתח את השבוע שלך...
        </div>
      ) : cached ? (
        <>
          <div style={{ fontSize: 13, lineHeight: 1.7, color: T.ink, whiteSpace: 'pre-wrap', marginTop: 4 }}>
            {cached.text}
          </div>
          <div style={{ fontSize: 9, color: T.inkMute, fontFamily: T.mono, marginTop: 10, textAlign: 'left', direction: 'ltr' }}>
            {fmt.relativeDay(cached.weekEnding)} · {isStale ? 'ישן' : 'עדכני'}
          </div>
        </>
      ) : tooSparse ? (
        <div style={{ padding: '6px 4px', fontSize: 12, color: T.inkSub, lineHeight: 1.6 }}>
          אין עדיין מספיק נתונים לתובנה משמעותית. תוסיף עוד כמה שקילות וארוחות ונחזור לנושא.
        </div>
      ) : (
        <>
          <div style={{ fontSize: 12, color: T.inkSub, lineHeight: 1.6, marginBottom: 12 }}>
            המנוע יסתכל על {snapshot.weight_entries_count} שקילות ו-{snapshot.nutrition_days_logged} ימי תזונה מהשבוע ויכתוב לך 3 פסקאות.
          </div>
          <button onClick={generate} disabled={!hasKey} style={{
            background: hasKey ? T.lime : T.bgElev2, color: hasKey ? T.bg : T.inkMute,
            border: 'none', padding: '10px 16px', borderRadius: 10,
            fontSize: 13, fontWeight: 700, fontFamily: T.font,
            cursor: hasKey ? 'pointer' : 'not-allowed', width: '100%',
          }}>
            {hasKey ? 'נתח לי את השבוע' : 'הגדר API בפרופיל'}
          </button>
        </>
      )}
    </Card>
  );

// ═════════════════════════════════════════════════════════════════════
// Plateau card — shows only if plateau detected (14+ days, <0.3kg variance)
// ═════════════════════════════════════════════════════════════════════
function PlateauCard({ entries }) {
  const { state, stats, dispatch } = useStore();
  const toast = useToast();
  const [loading, setLoading] = React.useState(false);
  const cached = state.insights.plateau;

  // Detect plateau: look at last 14+ days, check if variance is low
  const plateau = React.useMemo(() => {
    if (!entries || entries.length < 4) return null;
    const latest = entries[entries.length - 1];
    const fromDate = addDaysISO(latest.date, -14);
    const recent = entries.filter(e => e.date >= fromDate);
    if (recent.length < 3) return null;
    const weights = recent.map(r => r.weight);
    const range = Math.max(...weights) - Math.min(...weights);
    const spanDays = daysBetweenISO(recent[0].date, recent[recent.length - 1].date);
    // Plateau if spanning 14+ days with range < 0.5kg
    if (spanDays >= 14 && range < 0.5) {
      return { days: spanDays, range: Math.round(range * 10) / 10, count: recent.length };
    }
    return null;
  }, [entries]);

  if (!plateau && !cached) return null;

  const analyze = async () => {
    if (!apiReady(state.apiConfig)) {
      toast('הגדר API בפרופיל', { type: 'error' });
      return;
    }
    setLoading(true);
    try {
      const snapshot = buildInsightSnapshot(state, stats, 21); // 3 weeks for plateau context
      snapshot.plateau_detected = plateau;
      const text = await generatePlateauAnalysis(snapshot, state.apiConfig, (usage) => {
        const cost = estimateCost(usage, state.apiConfig.model);
        dispatch({
          type: 'TRACK_USAGE',
          inputTokens: usage.input_tokens,
          outputTokens: usage.output_tokens,
          feature: 'plateau_analysis',
          costUSD: cost,
        });
      });
      dispatch({
        type: 'SET_INSIGHT', kind: 'plateau',
        payload: { text, generatedAt: new Date().toISOString(), periodDays: plateau?.days },
      });
    } catch (e) {
      toast(e.message, { type: 'error' });
    } finally {
      setLoading(false);
    }
  };

  return (
    <Card padding={14} style={{
      marginBottom: 12,
      background: `${T.amber}10`, border: `1px solid ${T.amber}44`,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
        <div style={{ fontSize: 18 }}>🔍</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.amber }}>Plateau זוהה</div>
          {plateau && (
            <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono }}>
              {plateau.days} ימים · שונות {plateau.range}ק״ג · {plateau.count} שקילות
            </div>
          )}
        </div>
        {cached && !loading && (
          <button onClick={() => dispatch({ type: 'CLEAR_INSIGHT', kind: 'plateau' })} style={{
            background: 'transparent', border: 'none', color: T.inkMute,
            fontSize: 18, cursor: 'pointer', padding: 4,
          }}>×</button>
        )}
      </div>

      {loading ? (
        <div style={{ padding: '10px 4px', fontSize: 12, color: T.inkSub }}>בודק...</div>
      ) : cached ? (
        <>
          <div style={{ fontSize: 13, lineHeight: 1.7, color: T.ink, whiteSpace: 'pre-wrap' }}>
            {cached.text}
          </div>
          <button onClick={analyze} style={{
            marginTop: 10, background: 'transparent', border: `1px solid ${T.amber}55`,
            color: T.amber, padding: '6px 12px', borderRadius: 8, fontSize: 11,
            fontFamily: T.mono, cursor: 'pointer',
          }}>רענן ניתוח</button>
        </>
      ) : (
        <>
          <div style={{ fontSize: 12, color: T.inkSub, lineHeight: 1.6, marginBottom: 10 }}>
            המשקל שלך יציב כבר {plateau.days} ימים. רוצה שאנסה להבין למה, לפי הנתונים?
          </div>
          <button onClick={analyze} disabled={!apiReady(state.apiConfig)} style={{
            background: apiReady(state.apiConfig) ? T.amber : T.bgElev2,
            color: apiReady(state.apiConfig) ? T.bg : T.inkMute,
            border: 'none', padding: '8px 14px', borderRadius: 8,
            fontSize: 12, fontWeight: 700, fontFamily: T.font,
            cursor: apiReady(state.apiConfig) ? 'pointer' : 'not-allowed',
          }}>נתח plateau</button>
        </>
      )}
    </Card>
  );
}

// ─── Gap indicator under chart ──────────────────────────────────────
function GapIndicator({ entries }) {
  const gaps = findGaps(entries, 3);
  if (gaps.length === 0) return null;
  const total = gaps.reduce((s, g) => s + g.days, 0);
  return (
    <div style={{
      marginTop: 8, padding: '6px 10px', background: T.bgElev2, borderRadius: 8,
      fontSize: 10, color: T.inkMute, fontFamily: T.mono, textAlign: 'center',
    }}>
      {gaps.length} חורים במדידות · {total} ימים חסרים בסה״כ
    </div>
  );
}

// 09-screen-goal.jsx — Goal setup / edit
// ════════════════════════════════════════════════════════════════════

function GoalScreen({ onClose }) {
  const { state, stats, dispatch } = useStore();
  const toast = useToast();
  const unit = state.settings.unit;
  const current = stats.current;  // in kg

  // Convert between kg (storage) and display unit
  const toDisp = (kg) => unit === 'lb' ? Math.round(kg * 2.20462 * 10) / 10 : kg;
  const toKg = (disp) => unit === 'lb' ? disp / 2.20462 : disp;

  const defaultKg = state.goal.weight !== null
    ? state.goal.weight
    : (current !== null && current !== undefined ? Math.max(40, current - 5) : 70);

  const [goalDisplay, setGoalDisplay] = React.useState(toDisp(defaultKg));
  const [pace, setPace] = React.useState(state.goal.pace || 'balanced');

  const goalKg = toKg(goalDisplay);
  const diffKg = current !== null && current !== undefined ? current - goalKg : 0;
  const diffDisplay = Math.abs(toDisp(Math.abs(diffKg)));
  const weeks = weeksToGoal(current, goalKg, pace);

  const save = () => {
    dispatch({
      type: 'SET_GOAL',
      goal: { weight: Math.round(goalKg * 10) / 10, pace },
    });
    toast('היעד נשמר', { type: 'success' });
    onClose?.();
  };

  const minG = toDisp(Math.max(30, (current || 70) - 40));
  const maxG = toDisp(Math.min(300, (current || 70) + 40));

  return (
    <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>
      <div style={{ padding: '12px 18px 0', display: 'flex', alignItems: 'center', gap: 12 }}>
        <button onClick={onClose} style={{
          width: 36, height: 36, borderRadius: 18, background: T.bgElev, color: T.ink,
          border: 'none', cursor: 'pointer', fontSize: 20,
        }}>×</button>
        <div style={{ flex: 1, textAlign: 'center', fontSize: 14, fontWeight: 700 }}>
          {state.goal.weight !== null ? 'עדכון יעד' : 'הגדרת יעד'}
        </div>
        <div style={{ width: 36 }} />
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '20px 24px 20px' }}>
        {current !== null && current !== undefined && (
          <Card padding={16} style={{ marginBottom: 16, textAlign: 'center' }}>
            <div style={{ display: 'flex', justifyContent: 'space-around', alignItems: 'center' }}>
              <div>
                <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>נוכחי</div>
                <div style={{ fontFamily: T.mono, fontSize: 32, fontWeight: 700, color: T.ink, marginTop: 4 }}>{fmt.kg(current, unit)}</div>
              </div>
              <div style={{ fontSize: 22, color: T.inkMute }}>→</div>
              <div>
                <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>יעד</div>
                <div style={{ fontFamily: T.mono, fontSize: 32, fontWeight: 700, color: T.lime, marginTop: 4 }}>{goalDisplay.toFixed(1)}</div>
              </div>
            </div>
            <div style={{ marginTop: 12, fontSize: 12, color: T.inkSub }}>
              פער של <span style={{ color: T.ink, fontFamily: T.mono, fontWeight: 700 }}>{diffDisplay.toFixed(1)} {fmt.unitLabel(unit)}</span>
            </div>
          </Card>
        )}

        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 8, fontFamily: T.mono, letterSpacing: 1 }}>משקל יעד · {fmt.unitLabel(unit)}</div>
          <NumberStepper
            value={goalDisplay}
            onChange={setGoalDisplay}
            min={minG} max={maxG}
            step={unit === 'lb' ? 1 : 0.5}
            unit={fmt.unitLabel(unit)}
          />
        </div>

        <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 8, fontFamily: T.mono, letterSpacing: 1 }}>קצב</div>
        <Col gap={8} style={{ marginBottom: 24 }}>
          {Object.entries(PACE_CONFIG).map(([key, cfg]) => {
            const w = weeksToGoal(current, goalKg, key);
            const sel = pace === key;
            return (
              <button key={key} onClick={() => setPace(key)} style={{
                display: 'flex', alignItems: 'center', gap: 12, padding: 14,
                border: `1px solid ${sel ? cfg.color : T.stroke}`,
                background: sel ? `${cfg.color}10` : T.bgElev,
                borderRadius: T.radius, cursor: 'pointer', textAlign: 'right',
                direction: 'rtl', fontFamily: T.font, color: T.ink,
              }}>
                <div style={{
                  width: 20, height: 20, borderRadius: 10,
                  border: `2px solid ${sel ? cfg.color : T.stroke}`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>
                  {sel && <div style={{ width: 9, height: 9, borderRadius: 5, background: cfg.color }} />}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 700 }}>{cfg.label}</div>
                  <div style={{ fontSize: 11, color: T.inkSub, fontFamily: T.mono, marginTop: 2 }}>{cfg.kgPerWeek} ק״ג/שבוע</div>
                </div>
                {w !== null && <div style={{ fontFamily: T.mono, fontSize: 13, color: cfg.color, fontWeight: 700 }}>{w} שב׳</div>}
              </button>
            );
          })}
        </Col>

        <Button onClick={save}>שמור יעד</Button>
      </div>
    </div>
  );
}

// 10-screen-profile.jsx — Profile, settings, export/import, reset
// ════════════════════════════════════════════════════════════════════

function ProfileScreen({ onNavigate }) {
  const { state, stats, dispatch } = useStore();
  const toast = useToast();
  const [confirmReset, setConfirmReset] = React.useState(false);
  const [showEdit, setShowEdit] = React.useState(false);
  const [showApiConfig, setShowApiConfig] = React.useState(false);
  const [showUsage, setShowUsage] = React.useState(false);
  const [showTips, setShowTips] = React.useState(false);

  const handleExport = () => {
    const data = {
      ...state,
      exportedAt: new Date().toISOString(),
      exportedBy: 'mishkach-pwa',
    };
    // Strip the API key on export for safety
    if (data.apiConfig) data.apiConfig = { ...data.apiConfig, key: '', sharedPassword: '' };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mishkach-backup-${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('הורדת גיבוי (ללא מפתח API)', { type: 'success' });
  };

  const handleImport = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json,.json';
    input.onchange = (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (!imported.entries && !imported.user) throw new Error('Invalid structure');
          // Preserve current API key on import
          imported.apiConfig = { ...imported.apiConfig, key: state.apiConfig.key, sharedPassword: state.apiConfig.sharedPassword };
          dispatch({ type: 'IMPORT_STATE', state: imported });
          toast('הנתונים יובאו בהצלחה', { type: 'success' });
        } catch (err) {
          toast('קובץ לא תקין', { type: 'error' });
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const handleReset = () => {
    dispatch({ type: 'RESET_ALL' });
    setConfirmReset(false);
    toast('כל הנתונים נמחקו', { type: 'info' });
  };

  const entries = Object.keys(state.entries).length;
  const daysActive = state.user.startDate
    ? daysBetweenISO(state.user.startDate, todayISO()) + 1
    : 0;

  const month = todayISO().slice(0, 7);
  const monthUsage = state.usage.byMonth[month] || { requests: 0, costUSD: 0 };
  const isShared = state.apiConfig.mode === 'shared';
  const secretSet = isShared ? !!state.apiConfig.sharedPassword : !!state.apiConfig.key;
  const apiRowValue = !secretSet
    ? 'לא הוגדר'
    : isShared
      ? `משותף · ••${state.apiConfig.sharedPassword.slice(-3)}`
      : `אישי · ••••${state.apiConfig.key.slice(-4)}`;

  return (
    <div style={{ background: T.bg, color: T.ink, fontFamily: T.font, height: '100%', display: 'flex', flexDirection: 'column', direction: 'rtl' }}>
      <div style={{ padding: '14px 18px 6px' }}>
        <div style={{ fontSize: 11, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>PROFILE</div>
        <div style={{ fontSize: 18, fontWeight: 700 }}>פרופיל והגדרות</div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '6px 18px 20px' }}>
        {/* User card */}
        <Card padding={16} style={{ marginBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <AvatarDot letter={(state.user.name || 'U')[0]} size={56} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 17, fontWeight: 700 }}>{state.user.name || 'ללא שם'}</div>
              <div style={{ fontSize: 12, color: T.inkSub, fontFamily: T.mono, marginTop: 2 }}>
                {state.user.heightCm} ס״מ · {state.user.ageYears} שנים · {daysActive} ימים במעקב
              </div>
            </div>
            <button onClick={() => setShowEdit(true)} style={{
              background: T.bgElev2, border: 'none', color: T.ink, cursor: 'pointer',
              padding: '8px 14px', borderRadius: 10, fontSize: 12, fontWeight: 700, fontFamily: T.font,
            }}>ערוך</button>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10, marginTop: 14, paddingTop: 14, borderTop: `1px solid ${T.stroke}` }}>
            <StatMini label="מדידות" value={entries} />
            <StatMini label="רצף" value={`${stats.streak} ימים`} />
            <StatMini label="ירידה" value={stats.empty ? '—' : `${(state.user.startWeight - stats.current).toFixed(1)}`} unit="ק״ג" />
          </div>
        </Card>

        {/* Goal summary */}
        <Section title="יעד">
          <RowItem icon="🎯" label="משקל יעד"
            value={state.goal.weight !== null ? `${fmt.kg(state.goal.weight, state.settings.unit)} ${fmt.unitLabel(state.settings.unit)}` : 'לא מוגדר'}
            onClick={() => onNavigate('goal')} />
          {state.goal.weight !== null && (
            <RowItem icon="⚡" label="קצב" value={PACE_CONFIG[state.goal.pace]?.label || 'מאוזן'} onClick={() => onNavigate('goal')} />
          )}
        </Section>

        {/* AI */}
        <Section title="תובנות AI">
          <RowItem icon="🔑" label="מפתח / קוד גישה"
            value={apiRowValue} onClick={() => setShowApiConfig(true)} />
          <RowItem icon="💰" label="שימוש החודש"
            value={`$${monthUsage.costUSD.toFixed(3)} · ${monthUsage.requests} בקשות`}
            onClick={() => setShowUsage(true)} />
        </Section>

        {/* Install app */}
        <InstallPromptSection />

        {/* Tips Library */}
        <Section title="טיפים ותובנות">
          <RowItem icon="💡" label="ספריית טיפים"
            value={`${25} תובנות`} onClick={() => setShowTips(true)} />
        </Section>

        {/* Settings */}
        <Section title="הגדרות">
          <RowItem icon="📏" label="יחידת מדידה" right={
            <UnitToggle unit={state.settings.unit} onChange={(u) => dispatch({ type: 'SET_SETTING', key: 'unit', value: u })} />
          } />
          <RowItem icon="🎨" label="תצוגת בית" right={
            <VariantToggle value={state.settings.homeVariant} onChange={(v) => {
              dispatch({ type: 'SET_SETTING', key: 'homeVariant', value: v });
              toast('תצוגה הוחלפה', { type: 'info' });
            }} />
          } />
        </Section>

        {/* Data */}
        <Section title="נתונים">
          <RowItem icon="⬇️" label="ייצוא JSON" onClick={handleExport} />
          <RowItem icon="⬆️" label="ייבוא מגיבוי" onClick={handleImport} />
          <RowItem icon="🗑️" label="מחק הכל" danger onClick={() => setConfirmReset(true)} />
        </Section>

        <div style={{ textAlign: 'center', fontSize: 10, color: T.inkMute, marginTop: 20, fontFamily: T.mono }}>
          FiTracklon · v1.4.0
        </div>
      </div>

      {showEdit && <EditProfileDialog onClose={() => setShowEdit(false)} />}
      {showApiConfig && <ApiConfigDialog onClose={() => setShowApiConfig(false)} />}
      {showUsage && <UsageDetailsDialog onClose={() => setShowUsage(false)} />}
      {showTips && <TipsLibraryScreen onClose={() => setShowTips(false)} />}

      <ConfirmDialog
        open={confirmReset}
        title="למחוק את כל הנתונים?"
        message="כל המדידות, הארוחות, היעד וההגדרות יימחקו לצמיתות. פעולה זו לא ניתנת לביטול."
        confirmLabel="מחק הכל"
        danger
        onConfirm={handleReset}
        onCancel={() => setConfirmReset(false)}
      />
    </div>
  );
}

  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 11, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1, marginBottom: 8 }}>{title}</div>
      <Card padding={0} style={{ overflow: 'hidden' }}>{children}</Card>
    </div>
  );
}

function RowItem({ icon, label, value, right, onClick, danger = false }) {

    <div onClick={onClick} style={{
      display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px',
      cursor: onClick ? 'pointer' : 'default',
      borderBottom: `1px solid ${T.stroke}`,
      color: danger ? T.rose : T.ink,
    }}>
      <div style={{ fontSize: 18 }}>{icon}</div>
      <div style={{ flex: 1, fontSize: 14, fontWeight: 500 }}>{label}</div>
      {value && <div style={{ fontSize: 13, color: T.inkSub, fontFamily: T.mono }}>{value}</div>}

function StatMini({ label, value, unit }) {

      <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>{label}</div>
      <div style={{ fontFamily: T.mono, fontSize: 17, fontWeight: 700, color: T.ink, marginTop: 2 }}>

      ))}

}

function VariantToggle({ value, onChange }) {
  return (
    <div style={{ display: 'flex', background: T.bgElev2, borderRadius: 8, padding: 2 }}>
      {['v1','v2','v3'].map(v => (
        <button key={v} onClick={() => onChange(v)} style={{
          padding: '4px 10px', border: 'none', cursor: 'pointer',
          background: value === v ? T.lime : 'transparent',
          color: value === v ? T.bg : T.inkSub, borderRadius: 6,
          fontFamily: T.mono, fontSize: 11, fontWeight: 700,
        }}>{v.toUpperCase()}</button>
      ))}

  );
}

// ─── Edit profile dialog ────────────────────────────────────────────
function EditProfileDialog({ onClose }) {
  const { state, dispatch } = useStore();
  const [name, setName] = React.useState(state.user.name);
  const [heightCm, setHeightCm] = React.useState(state.user.heightCm);
  const [ageYears, setAgeYears] = React.useState(state.user.ageYears || 35);
  const [gender, setGender] = React.useState(state.user.gender || 'male');

  const save = () => {
    dispatch({ type: 'SET_USER', user: { name: name.trim(), heightCm, ageYears, gender } });
    // Recalculate nutrition goals if on auto mode
    if (state.nutrition.goals.source === 'auto') {
      const auto = calculateNutritionGoals({ ...state.user, heightCm, ageYears, gender }, state.goal, state.entries[state.user.startDate]?.weight || state.user.startWeight);
      dispatch({ type: 'SET_NUTRITION_GOALS', goals: { ...auto, source: 'auto' } });
    }
    onClose();
  };

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.65)', zIndex: 900,
      display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24,
      backdropFilter: 'blur(4px)',
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: T.bgElev, borderRadius: T.radiusL, border: `1px solid ${T.strokeHi}`,
        padding: 20, maxWidth: 360, width: '100%', direction: 'rtl', maxHeight: '80vh', overflowY: 'auto',
      }}>
        <div style={{ fontSize: 17, fontWeight: 700, marginBottom: 16 }}>עריכת פרופיל</div>

        <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 6, fontFamily: T.mono, letterSpacing: 1 }}>שם</div>
        <input value={name} onChange={e => setName(e.target.value)} style={{
          width: '100%', padding: '12px 14px', background: T.bg, border: `1px solid ${T.stroke}`,
          borderRadius: 10, color: T.ink, fontSize: 15, fontFamily: T.font, outline: 'none',
          direction: 'rtl', textAlign: 'right', marginBottom: 16,
        }} />

        <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 6, fontFamily: T.mono, letterSpacing: 1 }}>מין</div>
        <div style={{ display: 'flex', background: T.bgElev2, borderRadius: 10, padding: 3, marginBottom: 16 }}>
          {[['male','זכר'],['female','נקבה']].map(([v, label]) => (
            <button key={v} onClick={() => setGender(v)} style={{
              flex: 1, padding: 8, border: 'none', cursor: 'pointer',
              background: gender === v ? T.lime : 'transparent',
              color: gender === v ? T.bg : T.inkSub, borderRadius: 8,
              fontFamily: T.font, fontSize: 12, fontWeight: 700,
            }}>{label}</button>
          ))}
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 16 }}>
          <div>

// 12-claude-api.jsx — תובנות AI wrapper, dual-mode (direct/shared)

const CLAUDE_API_URL = 'https://api.anthropic.com/v1/messages';
const CLAUDE_API_VERSION = '2023-06-01';
const PROXY_URL = '/api/claude';

// Pricing per 1M tokens (USD) — verified April 2026
const PRICING = {
  'claude-opus-4-7':           { in: 5,  out: 25 },
  'claude-opus-4-6':           { in: 5,  out: 25 },
  'claude-sonnet-4-6':         { in: 3,  out: 15 },
  'claude-haiku-4-5-20251001': { in: 1,  out: 5 },
};

// Model tiering: use the cheaper-but-excellent Sonnet for text parsing,
// keep Opus 4.7 for vision and reasoning-heavy insights.
const MODEL_BY_FEATURE = {
  nutrition_text:     'claude-sonnet-4-6',   // 40% cheaper, near-Opus quality on text
  nutrition_image:    'claude-opus-4-7',     // vision matters for product recognition
  weekly_insight:     'claude-opus-4-7',     // reasoning quality critical
  plateau_analysis:   'claude-opus-4-7',
  goal_calibration:   'claude-opus-4-7',
};

const DEFAULT_MODEL = 'claude-opus-4-7';

// ─── Low-level API call with dual-mode support ──────────────────────
// config: { mode: 'direct'|'shared', key, sharedPassword }
async function callClaude({ config, model = DEFAULT_MODEL, system, messages, maxTokens = 1024, onUsage }) {
  const mode = config?.mode || 'direct';
  const isShared = mode === 'shared';

  // Validate credentials
  if (isShared) {
    if (!config?.sharedPassword) throw new Error('חסר קוד גישה. הגדר בפרופיל.');
  } else {
    if (!config?.key) throw new Error('חסר API key. הוסף אותו בפרופיל.');
  }

  const body = { model, max_tokens: maxTokens, messages };
  if (system) body.system = system;

  const url = isShared ? PROXY_URL : CLAUDE_API_URL;
  const headers = isShared ? {
    'content-type': 'application/json',
    'x-app-password': config.sharedPassword,
  } : {
    'x-api-key': config.key,
    'anthropic-version': CLAUDE_API_VERSION,
    'content-type': 'application/json',
    'anthropic-dangerous-direct-browser-access': 'true',
  };

  let resp;
  try {
    resp = await fetch(url, {
      method: 'POST',
      headers,
      body: JSON.stringify(body),
    });
  } catch (netErr) {
    throw new Error('כשל רשת. בדוק חיבור אינטרנט.');
  }

  const data = await resp.json().catch(() => ({}));

  if (!resp.ok) {
    const msg = data?.error?.message || `HTTP ${resp.status}`;
    const type = data?.error?.type || '';
    if (type === 'authentication_error') throw new Error(isShared ? 'קוד גישה שגוי.' : 'API key לא תקין.');
    if (type === 'rate_limit_error')     throw new Error('חריגת קצב. נסה שוב בעוד רגע.');
    if (type === 'overloaded_error')     throw new Error('השירות עמוס. נסה שוב.');
    if (type === 'cap_exceeded')         throw new Error(msg); // server-provided Hebrew msg
    if (type === 'server_error')         throw new Error(`תקלת שרת: ${msg}`);
    throw new Error(msg);
  }

  // Track usage
  if (onUsage && data.usage) {
    onUsage({
      input_tokens: data.usage.input_tokens || 0,
      output_tokens: data.usage.output_tokens || 0,
      model,
    });
  }

  const text = (data.content || [])
    .filter(b => b.type === 'text')
    .map(b => b.text)
    .join('\n');

  return {
    text,
    usage: data.usage,
    raw: data,
    // Proxy passes through weekly budget info when available
    weeklySpend: data._weekly_spend,
    weeklyCap: data._weekly_cap,
    weeklyWarning: data._warning,
  };
}

// ─── JSON extraction (handles wrapped / bare JSON) ──────────────────
function extractJSON(text) {
  if (!text) throw new Error('תשובה ריקה מהמנוע.');
  // Try direct parse first
  try { return JSON.parse(text); } catch (_) {}
  // Try to find JSON block in markdown fence
  const fence = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) {
    try { return JSON.parse(fence[1]); } catch (_) {}
  }
  // Try to find first { ... } balanced
  const start = text.indexOf('{');
  const end = text.lastIndexOf('}');
  if (start !== -1 && end > start) {
    try { return JSON.parse(text.slice(start, end + 1)); } catch (_) {}
  }
  throw new Error('הפלט שהתקבל לא תקין.');
}

// ─── Cost estimation ────────────────────────────────────────────────
function estimateCost(usage, model = DEFAULT_MODEL) {
  const p = PRICING[model] || PRICING[DEFAULT_MODEL];
  const inCost  = (usage.input_tokens  / 1_000_000) * p.in;
  const outCost = (usage.output_tokens / 1_000_000) * p.out;
  return inCost + outCost;
}

// ─── Image compression for API ──────────────────────────────────────
// Compress to max 1280px longest side, quality 0.82, return base64 JPEG
async function compressImageToBase64(file, maxDim = 1280, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        const base64 = dataUrl.split(',')[1];
        resolve({ base64, mediaType: 'image/jpeg', width: w, height: h, dataUrl });
      };
      img.onerror = () => reject(new Error('שגיאה בטעינת התמונה.'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('שגיאה בקריאת הקובץ.'));
    reader.readAsDataURL(file);
  });
}

// ─── Create a tiny thumbnail for storage (100x100 sq crop) ──────────
async function makeThumbnail(file, size = 96) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const minDim = Math.min(img.width, img.height);
        const sx = (img.width - minDim) / 2;
        const sy = (img.height - minDim) / 2;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, size, size);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.onerror = () => reject(new Error('thumbnail failed'));
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ─── High-level: parse meal from text (Sonnet 4.6 — 40% cheaper) ────
async function parseNutritionFromText(text, config, onUsage) {
  const p = PROMPTS.nutritionText;
  const { text: responseText } = await callClaude({
    config,
    model: MODEL_BY_FEATURE.nutrition_text,
    system: p.system,
    messages: [{ role: 'user', content: p.userPrefix + text }],
    maxTokens: p.maxTokens,
    onUsage,
  });
  const parsed = extractJSON(responseText);
  return normalizeNutrition(parsed);
}

// ─── High-level: parse meal from image (Opus 4.7 — vision quality) ──
async function parseNutritionFromImage(file, config, onUsage) {
  const { base64, mediaType } = await compressImageToBase64(file);
  const p = PROMPTS.nutritionImage;
  const { text: responseText } = await callClaude({
    config,
    model: MODEL_BY_FEATURE.nutrition_image,
    system: p.system,
    messages: [{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
        { type: 'text', text: p.userText },
      ],
    }],
    maxTokens: p.maxTokens,
    onUsage,
  });
  const parsed = extractJSON(responseText);
  const thumb = await makeThumbnail(file).catch(() => null);
  return { ...normalizeNutrition(parsed), thumbnail: thumb };
}

// ─── Normalize: ensure numbers, default missing ─────────────────────
function normalizeNutrition(p) {
  const num = (v, def = 0) => {
    const n = typeof v === 'number' ? v : parseFloat(v);
    return isNaN(n) ? def : Math.round(n);
  };
  return {
    calories: Math.max(0, num(p.calories)),
    protein:  Math.max(0, num(p.protein)),
    carbs:    Math.max(0, num(p.carbs)),
    fat:      Math.max(0, num(p.fat)),
    items:    Array.isArray(p.items) ? p.items : [],
    detected: p.detected || 'text',
    productName: p.productName || '',
    confidence: p.confidence || 'medium',
    notes: p.notes || '',
  };
}

// ─── Rings ──────────────────────────────────────────────────────────
function NutritionRings({ totals, goals }) {
  const calPct = goals.calories ? Math.min(100, (totals.calories / goals.calories) * 100) : 0;
  const calColor = totals.calories > goals.calories * 1.05 ? T.rose : T.lime;
  const remaining = goals.calories - totals.calories;
  return (
    <Card padding={20} style={{ marginBottom: 12, display: 'flex', alignItems: 'center', gap: 20, background: `linear-gradient(145deg, ${T.bgElev} 0%, ${T.bgElev2} 100%)` }}>
      <RingGauge pct={calPct} size={130} stroke={12} color={calColor} track={T.stroke}>
        <div style={{ fontFamily: T.mono, fontSize: 28, fontWeight: 700, color: T.ink, letterSpacing: -1 }}>{totals.calories}</div>
        <div style={{ fontSize: 9, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>/ {goals.calories}</div>
      </RingGauge>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>קלוריות · CALORIES</div>
        <div style={{ fontFamily: T.mono, fontSize: 32, fontWeight: 700, letterSpacing: -1, color: T.ink, marginTop: 4 }}>
          {remaining >= 0 ? remaining : 0}
        </div>
        <div style={{ fontSize: 12, color: T.inkSub, marginTop: 2 }}>
          {remaining > 0 ? `נותרו היום` : remaining < -50 ? `חריגה של ${Math.abs(remaining)}` : `סגרת את היום`}
        </div>
        {totals.count > 0 && (
          <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, marginTop: 6 }}>
            {totals.count} ארוחות · ~{Math.round(totals.calories / totals.count)} לארוחה
          </div>
        )}
      </div>
    </Card>
  );
}

// ─── Macro card — big, readable ────────────────────────────────────
function MacroCard({ label, val, goal, color }) {
  const pct = goal ? Math.min(100, (val / goal) * 100) : 0;
  const pctRounded = Math.round(pct);
  const pctColor = pct >= 95 ? T.lime : pct >= 70 ? T.amber : T.inkSub;
  return (
    <Card padding={12} style={{ textAlign: 'center', background: T.bgElev }}>
      <div style={{ fontSize: 12, color: T.inkSub, fontWeight: 700 }}>{label}</div>
      <div style={{ marginTop: 8, display: 'flex', alignItems: 'baseline', justifyContent: 'center', gap: 3 }}>
        <span style={{ fontFamily: T.mono, fontSize: 26, fontWeight: 800, color: T.ink, letterSpacing: -1, lineHeight: 1 }}>{val}</span>
        <span style={{ fontSize: 14, color: T.inkSub, fontFamily: T.mono, fontWeight: 600 }}>ג</span>
      </div>
      <div style={{ fontSize: 11, color: T.inkMute, fontFamily: T.mono, marginTop: 4 }}>
        מתוך {goal}ג
      </div>
      <div style={{ height: 6, background: T.stroke, borderRadius: 3, overflow: 'hidden', marginTop: 8 }}>
        <div style={{ width: `${pct}%`, height: '100%', background: color, borderRadius: 3, transition: 'width 300ms' }} />
      </div>
      <div style={{ fontSize: 12, color: pctColor, fontFamily: T.mono, marginTop: 6, fontWeight: 700 }}>
        {pctRounded}%
      </div>
    </Card>
  );
}

// ─── Meal row (swipeable, clickable to edit) ──────────────────────
function MealRow({ meal, dateViewing, isLast, onDelete, onClick }) {
  const [swipeX, setSwipeX] = React.useState(0);
  const [moved, setMoved] = React.useState(false);
  const startX = React.useRef(0);
  const onTouchStart = (e) => { startX.current = e.touches[0].clientX; setMoved(false); };
  const onTouchMove = (e) => {
    const dx = e.touches[0].clientX - startX.current;
    if (Math.abs(dx) > 8) setMoved(true);
    if (dx > 0) setSwipeX(Math.min(80, dx));
    else setSwipeX(0);
  };
  const onTouchEnd = () => setSwipeX(swipeX > 40 ? 80 : 0);

  const handleClick = () => {
    if (moved || swipeX > 0) return; // ignore click after swipe
    onClick?.();
  };

  const sourceIcon = meal.source === 'photo_parse' ? '📷' : meal.source === 'label_parse' ? '🏷️' : meal.source === 'manual' ? '✏️' : meal.source === 'favorite' ? '⭐' : '💬';

  return (
    <div style={{ position: 'relative', overflow: 'hidden', borderBottom: isLast ? 'none' : `1px solid ${T.stroke}` }}>
      <div style={{
        position: 'absolute', top: 0, bottom: 0, left: 0, width: 80,
        background: T.rose, display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <button onClick={onDelete} style={{
          background: 'transparent', border: 'none', color: T.ink, cursor: 'pointer',
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, padding: 8,
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          <span style={{ fontSize: 10, fontWeight: 700 }}>מחק</span>
        </button>
      </div>
      <div onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} onClick={handleClick} style={{
        display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px',
        background: T.bgElev, transform: `translateX(${swipeX}px)`,
        transition: swipeX === 0 || swipeX === 80 ? 'transform 200ms' : 'none',
        cursor: 'pointer',
      }}>
        {meal.thumbnail ? (
          <img src={meal.thumbnail} alt="" style={{ width: 40, height: 40, borderRadius: 8, objectFit: 'cover', flexShrink: 0 }} />
        ) : (
          <div style={{ width: 40, height: 40, borderRadius: 8, background: T.bgElev2, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, flexShrink: 0 }}>
            {sourceIcon}
          </div>
        )}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: T.ink, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{meal.description}</div>
          <div style={{ fontSize: 11, color: T.inkSub, fontFamily: T.mono, marginTop: 3 }}>
            {meal.time} · <span style={{ color: T.lime }}>{meal.protein}ג</span> חלבון · <span style={{ color: T.amber }}>{meal.carbs}ג</span> פחמ׳ · <span style={{ color: T.rose }}>{meal.fat}ג</span> שומן
          </div>
        </div>
        <div style={{ textAlign: 'left', fontFamily: T.mono, fontSize: 18, fontWeight: 700, color: T.ink, minWidth: 40 }}>
          {meal.calories}
        </div>
      </div>
    </div>
  );
}

          {hasFavorites && <ModeTab active={mode === 'favorites'} onClick={() => setMode('favorites')} icon="⭐" label="מועדפים" />}
          <ModeTab active={mode === 'text'} onClick={() => setMode('text')} icon="💬" label="טקסט" />
          <ModeTab active={mode === 'photo'} onClick={() => setMode('photo')} icon="📷" label="תמונה" />

      )}

// ─── Favorites flow — reuse previously saved meals ──────────────────
function FavoritesFlow({ date, onClose }) {
  const { state, dispatch } = useStore();
  const toast = useToast();
  const [query, setQuery] = React.useState('');
  const [pending, setPending] = React.useState(null); // { fav, scale }

  const favs = sortedFavorites(state.nutrition.favorites, 50);
  const filtered = query
    ? favs.filter(f => f.description.toLowerCase().includes(query.toLowerCase()))
    : favs;

  const addFav = (fav, scale = 1) => {
    dispatch({
      type: 'ADD_MEAL', date,
      meal: {
        time: nowHHMM(),
        description: fav.description + (scale !== 1 ? ` (×${scale})` : ''),
        calories: Math.round(fav.calories * scale),
        protein: Math.round(fav.protein * scale),
        carbs: Math.round(fav.carbs * scale),
        fat: Math.round(fav.fat * scale),
        source: 'favorite',
        thumbnail: fav.thumbnail || null,
        items: [], confidence: 'high',
      },
    });
    toast('נוסף מהמועדפים', { type: 'success' });
    onClose();
  };

  if (favs.length === 0) {
    return (
      <div style={{ padding: 40, textAlign: 'center' }}>
        <div style={{ fontSize: 40, marginBottom: 10 }}>⭐</div>
        <div style={{ fontSize: 14, color: T.inkSub, lineHeight: 1.6 }}>
          עדיין אין מועדפים.<br />
          כל ארוחה שתוסיף תישמר אוטומטית כאן לשימוש חוזר.
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: '14px 18px 20px' }}>
      {favs.length > 5 && (
        <input
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder="חפש בארוחות שלך..."
          style={{
            width: '100%', padding: '10px 14px', background: T.bgElev,
            border: `1px solid ${T.stroke}`, borderRadius: 10,
            color: T.ink, fontSize: 13, fontFamily: T.font, outline: 'none',
            direction: 'rtl', textAlign: 'right', marginBottom: 12,
          }}
        />
      )}

      <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1, marginBottom: 8 }}>
        {filtered.length} ארוחות · לחץ להוספה · לחץ ארוך לשינוי כמות
      </div>

      {filtered.map(f => (
        <FavoriteRow key={f.key} fav={f}
          onClick={() => addFav(f, 1)}
          onLongPress={() => setPending({ fav: f, scale: 1 })}
          onRemove={() => {
            dispatch({ type: 'REMOVE_FAVORITE', favKey: f.key });
            toast('הוסר מהמועדפים', { type: 'info' });
          }}
        />
      ))}

      {pending && <ScaleFavoriteDialog fav={pending.fav}

function FavoriteRow({ fav, onClick, onLongPress, onRemove }) {
  const pressTimer = React.useRef(null);
  const longPressed = React.useRef(false);
  const handleDown = () => {
    longPressed.current = false;
    pressTimer.current = setTimeout(() => {
      longPressed.current = true;
      onLongPress?.();
    }, 500);
  };
  const handleUp = () => {
    if (pressTimer.current) clearTimeout(pressTimer.current);
    if (!longPressed.current) onClick?.();
  };
  const handleCancel = () => {
    if (pressTimer.current) clearTimeout(pressTimer.current);
  };

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px',
      background: T.bgElev, borderRadius: T.radius, marginBottom: 6, cursor: 'pointer',
      border: `1px solid ${T.stroke}`,
    }}
    onPointerDown={handleDown} onPointerUp={handleUp} onPointerLeave={handleCancel} onPointerCancel={handleCancel}>
      {fav.thumbnail ? (
        <img src={fav.thumbnail} alt="" style={{ width: 34, height: 34, borderRadius: 7, objectFit: 'cover', flexShrink: 0 }} />
      ) : (
        <div style={{ width: 34, height: 34, borderRadius: 7, background: T.bgElev2, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 15, flexShrink: 0 }}>⭐</div>
      )}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: T.ink, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{fav.description}</div>
        <div style={{ fontSize: 10, color: T.inkMute, fontFamily: T.mono, marginTop: 2 }}>
          {fav.calories} ק״ק · נוסף {fav.useCount} פעמים

      <button onClick={(e) => { e.stopPropagation(); onRemove?.(); }} style={{
        background: 'transparent', border: 'none', color: T.inkMute, cursor: 'pointer',

    </div>
  );
}

// ─── Text parse flow ────────────────────────────────────────────────
function TextParseFlow({ onParsed }) {
  const { state, dispatch } = useStore();
  const toast = useToast();
  const [text, setText] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);

  const handleParse = async () => {
    if (!text.trim()) return;
    setLoading(true); setError(null);
    try {
      const result = await parseNutritionFromText(text.trim(), state.apiConfig, (usage) => {
        const cost = estimateCost(usage, state.apiConfig.model);
        dispatch({
          type: 'TRACK_USAGE',
          inputTokens: usage.input_tokens,
          outputTokens: usage.output_tokens,
          feature: 'nutrition_text',
          costUSD: cost,
        });
      });
      onParsed({ ...result, description: text.trim() });
    } catch (e) {
      setError(e.message);
      toast(e.message, { type: 'error' });
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ padding: 24 }}>
      <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 8, fontFamily: T.mono, letterSpacing: 1 }}>תיאור הארוחה</div>
      <textarea
        value={text}
        onChange={e => setText(e.target.value)}
        placeholder="למשל: שניצל 200 גרם עם אורז ירקות וסלט ישראלי, בסוף מעדן פרו"
        autoFocus rows={4}
        style={{
          width: '100%', padding: '14px 16px', background: T.bgElev, border: `1px solid ${T.stroke}`,
          borderRadius: 12, color: T.ink, fontSize: 15, fontFamily: T.font, outline: 'none',
          direction: 'rtl', textAlign: 'right', resize: 'none',
        }}
      />
      <div style={{ fontSize: 11, color: T.inkMute, marginTop: 8, lineHeight: 1.5 }}>
        מנוע AI מעריך ומציע. תוכל לערוך בשלב הבא.
      </div>
      {error && <div style={{ marginTop: 12, padding: '10px 14px', background: `${T.rose}15`, border: `1px solid ${T.rose}44`, borderRadius: 10, fontSize: 12, color: T.rose }}>{error}</div>}
      <div style={{ marginTop: 20 }}>
        <Button onClick={handleParse} disabled={!text.trim() || loading}>
          {loading ? 'מנתח...' : 'נתח'}
        </Button>
      </div>
    </div>
  );
}

// ─── Photo parse flow ───────────────────────────────────────────────
function PhotoParseFlow({ onParsed }) {
  const { state, dispatch } = useStore();
  const toast = useToast();
  const [file, setFile] = React.useState(null);
  const [preview, setPreview] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);

  const handleFile = (f) => {
    if (!f) return;
    setFile(f);
    const reader = new FileReader();
    reader.onload = (e) => setPreview(e.target.result);
    reader.readAsDataURL(f);
  };

  const handleParse = async () => {
    if (!file) return;
    setLoading(true); setError(null);
    try {
      const result = await parseNutritionFromImage(file, state.apiConfig, (usage) => {
        const cost = estimateCost(usage, state.apiConfig.model);
        dispatch({
          type: 'TRACK_USAGE',
          inputTokens: usage.input_tokens,
          outputTokens: usage.output_tokens,
          feature: 'nutrition_image',
          costUSD: cost,
        });
      });
      const desc = result.productName || result.items?.map(i => `${i.name} ${i.amount}`).join(', ') || 'ארוחה';
      onParsed({ ...result, description: desc }, result.thumbnail);
    } catch (e) {
      setError(e.message);
      toast(e.message, { type: 'error' });
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ padding: 24 }}>
      {!preview ? (
        <>
          <div style={{ fontSize: 12, color: T.inkSub, lineHeight: 1.5, marginBottom: 20 }}>
            צלם ארוחה, תווית תזונה (לוח תזונה), או מוצר ממותג (מעדני פרו, יוגורט וכו׳). המערכת תזהה ותציע ערכים.
          </div>
          <label style={{
            display: 'block', padding: '40px 20px', background: T.bgElev, border: `2px dashed ${T.stroke}`,
            borderRadius: T.radiusL, textAlign: 'center', cursor: 'pointer',
          }}>
            <div style={{ fontSize: 48, marginBottom: 10 }}>📷</div>
            <div style={{ fontSize: 15, fontWeight: 700, color: T.ink }}>בחר או צלם תמונה</div>
            <div style={{ fontSize: 11, color: T.inkSub, marginTop: 4 }}>JPG/PNG, עד ~3MB אחרי דחיסה</div>
            <input type="file" accept="image/*" capture="environment" style={{ display: 'none' }}
              onChange={e => handleFile(e.target.files?.[0])} />
          </label>
        </>
      ) : (
        <>
          <img src={preview} alt="preview" style={{
            width: '100%', maxHeight: 320, objectFit: 'contain',
            borderRadius: T.radius, background: T.bgElev, marginBottom: 16,
          }} />
          {error && <div style={{ marginBottom: 12, padding: '10px 14px', background: `${T.rose}15`, border: `1px solid ${T.rose}44`, borderRadius: 10, fontSize: 12, color: T.rose }}>{error}</div>}
          <div style={{ display: 'flex', gap: 10 }}>
            <Button variant="ghost" onClick={() => { setFile(null); setPreview(null); }}>החלף</Button>
            <Button onClick={handleParse} disabled={loading}>
              {loading ? 'מנתח...' : 'נתח את התמונה'}
            </Button>
          </div>
        </>
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════
// Edit meal dialog — edit existing meal values
// ═════════════════════════════════════════════════════════════════════
function EditMealDialog({ date, meal, onClose }) {
  const { dispatch } = useStore();
  const toast = useToast();
  const [desc, setDesc] = React.useState(meal.description || '');
  const [cal, setCal] = React.useState(meal.calories || 0);
  const [p, setP] = React.useState(meal.protein || 0);
  const [c, setC] = React.useState(meal.carbs || 0);
  const [f, setF] = React.useState(meal.fat || 0);
  const [time, setTime] = React.useState(meal.time || nowHHMM());

  const save = () => {
    dispatch({
      type: 'UPDATE_MEAL', date, mealId: meal.id,
      updates: { description: desc.trim() || 'ארוחה', calories: cal, protein: p, carbs: c, fat: f, time },
    });
    toast('הארוחה עודכנה', { type: 'success' });
    onClose();
  };

  const remove = () => {
    dispatch({ type: 'DELETE_MEAL', date, mealId: meal.id });
    toast('ארוחה נמחקה', { type: 'info' });
    onClose();
  };

  return (
    <div style={{
      position: 'fixed', inset: 0, background: T.bg, zIndex: 820,
      display: 'flex', flexDirection: 'column', direction: 'rtl',
    }}>
      <div style={{ padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 12, borderBottom: `1px solid ${T.stroke}` }}>
        <button onClick={onClose} style={iconBtn}>×</button>
        <div style={{ flex: 1, textAlign: 'center', fontSize: 15, fontWeight: 700 }}>עריכת ארוחה</div>
        <div style={{ width: 36 }} />
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: 24 }}>
        {meal.thumbnail && (
          <img src={meal.thumbnail} alt="" style={{
            width: '100%', maxHeight: 200, objectFit: 'contain',
            borderRadius: T.radius, background: T.bgElev, marginBottom: 16,
          }} />
        )}

        <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 6, fontFamily: T.mono, letterSpacing: 1 }}>תיאור</div>
        <input value={desc} onChange={e => setDesc(e.target.value)} style={inputStyle} />

        <div style={{ marginTop: 16 }}>
          <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 6, fontFamily: T.mono, letterSpacing: 1 }}>שעה</div>
          <input type="time" value={time} onChange={e => setTime(e.target.value)} style={{
            ...inputStyle, direction: 'ltr', textAlign: 'left',
          }} />
        </div>

        <div style={{ marginTop: 16 }}>
          <div style={{ fontSize: 11, color: T.inkMute, marginBottom: 6, fontFamily: T.mono, letterSpacing: 1 }}>קלוריות</div>
          <NumberStepper value={cal} onChange={setCal} min={0} max={3000} step={10} unit="kcal" />
        </div>

        <div style={{ marginTop: 16, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
          <div>
            <div style={{ fontSize: 10, color: T.inkMute, marginBottom: 4, fontFamily: T.mono }}>חלבון</div>
            <NumberStepper value={p} onChange={setP} min={0} max={300} step={1} unit="ג" />
          </div>
          <div>
            <div style={{ fontSize: 10, color: T.inkMute, marginBottom: 4, fontFamily: T.mono }}>פחמימות</div>
            <NumberStepper value={c} onChange={setC} min={0} max={500} step={1} unit="ג" />
          </div>
          <div>
            <div style={{ fontSize: 10, color: T.inkMute, marginBottom: 4, fontFamily: T.mono }}>שומן</div>
            <NumberStepper value={f} onChange={setF} min={0} max={200} step={1} unit="ג" />
          </div>
        </div>

        <div style={{ marginTop: 24 }}>
          <Button onClick={save}>שמור שינויים</Button>
        </div>

        <div style={{ marginTop: 12 }}>
          <button onClick={remove} style={{
            width: '100%', padding: 14, background: 'transparent', border: `1px solid ${T.rose}55`,
            borderRadius: T.radius, color: T.rose, fontSize: 13, fontWeight: 700, cursor: 'pointer', fontFamily: T.font,
          }}>מחק ארוחה זו</button>
        </div>
      </div>
    </div>
  );
}

  israeli: 'ישראלי',
  behavior: 'התנהגות',
  tracking: 'מעקב',
  myths: 'מיתוסים',
  strategy: 'אסטרטגיה',
};

// ─── Tip of the day: deterministic rotation based on date ───────────
function getTipOfDay(dateISO) {
  // Simple hash: number of days since epoch % tips.length
  const d = new Date(dateISO + 'T00:00:00Z');
  const daysSinceEpoch = Math.floor(d.getTime() / (24 * 3600 * 1000));
  return TIPS[daysSinceEpoch % TIPS.length];
}

// ─── Tip of the day card (for home screen) ──────────────────────────
function TipOfDayCard({ onExpand }) {
  const today = todayISO();
  const tip = getTipOfDay(today);
  const [expanded, setExpanded] = React.useState(false);

  return (
    <Card padding={14} style={{
      marginBottom: 14, cursor: 'pointer',
      background: `linear-gradient(135deg, ${T.bgElev} 0%, ${T.bgElev2} 100%)`,
      border: `1px solid ${T.stroke}`,
    }} onClick={() => onExpand ? onExpand() : setExpanded(v => !v)}>
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
        <div style={{
          width: 28, height: 28, borderRadius: 14, flexShrink: 0,
          background: `${T.amber}25`, display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 14,
        }}>💡</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 10, color: T.amber, fontFamily: T.mono, letterSpacing: 1, marginBottom: 4 }}>
            טיפ היום · {CATEGORY_LABELS[tip.category]}
          </div>
          <div style={{ fontSize: 14, fontWeight: 700, color: T.ink, lineHeight: 1.4, marginBottom: expanded ? 8 : 0 }}>
            {tip.title}
          </div>
          {expanded && (
            <div style={{ fontSize: 13, color: T.inkSub, lineHeight: 1.7, marginTop: 8 }}>
              {tip.body}
            </div>
          )}
          {!expanded && (
            <div style={{ fontSize: 11, color: T.inkMute, marginTop: 4 }}>לחץ להרחבה</div>
          )}
        </div>
      </div>
    </Card>
  );
}

// ─── Full tips library screen ───────────────────────────────────────
function TipsLibraryScreen({ onClose }) {
  const [filter, setFilter] = React.useState('all');
  const categories = ['all', ...Object.keys(CATEGORY_LABELS)];
  const filtered = filter === 'all' ? TIPS : TIPS.filter(t => t.category === filter);

  return (
    <div style={{
      position: 'fixed', inset: 0, background: T.bg, zIndex: 800,
      display: 'flex', flexDirection: 'column', direction: 'rtl',
    }}>
      <div style={{ padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 12, borderBottom: `1px solid ${T.stroke}` }}>
        <button onClick={onClose} style={{
          width: 36, height: 36, borderRadius: 18, background: T.bgElev, color: T.ink,
          border: 'none', cursor: 'pointer', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>×</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, color: T.inkMute, fontFamily: T.mono, letterSpacing: 1 }}>TIPS · ספרייה</div>
          <div style={{ fontSize: 17, fontWeight: 700 }}>{TIPS.length} תובנות</div>
        </div>
      </div>

      {/* Category filter chips */}
      <div style={{ padding: '10px 18px 6px', overflowX: 'auto', whiteSpace: 'nowrap' }}>
        {categories.map(cat => (
          <button key={cat} onClick={() => setFilter(cat)} style={{
            display: 'inline-block', marginLeft: 6, padding: '6px 12px', fontSize: 12,
            borderRadius: 999, border: `1px solid ${filter === cat ? T.lime : T.stroke}`,
            background: filter === cat ? T.lime : 'transparent',
            color: filter === cat ? T.bg : T.inkSub,
            fontFamily: T.font, cursor: 'pointer', fontWeight: filter === cat ? 700 : 500,
          }}>
            {cat === 'all' ? 'הכל' : CATEGORY_LABELS[cat]}
          </button>
        ))}
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '8px 18px 20px' }}>
        {filtered.map(tip => (
          <Card key={tip.id} padding={14} style={{ marginBottom: 10 }}>
            <div style={{ fontSize: 10, color: T.amber, fontFamily: T.mono, letterSpacing: 1, marginBottom: 6 }}>
              {CATEGORY_LABELS[tip.category]}
            </div>
            <div style={{ fontSize: 14, fontWeight: 700, color: T.ink, marginBottom: 6, lineHeight: 1.4 }}>
              {tip.title}
            </div>
            <div style={{ fontSize: 13, color: T.inkSub, lineHeight: 1.7 }}>
              {tip.body}
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}


// ════════════════════════════════════════════════════════════════════
// 11-app.jsx — Root app: provider, router, SW registration
// ════════════════════════════════════════════════════════════════════

function App() {
  return (
    <ToastProvider>
      <StoreProvider>
        <Router />
      </StoreProvider>
    </ToastProvider>
  );
}

function Router() {
  const { state } = useStore();
  const [screenStack, setScreenStack] = React.useState(['home']);
  const current = screenStack[screenStack.length - 1];

  const setScreen = (s) => setScreenStack([s]);
  const push = (s) => setScreenStack(arr => [...arr, s]);
  const pop = () => setScreenStack(arr => arr.length > 1 ? arr.slice(0, -1) : arr);

  // Handle onboarding
  if (state.settings.firstLaunch) {
    return <OnboardingScreen />;
  }

  const renderScreen = () => {
    switch (current) {
      case 'log':       return <LogScreen onClose={pop} onSaved={pop} />;
      case 'goal':      return <GoalScreen onClose={pop} />;
      case 'nutrition': return <NutritionScreen onNavigate={setScreen} />;
      case 'history':   return <HistoryScreen onNavigate={setScreen} />;
      case 'me':        return <ProfileScreen onNavigate={push} />;
      case 'home':
      default:          return <HomeScreen onNavigate={setScreen} />;
    }
  };

  // Modal-like screens: log + goal. They cover the whole view.
  const isModal = current === 'log' || current === 'goal';

  return (
    <div style={{
      background: T.bg, height: '100dvh', display: 'flex', flexDirection: 'column',
      maxWidth: 480, margin: '0 auto', position: 'relative', overflow: 'hidden',
    }}>
      <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column' }}>
        {renderScreen()}
      </div>
      {!isModal && <TabBar active={current === 'me' ? 'me' : current} onChange={(tab) => {
        if (tab === 'log') push('log');
        else setScreen(tab);
      }} />}
    </div>
  );
}

// ─── Service worker registration ────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('[FiTracklon] SW registered:', reg.scope);
    }).catch(err => {
      console.warn('[FiTracklon] SW registration failed:', err);
    });
  });
}

// ─── Mount ──────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
